<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FamilyFlix — Admin</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body{background:var(--ink)}
  .page{max-width:860px;margin:0 auto;padding:calc(var(--nav-h)+32px) 24px 80px;position:relative;z-index:1}
  .page-title{font-family:var(--ff);font-size:40px;font-weight:900;margin-bottom:4px}
  .page-title span{color:var(--amber);font-style:italic}
  .page-sub{font-size:14px;color:var(--cream3);margin-bottom:36px}
  .admin-tabs{display:flex;gap:0;background:var(--ink2);border:1px solid rgba(245,240,232,0.07);border-radius:var(--rl);padding:5px;margin-bottom:28px;overflow-x:auto}
  .atab{flex:1;padding:11px 16px;border:none;background:none;color:var(--cream3);font-family:var(--fs);font-size:13px;font-weight:500;cursor:pointer;border-radius:var(--rm);transition:all var(--t);white-space:nowrap;text-align:center}
  .atab.on{background:var(--amber);color:#0a0800;font-weight:700}
  .panel{display:none}.panel.on{display:block}
  .acard{background:var(--ink2);border:1px solid rgba(245,240,232,0.07);border-radius:var(--rl);padding:28px;margin-bottom:20px}
  
  .form-g{margin-bottom:18px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:600px){.form-row{grid-template-columns:1fr}}

  /* Sub-pestañas del formulario */
  .sub-tabs{display:flex;gap:10px;margin-bottom:24px;border-bottom:1px solid rgba(255,255,255,0.05);padding-bottom:14px}
  .stab{padding:10px 20px;background:var(--ink3);border:1px solid rgba(255,255,255,0.05);color:var(--cream3);border-radius:var(--rm);cursor:pointer;font-weight:600;font-size:13px;transition:all var(--t)}
  .stab.on{background:var(--amber);color:#000;border-color:var(--amber)}
  .form-section{display:none} .form-section.on{display:block}

  .ai-search-box{background:linear-gradient(135deg, rgba(232,160,32,0.1), rgba(196,122,16,0.02));border:1px solid rgba(232,160,32,0.3);border-radius:var(--rm);padding:20px;margin-bottom:24px}
  .ai-status{display:none;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--r);font-size:13px;margin-top:14px}
  .ai-status.analyzing{display:flex;background:rgba(232,160,32,0.08);border:1px solid rgba(232,160,32,0.2);color:var(--amber)}
  .ai-status.done{display:flex;background:rgba(39,174,96,0.08);border:1px solid rgba(39,174,96,0.2);color:#2ecc71}
  .ai-status.err{display:flex;background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.2);color:#e74c3c}
  .spin-sm{width:16px;height:16px;border:2px solid rgba(232,160,32,0.2);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

  .files-list{display:flex;flex-direction:column;gap:8px}
  .file-row{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--ink3);border:1px solid rgba(245,240,232,0.06);border-radius:var(--rm)}
  .file-info{flex:1;min-width:0}
  .file-name{font-size:13px;font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
  .file-meta{font-size:11px;color:var(--cream3)}
  .success-card{display:none;background:rgba(39,174,96,0.08);border:1px solid rgba(39,174,96,0.25);border-radius:var(--rl);padding:28px;text-align:center;margin-bottom:20px}
</style>
</head>
<body>
<div class="bg-atm"></div>
<nav class="nav solid" style="transform:none!important">
  <div class="nav-inner">
    <a href="home.html" class="logo">Family<span>Flix</span></a>
    <div class="nav-r">
      <button class="tt" onclick="toggleTheme()"></button>
      <a href="home.html" class="btn btn-ghost" style="padding:8px 16px;font-size:13px">← Catálogo</a>
    </div>
  </div>
</nav>

<div class="page">
  <h1 class="page-title">Panel de <span>Administración</span></h1>
  <p class="page-sub">Elige la hoja donde quieres guardar la información.</p>

  <div class="admin-tabs">
    <button class="atab on" onclick="showTab('subir',this)">📝 Crear Contenido</button>
    <button class="atab" onclick="showTab('archivos',this)">📁 Mis Archivos R2</button>
    <button class="atab" onclick="showTab('config',this)">⚙️ Configuración</button>
  </div>

  <div class="panel on" id="panel-subir">
    
    <div class="acard">
      <div class="ai-search-box">
        <h3 style="font-size:16px; color:var(--amber); margin-bottom:10px">✨ Autorellenar con IA</h3>
        <div style="display:flex; gap:10px; flex-wrap:wrap">
          <select class="inp" id="searchType" style="width:auto; min-width:120px">
            <option value="pelicula">Película</option>
            <option value="serie">Serie</option>
            <option value="episodio">Episodio</option>
          </select>
          <input class="inp" id="searchTitle" type="text" placeholder="Escribe el título aquí..." style="flex:1; min-width:200px">
          <button class="btn btn-amber" onclick="searchWithAI()">🔍 Buscar</button>
        </div>
        <div class="ai-status" id="aiStatus"></div>
      </div>

      <div class="sub-tabs">
        <button class="stab on" id="btn-tab-cont" onclick="switchForm('contenido')">🎬 Hoja: Contenido</button>
        <button class="stab" id="btn-tab-epi" onclick="switchForm('episodio')">🎞 Hoja: Episodios</button>
      </div>

      <div class="form-section on" id="form-contenido">
        <div class="form-row">
          <div class="form-g"><label>Tipo de Contenido</label>
            <select class="inp" id="c_tipo"><option value="pelicula">Película / Video Único</option><option value="serie">Serie</option></select>
          </div>
          <div class="form-g"><label>ID Único (Opcional)</label><input class="inp" id="c_id" type="text" placeholder="Deja vacío para auto-generar"></div>
        </div>
        
        <div class="form-g"><label>Título</label><input class="inp" id="c_titulo" type="text"></div>
        
        <div class="form-row">
          <div class="form-g"><label>Categoría</label>
            <select class="inp" id="c_categoria"><option>Familia</option><option>Viajes</option><option>Cumpleaños</option><option>Navidad</option><option>Vacaciones</option><option>Eventos</option><option>General</option><option>Accion</option><option>Comedia</option><option>Drama</option><option>Sci-Fi</option></select>
          </div>
          <div class="form-g"><label>Año</label><input class="inp" id="c_anio" type="number"></div>
        </div>

        <div class="form-g"><label>Sinopsis</label><textarea class="inp" id="c_sinopsis" rows="3"></textarea></div>
        
        <div class="form-row">
          <div class="form-g"><label>Duración</label><input class="inp" id="c_duracion" type="text" placeholder="1:30:00"></div>
          <div class="form-g"><label>Tags (separados por coma)</label><input class="inp" id="c_tags" type="text"></div>
        </div>

        <div class="form-g"><label>URL Portada Oficial (Poster)</label><input class="inp" id="c_portada" type="text" placeholder="https://..."></div>
        <div class="form-g"><label>URL del Video en R2</label><input class="inp" id="c_r2" type="text" placeholder="https://pub-eb70..."></div>
        <div class="form-g"><label>¿Destacar en inicio?</label><select class="inp" id="c_destacado"><option value="">No</option><option value="si">Sí</option></select></div>
      </div>

      <div class="form-section" id="form-episodio">
        <div class="form-row">
          <div class="form-g"><label>ID de la Serie a la que pertenece</label><input class="inp" id="e_serieId" type="text" placeholder="Ej: s001"></div>
          <div class="form-g"><label>Número de Capítulo</label><input class="inp" id="e_numero" type="number" placeholder="1"></div>
        </div>
        
        <div class="form-g"><label>Título del Episodio</label><input class="inp" id="e_titulo" type="text"></div>
        <div class="form-g"><label>Sinopsis del Episodio</label><textarea class="inp" id="e_sinopsis" rows="3"></textarea></div>
        
        <div class="form-row">
          <div class="form-g"><label>Duración</label><input class="inp" id="e_duracion" type="text" placeholder="0:45:00"></div>
          <div class="form-g"><label>URL Portada (Opcional)</label><input class="inp" id="e_portada" type="text" placeholder="https://..."></div>
        </div>

        <div class="form-g"><label>URL del Video en R2</label><input class="inp" id="e_r2" type="text" placeholder="https://pub-eb70..."></div>
      </div>

      <button class="btn btn-amber btn-full" style="padding:15px;font-size:15px;font-weight:700;margin-top:20px" id="saveBtn" onclick="saveToSheets()">
        💾 Guardar en Google Sheets
      </button>
    </div>

    <div class="success-card" id="successCard">
      <div class="sc-icon">✅</div><h3>¡Guardado correctamente!</h3>
      <p>Ya puedes verlo en tu catálogo.</p>
      <button class="btn btn-amber" onclick="location.reload()">➕ Agregar otro</button>
    </div>
  </div>

  <div class="panel" id="panel-archivos">
    <div class="acard">
      <h3>Archivos en R2</h3>
      <button class="btn btn-ghost" onclick="loadFiles()" style="margin-bottom:18px">🔄 Actualizar</button>
      <div id="filesList"><div class="load-state"><div class="spin"></div></div></div>
    </div>
  </div>

  <div class="panel" id="panel-config">
    <div class="acard">
      <div class="form-g"><label>Worker URL</label><input class="inp" id="cfWorkerUrl" type="text"></div>
      <div class="form-g"><label>Admin Secret</label><input class="inp" id="cfSecret" type="password"></div>
      <div class="form-g"><label>Apps Script URL</label><input class="inp" id="gasUrl" type="text"></div>
      <button class="btn btn-amber btn-full" onclick="saveConfig()">💾 Guardar Config</button>
    </div>
  </div>
</div>

<script src="js/shared.js"></script>
<script>
checkAuth();
if(sessionStorage.getItem('ff_role')!=='admin') location.href='home.html';

function getCfg(){return JSON.parse(localStorage.getItem('ff_cfg')||'{}')}
function saveConfig(){
  const cfg={workerUrl:document.getElementById('cfWorkerUrl').value.trim().replace(/\/$/,''),secret:document.getElementById('cfSecret').value.trim(),gasUrl:document.getElementById('gasUrl').value.trim()};
  localStorage.setItem('ff_cfg',JSON.stringify(cfg)); showToast('✅ Guardado','success');
}
function loadConfig(){
  const cfg=getCfg();
  if(cfg.workerUrl) document.getElementById('cfWorkerUrl').value=cfg.workerUrl;
  if(cfg.secret) document.getElementById('cfSecret').value=cfg.secret;
  if(cfg.gasUrl) document.getElementById('gasUrl').value=cfg.gasUrl;
}
loadConfig();

function showTab(name,btn){
  document.querySelectorAll('.atab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on'); document.getElementById('panel-'+name).classList.add('on');
  if(name==='archivos')loadFiles();
}

let activeForm = 'contenido';
function switchForm(type) {
  activeForm = type;
  document.getElementById('btn-tab-cont').classList.remove('on');
  document.getElementById('btn-tab-epi').classList.remove('on');
  document.getElementById('form-contenido').classList.remove('on');
  document.getElementById('form-episodio').classList.remove('on');
  
  if(type === 'contenido') {
    document.getElementById('btn-tab-cont').classList.add('on');
    document.getElementById('form-contenido').classList.add('on');
  } else {
    document.getElementById('btn-tab-epi').classList.add('on');
    document.getElementById('form-episodio').classList.add('on');
  }
}

async function searchWithAI(){
  const title = document.getElementById('searchTitle').value.trim();
  const searchType = document.getElementById('searchType').value;
  const cfg = getCfg();
  
  if(!title){ showToast('⚠️ Escribe el título primero', 'error'); return; }
  
  const status=document.getElementById('aiStatus');
  status.style.display='flex'; status.className='ai-status analyzing';
  status.innerHTML='<div class="spin-sm"></div> Buscando en bases de datos...';

  try{
    if(!cfg.workerUrl) throw new Error('Worker no configurado');
    const res = await fetch(cfg.workerUrl+'/analyze',{
      method:'POST', headers:{'Content-Type':'application/json','X-Admin-Secret':cfg.secret},
      body:JSON.stringify({ titleToSearch: title, contentType: searchType })
    });
    const data = await res.json();
    if(!data.ok) throw new Error(data.error);
    const p = data.data;

    if (searchType === 'episodio') {
      switchForm('episodio');
      document.getElementById('e_titulo').value = p.titulo || title;
      document.getElementById('e_sinopsis').value = p.sinopsis || '';
      if(p.portadaId) document.getElementById('e_portada').value = p.portadaId;
    } else {
      switchForm('contenido');
      document.getElementById('c_tipo').value = searchType;
      document.getElementById('c_titulo').value = p.titulo || title;
      document.getElementById('c_sinopsis').value = p.sinopsis || '';
      document.getElementById('c_anio').value = p.año || new Date().getFullYear();
      document.getElementById('c_tags').value = Array.isArray(p.tags) ? p.tags.join(', ') : (p.tags||'');
      if(p.portadaId) document.getElementById('c_portada').value = p.portadaId;
      if(p.categoria) {
        const catEl = document.getElementById('c_categoria');
        if([...catEl.options].some(o => o.value === p.categoria)) catEl.value = p.categoria;
      }
    }
    status.className='ai-status done'; status.innerHTML='✅ ¡Datos encontrados! Revisa abajo.';
  }catch(e){
    status.className='ai-status err'; status.innerHTML='⚠️ '+e.message;
  }
}

async function saveToSheets(){
  const cfg=getCfg();
  if(!cfg.gasUrl) return showToast('Configura el Apps Script','error');
  const btn=document.getElementById('saveBtn'); btn.disabled=true; btn.textContent='💾 Guardando...';

  const isEp = (activeForm === 'episodio');
  const row = isEp ? {
    serieId: document.getElementById('e_serieId').value.trim(), 
    numero: document.getElementById('e_numero').value.trim(),
    titulo: document.getElementById('e_titulo').value.trim(), 
    r2Url: document.getElementById('e_r2').value.trim(),
    duracion: document.getElementById('e_duracion').value.trim(), 
    sinopsis: document.getElementById('e_sinopsis').value.trim(),
    portadaId: document.getElementById('e_portada').value.trim(),
    driveId: ''
  } : {
    id: document.getElementById('c_id').value.trim() || 'p'+Date.now().toString().slice(-4),
    titulo: document.getElementById('c_titulo').value.trim(), 
    tipo: document.getElementById('c_tipo').value,
    categoria: document.getElementById('c_categoria').value, 
    año: document.getElementById('c_anio').value,
    sinopsis: document.getElementById('c_sinopsis').value.trim(), 
    tags: document.getElementById('c_tags').value.trim(),
    r2Url: document.getElementById('c_r2').value.trim(), 
    destacado: document.getElementById('c_destacado').value,
    duracion: document.getElementById('c_duracion').value.trim(), 
    portadaId: document.getElementById('c_portada').value.trim(),
    driveId: ''
  };

  if(!row.titulo){showToast('⚠️ El título es obligatorio','error');btn.disabled=false;btn.textContent='💾 Guardar';return;}

  try{
    const url = cfg.gasUrl+'?action='+(isEp?'addEpisode':'addContent')+'&data='+encodeURIComponent(JSON.stringify(row));
    try{
      const res = await fetch(cfg.gasUrl,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:isEp?'addEpisode':'addContent',row})});
      const data = await res.json(); if(!data.ok)throw new Error(data.error);
    }catch(err){ await fetch(url,{mode:'no-cors'}); }
    
    document.getElementById('successCard').style.display='block'; 
    showToast('✅ Guardado','success');
  }catch(e){ showToast('❌ '+e.message,'error'); btn.disabled=false; btn.textContent='💾 Guardar'; }
}

async function loadFiles(){
  const cfg=getCfg(); const list=document.getElementById('filesList');
  if(!cfg.workerUrl) return;
  list.innerHTML='<div class="load-state"><div class="spin"></div></div>';
  try{
    const res=await fetch(cfg.workerUrl+'/list',{headers:{'X-Admin-Secret':cfg.secret}});
    const data=await res.json();
    if(!data.files.length) return list.innerHTML='<p style="text-align:center;padding:20px">No hay archivos.</p>';
    list.innerHTML='<div class="files-list">'+data.files.map(f=>`<div class="file-row"><div class="file-info"><div class="file-name">${f.name}</div><div class="file-meta">${f.sizeMB} MB</div></div><div class="file-acts"><button class="btn btn-ghost btn-sm" onclick="copyUrl('${f.url}')">📋 Copiar URL</button></div></div>`).join('')+'</div>';
  }catch(e){ list.innerHTML='❌ Error de red'; }
}
function copyUrl(url){navigator.clipboard.writeText(url).then(()=>showToast('📋 Copiado','success'));}
</script>
</body></html>
