<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FamilyFlix</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .mt{margin-top:var(--nav-h)}
  .empty{text-align:center;padding:80px 20px;color:var(--cream3)}
  .empty big{font-size:52px;display:block;margin-bottom:14px}
  .empty h3{font-family:var(--ff);font-size:22px;color:var(--cream2);margin-bottom:6px}
</style>
</head>
<body>
<div class="bg-atm"></div>

<!-- NAV -->
<nav class="nav" id="nav">
  <div class="nav-inner">
    <a href="home.html" class="logo">Family<span>Flix</span></a>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="filterType('',this)">Inicio</button>
      <button class="nav-tab" onclick="filterType('pelicula',this)">🎬 Películas</button>
      <button class="nav-tab" onclick="filterType('serie',this)">📺 Series</button>
    </div>
    <div class="nav-r">
      <span id="navProfile" style="font-size:12px;color:var(--cream3)"></span>
      <a href="admin.html" class="btn btn-outline" id="adminBtn" style="display:none;padding:8px 16px;font-size:13px">＋ Agregar</a>
      <button class="tt" onclick="toggleTheme()"></button>
      <button class="btn btn-ghost" onclick="logout()" style="padding:8px 14px;font-size:13px">Salir</button>
    </div>
  </div>
</nav>

<div class="mt">
  <!-- HERO -->
  <section class="hero" id="heroBanner">
    <div class="hero-bg" id="heroBg"><div class="hero-bg-ph">🎬</div></div>
    <div class="hero-vignette"></div>
    <div class="hero-content" id="heroContent">
      <div class="load-state"><div class="spin"></div></div>
    </div>
  </section>

  <!-- STATS -->
  <div class="stats-bar" id="statsStrip"></div>

  <!-- BÚSQUEDA + CHIPS -->
  <div class="search-zone">
    <div class="search-box">
      <span class="si">🔍</span>
      <input class="inp" id="searchInput" type="text" placeholder="Buscar película, serie, evento..." oninput="applySearch()">
    </div>
    <div class="filter-chips" id="catChips">
      <button class="chip on" onclick="filterCat('',this)">Todos</button>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div id="homeContent" style="padding-bottom:60px;position:relative;z-index:1">
    <div class="load-state"><div class="spin"></div><span>Cargando colección...</span></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bd" id="modalBd" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalEl">
    <div class="modal-img" id="mThumb"></div>
    <div class="modal-body">
      <div class="modal-eyebrow" id="mType"></div>
      <h2 class="modal-title" id="mTitle"></h2>
      <div class="modal-meta" id="mMeta"></div>
      <div class="modal-prog" id="mProgress" style="display:none">
        <div class="modal-prog-bar"><div class="modal-prog-fill" id="mProgFill"></div></div>
        <div class="modal-prog-lbl" id="mProgLabel"></div>
      </div>
      <p class="modal-synopsis" id="mSynopsis"></p>
      <div class="modal-tags" id="mTags"></div>
      <div class="ep-list" id="mEpisodes" style="display:none">
        <div class="ep-list-title">Episodios</div>
        <div id="mEpList"></div>
      </div>
      <div class="modal-actions" id="mActions"></div>
    </div>
  </div>
</div>

<script src="js/shared.js"></script>
<script>
checkAuth();
document.getElementById('navProfile').textContent = sessionStorage.getItem('ff_profile')||'';
if(sessionStorage.getItem('ff_role')==='admin') document.getElementById('adminBtn').style.display='inline-flex';

// Navbar scroll
let lastY=0;
window.addEventListener('scroll',()=>{
  const nav=document.getElementById('nav');
  nav.classList.toggle('solid',window.scrollY>80);
  nav.classList.toggle('hidden',window.scrollY>200&&window.scrollY>lastY);
  lastY=window.scrollY;
},{passive:true});

let allContent=[], allEpisodes=[], activeType='', activeCat='', activeSearch='';

async function init(){
  [allContent,allEpisodes]=await Promise.all([fetchContent(),fetchEpisodes()]);
  renderHero();
  renderStats();
  renderCatChips();
  renderHome();
}

// ── HERO ──────────────────────────────────────────────────
function renderHero(){
  const v=allContent.find(x=>x.featured)||allContent[0];
  if(!v){document.getElementById('heroContent').innerHTML='';return;}
  const pct=getPct(v.id);
  if(v.thumbnail){
    document.getElementById('heroBg').innerHTML=`<img src="${v.thumbnail}" alt="${v.title}" onerror="this.parentElement.innerHTML='<div class=\\'hero-bg-ph\\'>${catEmoji(v.category)}</div>'">`;
  }
  document.getElementById('heroContent').innerHTML=`
    <div class="hero-eyebrow">${v.type==='serie'?'📺 Serie':'🎬 Película'} · ${v.category}</div>
    <h1 class="hero-title">${v.title}</h1>
    <div class="hero-meta">
      ${v.year?`<span>${v.year}</span><span class="sep"></span>`:''}
      ${v.duration?`<span>${v.duration}</span><span class="sep"></span>`:''}
      ${v.tags.slice(0,2).map(t=>`<span>#${t}</span>`).join('<span class="sep"></span>')}
    </div>
    <p class="hero-desc">${v.synopsis}</p>
    ${pct>0&&pct<100?`<div class="hero-progress"><div class="hero-prog-bar"><div class="hero-prog-fill" style="width:${pct}%"></div></div><div class="hero-prog-label">Continuar — ${pct}% visto</div></div>`:''}
    <div class="hero-actions">
      <button class="btn btn-amber btn-lg" onclick="playOrOpen('${v.id}')">▶ ${pct>0&&pct<100?'Continuar':'Reproducir'}</button>
      <button class="btn btn-ghost btn-lg" onclick="openModal('${v.id}')">ℹ Más info</button>
    </div>`;
}

// ── STATS ──────────────────────────────────────────────────
function renderStats(){
  const prog=getProg();
  const movies=allContent.filter(v=>v.type==='pelicula').length;
  const series=allContent.filter(v=>v.type==='serie').length;
  const inProg=allContent.filter(v=>{const p=prog[v.id]||0;return p>0&&p<100}).length;
  document.getElementById('statsStrip').innerHTML=`
    <div class="stat"><span class="stat-n">${movies}</span><div class="stat-l">Películas</div></div>
    <div class="stat"><span class="stat-n">${series}</span><div class="stat-l">Series</div></div>
    <div class="stat"><span class="stat-n">${allEpisodes.length}</span><div class="stat-l">Episodios</div></div>
    <div class="stat"><span class="stat-n">${inProg}</span><div class="stat-l">En progreso</div></div>`;
}

// ── CHIPS ──────────────────────────────────────────────────
function renderCatChips(){
  const cats=[...new Set(allContent.map(v=>v.category))];
  const el=document.getElementById('catChips');
  cats.forEach(cat=>{
    const b=document.createElement('button');
    b.className='chip';
    b.innerHTML=`${catEmoji(cat)} ${cat}`;
    b.onclick=()=>filterCat(cat,b);
    el.appendChild(b);
  });
}

// ── RENDER HOME ────────────────────────────────────────────
function renderHome(){
  const home=document.getElementById('homeContent');
  let filtered=allContent;
  if(activeType)   filtered=filtered.filter(v=>v.type===activeType);
  if(activeCat)    filtered=filtered.filter(v=>v.category===activeCat);
  if(activeSearch) filtered=filtered.filter(v=>
    v.title.toLowerCase().includes(activeSearch)||
    v.synopsis.toLowerCase().includes(activeSearch)||
    v.tags.some(t=>t.toLowerCase().includes(activeSearch))
  );

  if(!filtered.length){
    home.innerHTML=`<div class="empty"><big>🔍</big><h3>Sin resultados</h3><p>Prueba con otro término</p></div>`;
    return;
  }

  let html='';

  // Continuar viendo
  const prog=getProg();
  const cont=filtered.filter(v=>{const p=prog[v.id]||0;return p>0&&p<100});
  if(cont.length&&!activeSearch) html+=rowHTML('▸ Continuar viendo',cont);

  if(activeSearch||activeType||activeCat){
    html+=rowHTML(activeSearch?`"${activeSearch}"`:activeType==='pelicula'?'🎬 Películas':'📺 Series',filtered);
  } else {
    const series=filtered.filter(v=>v.type==='serie');
    const movies=filtered.filter(v=>v.type==='pelicula');
    if(series.length) html+=rowHTML('📺 Series',series);
    if(movies.length) html+=rowHTML('🎬 Películas',movies);
    const cats=[...new Set(filtered.map(v=>v.category))];
    cats.forEach(cat=>{
      const items=filtered.filter(v=>v.category===cat);
      if(items.length>=2) html+=rowHTML(`${catEmoji(cat)} ${cat}`,items);
    });
  }

  home.innerHTML=html;
}

function rowHTML(title,items){
  return`<div class="section">
    <div class="section-head"><div class="section-title"><span>▸</span> ${title}</div><div class="section-line"></div></div>
    <div class="scroll-row sg">${items.map(v=>cardHTML(v)).join('')}</div>
  </div>`;
}

function cardHTML(v){
  const pct=getPct(v.id);
  const b=getBadge(v.id);
  const img=v.thumbnail
    ?`<img src="${v.thumbnail}" alt="${v.title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-ph\\'>${catEmoji(v.category)}</div>'">`
    :`<div class="card-ph">${catEmoji(v.category)}</div>`;
  return`<div class="card card-w" onclick="openModal('${v.id}')">
    <div class="card-img">
      ${img}
      <div class="card-shine"></div>
      <div class="card-overlay"><div class="play-btn">▶</div></div>
      <div class="badge ${b.cls}">${b.txt}</div>
      ${v.type==='serie'?`<div class="badge badge-serie">📺 SERIE</div>`:''}
      ${pct>0&&pct<100?`<div class="prog-strip"><div class="prog-fill" style="width:${pct}%"></div></div>`:''}
    </div>
    <div class="card-body">
      <div class="card-title">${v.title}</div>
      <div class="card-sub"><span>${v.year||''}</span>${v.category?`<span>${v.category}</span>`:''}</div>
    </div>
  </div>`;
}

// ── FILTROS ────────────────────────────────────────────────
function filterType(type,btn){
  activeType=type;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderHome();
}
function filterCat(cat,btn){
  activeCat=cat;
  document.querySelectorAll('.chip').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderHome();
}
function applySearch(){
  activeSearch=document.getElementById('searchInput').value.toLowerCase();
  renderHome();
}

// ── MODAL ──────────────────────────────────────────────────
function openModal(id){
  const v=allContent.find(x=>x.id===id);if(!v)return;
  const pct=getPct(id);

  document.getElementById('mThumb').innerHTML=`
    ${v.thumbnail?`<img src="${v.thumbnail}" alt="${v.title}" onerror="this.parentElement.innerHTML='<div class=\\'modal-img-ph\\'>${catEmoji(v.category)}</div>'">`:`<div class="modal-img-ph">${catEmoji(v.category)}</div>`}
    <div class="modal-img-grad"></div>
    <button class="modal-x" onclick="closeModal()">✕</button>`;

  document.getElementById('mType').innerHTML=`${v.type==='serie'?'📺 Serie':'🎬 Película'} &nbsp;·&nbsp; ${v.category}`;
  document.getElementById('mTitle').textContent=v.title;
  document.getElementById('mSynopsis').textContent=v.synopsis||'Sin sinopsis.';
  document.getElementById('mMeta').innerHTML=`
    ${v.year?`<span>📅 ${v.year}</span>`:''}
    ${v.duration?`<span>⏱ ${v.duration}</span>`:''}`;
  document.getElementById('mTags').innerHTML=(v.tags||[]).map(t=>`<span class="tag">#${t}</span>`).join('');

  if(pct>0){
    document.getElementById('mProgress').style.display='block';
    document.getElementById('mProgFill').style.width=pct+'%';
    document.getElementById('mProgLabel').textContent=fmtPct(pct);
  } else {
    document.getElementById('mProgress').style.display='none';
  }

  const actions=document.getElementById('mActions');
  if(v.type==='serie'){
    const eps=allEpisodes.filter(e=>e.serieId===v.id).sort((a,b)=>a.number-b.number);
    if(eps.length){
      document.getElementById('mEpisodes').style.display='block';
      document.getElementById('mEpList').innerHTML=eps.map(ep=>{
        const epPct=getPct(ep.id);
        return`<div class="ep-row" onclick="playEpisode('${ep.id}','${v.id}')">
          <div class="ep-num">${ep.number}</div>
          <div class="ep-thumb-sm">${ep.thumbnail?`<img src="${ep.thumbnail}" alt="">`:''}</div>
          <div class="ep-info"><div class="ep-title">${ep.title}</div><div class="ep-dur">${ep.duration||''}</div></div>
          ${epPct>0?`<div class="ep-bar"><div class="ep-bar-fill" style="width:${epPct}%"></div></div>`:''}
        </div>`;
      }).join('');
    } else {
      document.getElementById('mEpisodes').style.display='none';
    }
    actions.innerHTML=`<button class="btn btn-ghost btn-lg" style="flex:1" onclick="closeModal()">✕ Cerrar</button>`;
  } else {
    document.getElementById('mEpisodes').style.display='none';
    actions.innerHTML=`
      <button class="btn btn-amber btn-lg" style="flex:1" onclick="playOrOpen('${v.id}')">▶ ${pct>0&&pct<100?'Continuar':'Reproducir'}</button>
      <button class="btn btn-ghost btn-lg" onclick="closeModal()">✕</button>`;
  }

  document.getElementById('modalBd').classList.add('open');
  document.body.style.overflow='hidden';
}

function playOrOpen(id){
  const v=allContent.find(x=>x.id===id);if(!v)return;
  if(v.type==='serie'){openModal(id);return;}
  closeModal();
  location.href=`player.html?id=${id}`;
}
function playEpisode(epId,serieId){
  closeModal();
  location.href=`player.html?id=${epId}&serie=${serieId}`;
}
function closeModal(){
  document.getElementById('modalBd').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

init();
</script>
</body></html>
