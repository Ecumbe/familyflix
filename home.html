<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FamilyFlix</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body.home-screen .mt{margin-top:0}
    body.home-screen .nav{
      background:linear-gradient(180deg, rgba(4,6,11,.74) 0%, rgba(4,6,11,.32) 58%, rgba(4,6,11,0) 100%);
      border-bottom:none;
      backdrop-filter:none;
    }
    body.home-screen .hero{
      margin-top:0;
      margin-bottom:0;
      border-bottom:none;
    }
    body.home-screen .search-zone{
      margin-top:0;
      padding-top:20px;
      background:linear-gradient(180deg, rgba(4,6,11,.94) 0%, rgba(4,6,11,.42) 58%, rgba(4,6,11,0) 100%);
    }
    body.home-screen .hero-bg::after{
      background:linear-gradient(180deg, rgba(0,0,0,.24) 0%, rgba(0,0,0,.05) 18%, rgba(0,0,0,.42) 72%, rgba(4,6,11,.95) 100%);
    }
    body.home-screen .hero-vignette{
      background:
        linear-gradient(180deg, rgba(4,6,11,.36) 0%, rgba(4,6,11,.06) 20%, rgba(4,6,11,.54) 72%, rgba(4,6,11,.94) 100%),
        linear-gradient(90deg, rgba(4,6,11,.74) 0%, rgba(4,6,11,.3) 34%, rgba(4,6,11,.08) 60%, rgba(4,6,11,.76) 100%);
    }
    .empty{text-align:center;padding:70px 20px;color:var(--cream3)}
    .empty h3{font-family:var(--ff);font-size:24px;color:var(--cream);margin-bottom:10px}
    .search-zone{padding:12px 24px 8px;position:relative;z-index:1}
    @media(min-width:721px){
      body.home-screen.home-filtered .search-zone{padding-top:calc(var(--nav-h) + 18px)}
    }
    .search-box{position:relative;max-width:520px}
    .search-box .inp{padding-left:72px}
    .si{position:absolute;left:16px;top:50%;transform:translateY(-50%);opacity:.68;font-size:11px;letter-spacing:.14em;text-transform:uppercase}
    .hero-mini-actions{display:flex;gap:12px;flex-wrap:wrap}
    .hero-dots{
      display:inline-flex;align-items:center;gap:8px;margin-top:20px;
      padding:6px 8px;border-radius:999px;
      background:rgba(255,255,255,.025);
      border:1px solid rgba(255,255,255,.04);
      backdrop-filter:blur(8px)
    }
    .hero-dot{
      width:6px;height:6px;padding:0;border:none;border-radius:999px;cursor:pointer;
      background:rgba(255,255,255,.18);opacity:.42;
      transition:transform .22s ease, opacity .22s ease, background .22s ease
    }
    .hero-dot:hover{opacity:.62}
    .hero-dot.on{
      opacity:.9;background:rgba(243,197,91,.74);transform:scale(1.18)
    }
    body.home-screen .hero-bg-layer{
      opacity:0;
      transform:scale(1.045);
      filter:saturate(.9) brightness(.82);
      transition:
        opacity 1.45s cubic-bezier(.22,.8,.22,1),
        transform 6.8s cubic-bezier(.22,.8,.22,1),
        filter 1.45s cubic-bezier(.22,.8,.22,1);
    }
    body.home-screen .hero-bg-layer.is-active{
      opacity:1;
      transform:scale(1.008);
      filter:saturate(1.04) brightness(1);
      animation:hero-layer-breathe 11s ease-in-out infinite;
    }
    body.home-screen .hero-bg-layer.is-leaving{
      opacity:0;
      transform:scale(1.08);
      filter:saturate(1.08) brightness(1.05);
      animation:none;
    }
    body.home-screen .hero-bg .media-image-shell img{
      animation:hero-kenburns 24s ease-in-out both;
    }
    .saga-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:18px;
    }
    .saga-card{
      position:relative;
      isolation:isolate;
    }
    .saga-card .card-img{
      background:
        radial-gradient(circle at 20% 15%, rgba(243,197,91,.16), transparent 34%),
        radial-gradient(circle at 82% 10%, rgba(110,168,255,.18), transparent 28%),
        linear-gradient(160deg, rgba(10,16,26,.96), rgba(6,10,17,.98));
    }
    .saga-card__slides{
      position:absolute;
      inset:0;
      overflow:hidden;
    }
    .saga-card__slide{
      position:absolute;
      inset:0;
      opacity:0;
      transform:scale(1.08);
      transition:opacity .95s ease, transform 1.45s ease, filter 1.15s ease;
      filter:saturate(.84) brightness(.78);
    }
    .saga-card__slide.is-active{
      opacity:1;
      transform:scale(1);
      filter:saturate(1.02) brightness(1);
    }
    .saga-card__slide .media-image-shell,
    .saga-card__slide .media-image-shell img,
    .saga-card__slide .media-fallback{
      width:100%;
      height:100%;
    }
    .saga-card__slide::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(4,6,11,.08) 0%, rgba(4,6,11,.2) 38%, rgba(4,6,11,.82) 100%),
        linear-gradient(90deg, rgba(4,6,11,.46) 0%, rgba(4,6,11,.06) 42%, rgba(4,6,11,.58) 100%);
    }
    .saga-card__pill,
    .saga-card__count{
      position:absolute;
      z-index:2;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 12px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      letter-spacing:.05em;
      text-transform:uppercase;
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,.1);
      box-shadow:0 14px 32px rgba(0,0,0,.24);
    }
    .saga-card__pill{
      left:14px;
      top:14px;
      background:rgba(255,255,255,.08);
      color:var(--cream);
    }
    .saga-card__count{
      right:14px;
      top:14px;
      background:rgba(243,197,91,.16);
      color:var(--amber);
    }
    .saga-card__sub{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      font-size:12px;
      color:var(--cream3);
      margin-top:2px;
    }
    .saga-card__titles{
      margin-top:10px;
      font-size:12px;
      line-height:1.55;
      color:var(--cream3);
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .chip-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
    .chip{border:none;background:var(--gb);color:var(--cream2);border:1px solid var(--gbrd);border-radius:999px;padding:10px 14px;cursor:pointer}
    .chip.on{background:var(--amber);border-color:var(--amber);color:#140d00}
    .modal-episodes{display:grid;gap:12px;margin-top:24px}
    #modalEl{
      position:relative;overflow:hidden;
      background:linear-gradient(135deg, rgba(7,10,16,.82), rgba(6,10,16,.68));
    }
    #modalEl > :not(.modal-backdrop-tone){position:relative;z-index:1}
    .modal-backdrop-tone{
      position:absolute;inset:0;pointer-events:none;opacity:0;
      background-position:center;background-size:cover;background-repeat:no-repeat;
      filter:blur(8px) saturate(1.04) brightness(.72);transform:scale(1.04);
      transition:opacity .42s ease, transform .54s ease, background-image .42s ease
    }
    .modal-backdrop-tone::after{
      content:"";position:absolute;inset:0;
      background:
        linear-gradient(90deg, rgba(4,6,11,.52) 0%, rgba(4,6,11,.24) 34%, rgba(4,6,11,.6) 100%),
        linear-gradient(180deg, rgba(4,6,11,.12) 0%, rgba(4,6,11,.78) 100%)
    }
    #modalEl.has-backdrop-tone .modal-backdrop-tone{
      opacity:.96;transform:scale(1.01)
    }
    #modalEl .modal-img{background:transparent}
    #modalEl .modal-body{
      background:linear-gradient(180deg, rgba(5,8,13,.16), rgba(5,8,13,.46));
      backdrop-filter:blur(10px)
    }
    #sagaModalEl{
      position:relative;
      width:min(1160px,100%);
      grid-template-columns:1fr;
      overflow:hidden;
      background:linear-gradient(135deg, rgba(7,10,16,.82), rgba(6,10,16,.68));
    }
    #sagaModalEl > :not(.modal-backdrop-tone){position:relative;z-index:1}
    #sagaBackdropTone{
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:0;
      background-position:center;
      background-size:cover;
      background-repeat:no-repeat;
      filter:blur(10px) saturate(1.08) brightness(.68);
      transform:scale(1.05);
      transition:opacity .5s ease, transform .85s ease;
    }
    #sagaBackdropTone::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(4,6,11,.16) 0%, rgba(4,6,11,.82) 100%),
        linear-gradient(90deg, rgba(4,6,11,.7) 0%, rgba(4,6,11,.28) 38%, rgba(4,6,11,.82) 100%);
    }
    #sagaModalEl.has-backdrop-tone #sagaBackdropTone{
      opacity:1;
      transform:scale(1.01);
    }
    .saga-modal-body{
      padding:28px;
      max-height:min(92vh,920px);
      overflow:auto;
    }
    .saga-modal-head{
      display:grid;
      gap:14px;
      margin-bottom:22px;
    }
    .saga-modal-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
    }
    .saga-modal-copy{
      display:grid;
      gap:10px;
      max-width:760px;
    }
    .saga-modal-meta{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      color:var(--cream3);
      font-size:12px;
      font-weight:700;
    }
    .saga-modal-meta span{
      padding:8px 11px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
    }
    .saga-modal-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:16px;
    }
    .saga-choice-card .card-overlay .play-btn{
      min-width:auto;
    }
    .saga-choice-card .card-sub{
      gap:8px;
      align-items:flex-start;
    }
    .saga-choice-card .card-extra{
      margin-top:10px;
      font-size:12px;
      color:var(--cream3);
      line-height:1.5;
      display:-webkit-box;
      -webkit-line-clamp:4;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    @media(min-width:821px){
      #modalEl .modal-body{
        background:linear-gradient(90deg, rgba(5,8,13,.18) 0%, rgba(5,8,13,.44) 20%, rgba(5,8,13,.62) 100%)
      }
      #modalEl .modal-media-surface{
        background:rgba(5,8,13,.24);
        border-color:rgba(255,255,255,.1)
      }
    }
    .season-box{background:var(--ink3);border:1px solid rgba(255,255,255,.05);border-radius:var(--rm);padding:16px}
    .season-title{font-family:var(--ff);font-size:18px;margin-bottom:10px;color:var(--cream)}
    .episode-item{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:12px 0;border-top:1px solid rgba(255,255,255,.06)}
    .episode-item:first-child{border-top:none}
    .ep-meta{font-size:12px;color:var(--cream3);margin-top:3px}
    .section-sub{font-size:12px;color:var(--cream3);padding:0 0 10px}
    .welcome-bd{
      position:fixed;inset:0;z-index:140;display:flex;align-items:center;justify-content:center;
      background:radial-gradient(circle at top, rgba(22,38,66,.82), rgba(4,6,11,.94) 62%);
      opacity:0;visibility:hidden;pointer-events:none;transition:opacity .45s ease, visibility .45s ease;
    }
    .welcome-bd.show{opacity:1;visibility:visible}
    .welcome-card{
      position:relative;
      min-width:min(92vw,520px);
      padding:34px 28px;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.1);
      background:linear-gradient(135deg, rgba(9,18,34,.96) 0%, rgba(14,28,50,.94) 54%, rgba(8,15,28,.98) 100%);
      box-shadow:0 34px 100px rgba(0,0,0,.45);
      overflow:hidden;
      transform:translateY(28px) scale(.96);
      transition:transform .6s cubic-bezier(.2,.9,.2,1);
    }
    .welcome-bd.show .welcome-card{transform:translateY(0) scale(1)}
    .welcome-card::before{
      content:"";
      position:absolute;inset:-30% auto auto -18%;
      width:220px;height:220px;border-radius:999px;
      background:radial-gradient(circle, rgba(232,160,32,.34) 0%, rgba(232,160,32,0) 72%);
      animation:welcomeFloat 4.8s ease-in-out infinite;
    }
    .welcome-card::after{
      content:"";
      position:absolute;right:-70px;bottom:-90px;
      width:240px;height:240px;border-radius:999px;
      background:radial-gradient(circle, rgba(65,121,255,.22) 0%, rgba(65,121,255,0) 74%);
      animation:welcomeFloat 5.6s ease-in-out infinite reverse;
    }
    .welcome-mark{position:relative;display:inline-flex;align-items:center;gap:10px;margin-bottom:16px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber)}
    .welcome-mark strong{font-family:var(--ff);font-size:18px;letter-spacing:-.03em;text-transform:none;color:var(--cream)}
    .welcome-title{position:relative;font-family:var(--ff);font-size:clamp(32px,4vw,48px);line-height:.95;letter-spacing:-.05em;color:var(--cream);margin:0}
    .welcome-title span{display:block;color:var(--amber);font-style:italic}
    .welcome-sub{position:relative;margin:14px 0 0;color:var(--cream2);font-size:15px;line-height:1.7;max-width:420px}
    .welcome-user{position:relative;display:inline-flex;align-items:center;gap:10px;margin-top:20px;padding:10px 16px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--cream)}
    .welcome-user i{display:inline-grid;place-items:center;width:28px;height:28px;border-radius:999px;background:rgba(232,160,32,.14);color:var(--amber);font-style:normal;font-weight:800}
    @keyframes welcomeFloat{
      0%,100%{transform:translate3d(0,0,0)}
      50%{transform:translate3d(0,-14px,0)}
    }
    @media(max-width:820px){.search-zone{padding:8px 18px 4px}}
    @media(max-width:720px){
      body.home-screen .nav{
        background:linear-gradient(180deg, rgba(4,6,11,.82) 0%, rgba(4,6,11,.44) 56%, rgba(4,6,11,0) 100%)!important;
        border-bottom:none!important;
        backdrop-filter:blur(10px)!important;
      }
    }
    @media(max-width:560px){
      .hero-mini-actions{flex-direction:column}
      .hero-dots{gap:7px;padding:5px 7px}
      .saga-grid,
      .saga-modal-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
      .saga-card__pill,
      .saga-card__count{padding:8px 10px;font-size:10px}
      .saga-modal-body{padding:20px}
      .saga-modal-top{flex-direction:column}
      .search-zone{padding:6px 16px 2px}
      body.home-screen .nav{
        background:linear-gradient(180deg, rgba(4,6,11,.82) 0%, rgba(4,6,11,.44) 56%, rgba(4,6,11,0) 100%)!important;
        border-bottom:none!important;
        backdrop-filter:blur(10px)!important;
      }
      body.home-screen .hero-vignette{
        background:
          linear-gradient(180deg, rgba(4,6,11,.28) 0%, rgba(4,6,11,.08) 18%, rgba(4,6,11,.56) 70%, rgba(4,6,11,.94) 100%),
          linear-gradient(90deg, rgba(4,6,11,.32) 0%, rgba(4,6,11,.14) 32%, rgba(4,6,11,.08) 62%, rgba(4,6,11,.38) 100%);
      }
    }
    @media(max-width:820px){
      .modal-backdrop-tone,
      #sagaBackdropTone{display:none}
    }
    @keyframes hero-layer-breathe{
      0%{filter:saturate(.96) brightness(.95)}
      50%{filter:saturate(1.08) brightness(1.03)}
      100%{filter:saturate(1) brightness(1)}
    }
  </style>
</head>
<body class="home-screen">
  <div class="bg-atm"></div>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="home.html" class="logo">Family<span>Flix</span></a>
      <div class="nav-tabs">
        <button class="nav-tab active" data-type="">Inicio</button>
        <button class="nav-tab" data-type="pelicula">Peliculas</button>
        <button class="nav-tab" data-type="serie">Series</button>
      </div>
      <div class="nav-r">
        <span id="navProfile" style="font-size:12px;color:var(--cream3)"></span>
        <a href="admin.html" class="btn btn-outline" id="adminBtn" style="display:none;padding:8px 16px;font-size:13px">Admin</a>
        <button class="tt" onclick="toggleTheme()"></button>
        <button class="btn btn-ghost" onclick="logout()" style="padding:8px 14px;font-size:13px">Salir</button>
      </div>
    </div>
  </nav>

  <main class="mt">
    <section class="hero" id="heroBanner">
      <div class="hero-bg" id="heroBg"></div>
      <div class="hero-vignette"></div>
      <div class="hero-content" id="heroContent"></div>
    </section>

    <div class="search-zone">
      <div class="search-box">
        <span class="si">Buscar</span>
        <input class="inp" id="searchInput" type="text" placeholder="Buscar pelicula, serie, episodio o genero...">
      </div>
      <div class="chip-row" id="chipRow"></div>
    </div>

    <div id="homeContent"></div>
  </main>

  <div class="modal-bd" id="modalBd" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modalEl">
      <div class="modal-backdrop-tone" id="mBackdropTone" aria-hidden="true"></div>
      <div class="modal-img">
        <div class="modal-media-surface">
          <div id="mThumb"></div>
          <div class="modal-media-controls">
            <div class="modal-media-top">
              <button class="modal-mini-pill" id="mTrailerBtn" type="button" style="display:none">Trailer</button>
              <button class="modal-icon-close" type="button" aria-label="Cerrar" title="Cerrar" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-media-bottom">
              <button class="modal-image-play" id="mPlayBtn" type="button">Reproducir</button>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-eyebrow" id="mType"></div>
        <div class="detail-title-row">
          <h2 class="modal-title" id="mTitle"></h2>
          <button class="fav-heart" id="mFavBtn" type="button" aria-label="Favorito" title="Favorito">&#10084;</button>
        </div>
        <div class="modal-meta" id="mMeta"></div>
        <p class="modal-synopsis" id="mSynopsis"></p>
        <div class="modal-tags" id="mTags"></div>
        <div id="mEpisodesWrap"></div>
      </div>
    </div>
  </div>

  <div class="modal-bd" id="sagaModalBd" onclick="if(event.target===this)closeSagaModal()">
    <div class="modal" id="sagaModalEl">
      <div class="modal-backdrop-tone" id="sagaBackdropTone" aria-hidden="true"></div>
      <div class="saga-modal-body">
        <div class="saga-modal-head">
          <div class="saga-modal-top">
            <div class="saga-modal-copy">
              <div class="modal-eyebrow" id="sagaModalType">Saga</div>
              <h2 class="modal-title" id="sagaModalTitle">Coleccion</h2>
              <div class="saga-modal-meta" id="sagaModalMeta"></div>
              <p class="modal-synopsis" id="sagaModalSynopsis"></p>
            </div>
            <button class="modal-icon-close" type="button" aria-label="Cerrar saga" title="Cerrar saga" onclick="closeSagaModal()">&times;</button>
          </div>
        </div>
        <div class="saga-modal-grid" id="sagaModalGrid"></div>
      </div>
    </div>
  </div>

  <div class="modal-bd trailer-bd" id="trailerBd" onclick="if(event.target===this)closeTrailer()">
    <div class="trailer-modal">
      <div class="trailer-head">
        <div class="trailer-label">Trailer</div>
        <div class="trailer-title" id="trailerTitle">Cargando trailer...</div>
        <button class="modal-icon-close trailer-close" type="button" aria-label="Cerrar trailer" title="Cerrar trailer" onclick="closeTrailer()">&times;</button>
      </div>
      <div class="trailer-body" id="trailerBody">
        <div class="trailer-status"><div class="spin"></div><span>Buscando trailer...</span></div>
      </div>
    </div>
  </div>

  <div class="welcome-bd" id="welcomeBd" aria-hidden="true">
    <div class="welcome-card">
      <div class="welcome-mark">Family<strong>Flix</strong></div>
      <h2 class="welcome-title">Bienvenido<span id="welcomeName">a casa</span></h2>
      <p class="welcome-sub">Tu espacio familiar esta listo. Sigue viendo donde te quedaste o explora el catalogo.</p>
      <div class="welcome-user"><i>F</i><strong id="welcomeUserChip">Invitado</strong></div>
    </div>
  </div>

  <script src="js/shared.js"></script>
  <script>
    requireAuth();

    const sessionUser = getCurrentUser();
    const WELCOME_PENDING_KEY = 'ff_welcome_pending';
    const navProfile = document.getElementById('navProfile');
    const adminBtn = document.getElementById('adminBtn');
    const heroBanner = document.getElementById('heroBanner');
    const heroBg = document.getElementById('heroBg');
    const heroContent = document.getElementById('heroContent');
    const modalEl = document.getElementById('modalEl');
    const mBackdropTone = document.getElementById('mBackdropTone');
    const sagaModalEl = document.getElementById('sagaModalEl');
    const sagaBackdropTone = document.getElementById('sagaBackdropTone');
    navProfile.textContent = `${sessionUser?.nombreMostrado || sessionUser?.usuario || ''} | ${sessionUser?.rol || ''}`;
    if (isAdmin()) adminBtn.style.display = 'inline-flex';

    let activeType = '';
    let activeCategory = '';
    let searchText = '';
    let modalScrollY = 0;
    let overlayLockDepth = 0;
    let heroRotationIndex = 0;
    let heroRotationTimer = null;
    let heroRotationKey = '';
    let heroRotationItems = [];
    let heroRotationItemsKey = '';
    let heroBackdropTimer = null;
    let heroBackdropKey = '';
    let heroBackdropIndex = 0;
    let modalBackdropTimer = null;
    let modalBackdropKey = '';
    let modalBackdropIndex = 0;
    let showcaseTimers = {};
    let showcaseState = {};
    let sagaTimers = {};
    let sagaState = {};
    let activeSagaGroups = [];
    let mobileViewport = false;
    let contentReady = false;
    let episodesReady = false;
    let userStateReady = false;

    document.querySelectorAll('.nav-tab').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-tab').forEach((item) => item.classList.remove('active'));
        btn.classList.add('active');
        activeType = btn.dataset.type || '';
        activeCategory = '';
        renderHero();
        renderChips();
        renderHome();
      });
    });

    document.getElementById('searchInput').addEventListener('input', (event) => {
      searchText = event.target.value.trim().toLowerCase();
      renderHome();
    });

    async function init() {
      showWelcomeIfPending();
      mobileViewport = isMobileViewport();
      const contentPromise = fetchContent();
      const episodesPromise = fetchEpisodes();
      const userStatePromise = loadUserState();

      renderHero();
      renderChips();
      renderHome();

      await contentPromise;
      contentReady = true;
      renderHero();
      renderChips();
      renderHome();

      await episodesPromise;
      episodesReady = true;
      renderHero();
      renderHome();

      await userStatePromise;
      userStateReady = true;
      renderHero();
      renderHome();
    }

    function baseItemsForHome() {
      return FF_STATE.content.filter((item) => {
        if (item.estado !== 'activo') return false;
        if (activeType && item.tipo !== activeType) return false;
        if (!matchesActiveCategory(item)) return false;
        return true;
      });
    }

    function matchesCurrentFilters(item = {}) {
      if (!item || item.estado !== 'activo') return false;
      if (activeType && item.tipo !== activeType) return false;
      if (!matchesActiveCategory(item)) return false;
      return matchesSearchForContent(item);
    }

    function filteredContent() {
      return FF_STATE.content.filter((item) => matchesCurrentFilters(item));
    }

    function displayYear(item = {}) {
      const raw = item?.anio || item?.['a\u00f1o'] || item?.['aÃ±o'] || '';
      const year = Number(String(raw).slice(0, 4));
      const currentYear = new Date().getFullYear() + 1;
      return Number.isFinite(year) && year >= 1900 && year <= currentYear ? year : '';
    }

    function displayDuration(value = '') {
      const text = String(value || '').trim();
      if (!text) return '';
      if (/^\d{1,2}:\d{2}(:\d{2})?$/.test(text)) {
        return text.length === 5 ? `0:${text}` : text;
      }
      const embedded = text.match(/\b(\d{1,2}):(\d{2}):(\d{2})\b/);
      return embedded ? `${embedded[1]}:${embedded[2]}:${embedded[3]}` : '';
    }

    function normalizeFilterValue(value = '') {
      return String(value || '').trim().toLowerCase();
    }

    function isMobileViewport() {
      return typeof window !== 'undefined' && window.matchMedia('(max-width: 640px)').matches;
    }

    function getItemFilterValues(item = {}) {
      return [item.categoria, ...(item.generos || [])]
        .map((value) => String(value || '').trim())
        .filter(Boolean);
    }

    function matchesActiveCategory(item = {}) {
      if (!activeCategory) return true;
      const target = normalizeFilterValue(activeCategory);
      return getItemFilterValues(item).some((value) => normalizeFilterValue(value) === target);
    }

    function matchesEpisodeSearch(episode = {}, serie = {}) {
      if (!searchText) return true;
      const haystack = [
        serie.titulo,
        serie.tituloOriginal,
        episode.titulo,
        episode.tituloOriginal,
        episode.sinopsis,
        episode.temporada,
        episode.numeroEpisodio,
        episode.airDate
      ].join(' ').toLowerCase();
      return haystack.includes(searchText);
    }

    function matchesSearchForContent(item = {}) {
      if (!searchText) return true;
      const extraSeriesText = item.tipo === 'serie'
        ? getSeriesEpisodes(item.id)
            .map((episode) => [episode.titulo, episode.tituloOriginal, episode.sinopsis].join(' '))
            .join(' ')
        : '';
      const haystack = [
        item.titulo,
        item.tituloOriginal,
        item.categoria,
        (item.generos || []).join(' '),
        (item.tags || []).join(' '),
        item.sinopsis,
        extraSeriesText
      ].join(' ').toLowerCase();
      return haystack.includes(searchText);
    }

    function getTimestampValue(...values) {
      for (const value of values) {
        if (value === null || value === undefined || value === '') continue;
        if (typeof value === 'number' && Number.isFinite(value) && value > 1900) {
          return new Date(value, 0, 1).getTime();
        }
        const raw = String(value).trim();
        if (!raw) continue;
        const parsed = new Date(raw.includes('T') ? raw : raw.replace(' ', 'T'));
        if (!Number.isNaN(parsed.getTime())) return parsed.getTime();
        if (/^\d{4}$/.test(raw)) return new Date(Number(raw), 0, 1).getTime();
      }
      return 0;
    }

    function sortNewest(items = [], resolver = () => 0) {
      return [...items].sort((a, b) => {
        const diff = resolver(b) - resolver(a);
        if (diff) return diff;
        return String(a?.titulo || a?.id || '').localeCompare(String(b?.titulo || b?.id || ''), 'es');
      });
    }

    function getRecentContentItems(items = [], limit = 8) {
      return sortNewest(items, (item) => getTimestampValue(item.fechaRegistro, displayYear(item))).slice(0, limit);
    }

    function getRecentEpisodeEntries(limit = 8) {
      const entries = FF_STATE.episodes
        .filter((episode) => episode.estado === 'activo')
        .map((episode) => ({
          episode,
          serie: FF_STATE.content.find((item) => item.id === episode.serieId)
        }))
        .filter((entry) => entry.serie && matchesEpisodeSearch(entry.episode, entry.serie));

      return sortNewest(entries, (entry) =>
        getTimestampValue(entry.episode.fechaRegistro, entry.episode.airDate, entry.serie?.fechaRegistro)
      ).slice(0, limit);
    }

    function getRecentSeriesUpdates(seriesItems = [], limit = 0) {
      const entries = seriesItems.map((serie) => {
        const episodes = getSeriesEpisodes(serie.id)
          .filter((episode) => !searchText || matchesEpisodeSearch(episode, serie));
        const latestEpisode = sortNewest(
          episodes,
          (episode) => getTimestampValue(episode.fechaRegistro, episode.airDate, episode.temporada, episode.numeroEpisodio)
        )[0] || null;

        const seriesTimestamp = getTimestampValue(serie.fechaRegistro, displayYear(serie));
        const episodeTimestamp = latestEpisode
          ? getTimestampValue(latestEpisode.fechaRegistro, latestEpisode.airDate, latestEpisode.temporada, latestEpisode.numeroEpisodio)
          : 0;

        if (!latestEpisode || seriesTimestamp >= episodeTimestamp) {
          return {
            kind: 'series',
            serie,
            timestamp: seriesTimestamp
          };
        }

        return {
          kind: 'episode',
          serie,
          episode: latestEpisode,
          timestamp: episodeTimestamp
        };
      });

      const sorted = sortNewest(entries, (entry) => entry.timestamp);
      return limit > 0 ? sorted.slice(0, limit) : sorted;
    }

    function getHomeContinueWatchingItems(allItems = []) {
      const latestMovie = allItems.find((entry) => entry.kind === 'content' && entry.item?.tipo === 'pelicula') || null;
      const latestEpisode = allItems.find((entry) => entry.kind === 'episode') || null;
      return [latestEpisode, latestMovie]
        .filter(Boolean)
        .sort((a, b) => new Date(b.progress?.ultimaVisualizacion || 0) - new Date(a.progress?.ultimaVisualizacion || 0));
    }

    function buildShowcaseEntryFromContent(item) {
      return {
        kind: 'content',
        content: item,
        timestamp: getTimestampValue(item.fechaRegistro, displayYear(item))
      };
    }

    function getHomeRecentShowcaseEntries(items = [], limit = 3, sagaGroups = []) {
      const movies = items
        .filter((item) => item.tipo === 'pelicula')
        .map(buildShowcaseEntryFromContent);
      const seriesUpdates = getRecentSeriesUpdates(items.filter((item) => item.tipo === 'serie'))
        .map((entry) => ({
          kind: entry.kind,
          serie: entry.serie,
          episode: entry.episode || null,
          timestamp: entry.timestamp
        }));

      return collapseSagaShowcaseEntries(
        sortNewest([...movies, ...seriesUpdates], (entry) => entry.timestamp),
        sagaGroups
      ).slice(0, limit);
    }

    function getContinueWatchingForType(items = [], type = '') {
      if (type === 'pelicula') {
        return items.filter((entry) => entry.kind === 'content' && entry.item?.tipo === 'pelicula');
      }
      if (type === 'serie') {
        return items.filter((entry) => entry.kind === 'episode');
      }
      return items;
    }

    function getFilterOptions(type = '') {
      return [''].concat([...new Set(
        FF_STATE.content
          .filter((item) => item.estado === 'activo' && item.tipo === type)
          .flatMap((item) => {
            const values = (item.generos || []).filter(Boolean);
            return values.length ? values : [item.categoria];
          })
          .filter(Boolean)
      )].sort());
    }

    function renderSection(title, icon, body, subtitle = '') {
      return `
        <section class="section">
          <div class="section-head"><div class="section-title"><span>${escapeHtml(icon)}</span>${escapeHtml(title)}</div><div class="section-line"></div></div>
          ${subtitle ? `<div class="section-sub">${escapeHtml(subtitle)}</div>` : ''}
          ${body}
        </section>`;
    }

    function normalizeSagaValue(value = '') {
      return String(value || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, ' ')
        .trim();
    }

    function splitSagaTokens(value = '') {
      return String(value || '')
        .replace(/[()[\]{}:;,.!?/\\]+/g, ' ')
        .split(/\s+/)
        .map((token) => String(token || '').trim())
        .filter(Boolean);
    }

    function isSagaStopWord(token = '') {
      return [
        'a', 'al', 'con', 'de', 'del', 'el', 'en', 'la', 'las', 'los',
        'mi', 'para', 'por', 'the', 'un', 'una', 'unos', 'unas', 'y'
      ].includes(String(token || '').toLowerCase());
    }

    function buildSagaSeedFromTitle(title = '') {
      const tokens = splitSagaTokens(title);
      if (!tokens.length) return null;

      const labelTokens = [];
      const keyTokens = [];
      for (const token of tokens) {
        const normalized = normalizeSagaValue(token);
        if (!normalized) continue;
        labelTokens.push(token);
        if (!isSagaStopWord(normalized) && !/^\d+$/.test(normalized) && normalized.length > 1) {
          keyTokens.push(normalized);
        }
        if (keyTokens.length >= 2) break;
      }

      if (keyTokens.length < 2 || labelTokens.length < 2) return null;
      return {
        key: keyTokens.join('-'),
        label: labelTokens.join(' ')
      };
    }

    function getSagaDescriptor(item) {
      if (!item || item.tipo !== 'pelicula') return null;

      for (const rawTag of (item.tags || [])) {
        const tag = String(rawTag || '').trim();
        const match = tag.match(/^(saga|coleccion|colección|franquicia|collection|franchise)\s*:\s*(.+)$/i);
        if (match?.[2]) {
          const label = String(match[2] || '').trim();
          const key = normalizeSagaValue(label).replace(/\s+/g, '-');
          if (key) {
            return { key, label, explicit: true };
          }
        }
      }

      const titleSeed = buildSagaSeedFromTitle(item.titulo || item.tituloOriginal || '');
      return titleSeed ? { ...titleSeed, explicit: false } : null;
    }

    function buildSagaGroups(items = []) {
      const groups = new Map();
      items
        .filter((item) => item?.tipo === 'pelicula')
        .forEach((item) => {
          const descriptor = getSagaDescriptor(item);
          if (!descriptor?.key) return;
          if (!groups.has(descriptor.key)) {
            groups.set(descriptor.key, {
              key: descriptor.key,
              label: descriptor.label,
              explicit: Boolean(descriptor.explicit),
              items: []
            });
          }
          groups.get(descriptor.key).items.push(item);
        });

      return [...groups.values()]
        .map((group) => {
          const sortedItems = sortNewest(
            [...new Map(group.items.map((item) => [item.id, item])).values()],
            (item) => getTimestampValue(item.fechaRegistro, displayYear(item))
          ).reverse();
          const years = sortedItems.map((item) => Number(displayYear(item) || 0)).filter(Boolean);
          return {
            ...group,
            items: sortedItems,
            leadItem: sortedItems[0] || null,
            latestItem: sortNewest(sortedItems, (item) => getTimestampValue(item.fechaRegistro, displayYear(item)))[0] || sortedItems[0] || null,
            yearStart: years.length ? Math.min(...years) : null,
            yearEnd: years.length ? Math.max(...years) : null
          };
        })
        .filter((group) => group.items.length > 1)
        .sort((a, b) => {
          const diff = getTimestampValue(b.latestItem?.fechaRegistro, displayYear(b.latestItem))
            - getTimestampValue(a.latestItem?.fechaRegistro, displayYear(a.latestItem));
          if (diff) return diff;
          return String(a.label || '').localeCompare(String(b.label || ''), 'es');
        });
    }

    function getSagaLookup(groups = []) {
      const lookup = new Map();
      groups.forEach((group) => {
        group.items.forEach((item) => {
          lookup.set(item.id, group);
        });
      });
      return lookup;
    }

    function buildSagaYearLabel(group) {
      if (!group?.yearStart && !group?.yearEnd) return 'Coleccion';
      if (group.yearStart && group.yearEnd && group.yearStart !== group.yearEnd) {
        return `${group.yearStart} - ${group.yearEnd}`;
      }
      return String(group.yearStart || group.yearEnd || 'Coleccion');
    }

    function buildSagaTitlesPreview(group) {
      if (!group?.items?.length) return 'Elige una pelicula de la saga.';
      const sample = group.items.slice(0, 3).map((item) => item.titulo).filter(Boolean);
      const remainder = group.items.length - sample.length;
      return `${sample.join(' • ')}${remainder > 0 ? ` +${remainder} mas` : ''}`;
    }

    function buildSagaSummary(group) {
      if (!group?.items?.length) return 'Coleccion disponible';
      return `${group.items.length} peliculas en una sola capsula.`;
    }

    function buildSagaEntry(group) {
      return {
        kind: 'saga',
        saga: group,
        timestamp: getTimestampValue(group.latestItem?.fechaRegistro, displayYear(group.latestItem))
      };
    }

    function collapseSagaShowcaseEntries(entries = [], groups = []) {
      const lookup = getSagaLookup(groups);
      const seenGroups = new Set();
      const collapsed = [];

      entries.forEach((entry) => {
        if (entry.kind === 'content' && entry.content?.tipo === 'pelicula') {
          const group = lookup.get(entry.content.id);
          if (group) {
            if (!seenGroups.has(group.key)) {
              seenGroups.add(group.key);
              collapsed.push(buildSagaEntry(group));
            }
            return;
          }
        }
        collapsed.push(entry);
      });

      return collapsed;
    }

    function renderSagaSlidesMarkup(group) {
      const items = group?.items?.length ? group.items : [group?.leadItem].filter(Boolean);
      return items.map((item, index) => `
        <div class="saga-card__slide ${index === 0 ? 'is-active' : ''}" data-saga-slide="${index}">
          ${mediaCardImage(item.portadaUrl || item.backdropUrl, 'FILM', item.titulo || group.label)}
        </div>
      `).join('');
    }

    function renderSagaCard(group, options = {}) {
      if (!group?.items?.length) return '';
      return `
        <article class="card card-w saga-card ${options.compact ? 'card--compact' : ''}" onclick="openSagaModal('${escapeHtml(group.key)}')">
          <div class="card-img" data-saga-id="${escapeHtml(group.key)}">
            <div class="saga-card__slides">${renderSagaSlidesMarkup(group)}</div>
            <div class="saga-card__pill">Saga</div>
            <div class="saga-card__count">${group.items.length} peliculas</div>
            <div class="card-overlay"><div class="play-btn">Abrir coleccion</div></div>
            <div class="card-shine"></div>
          </div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(group.label)}</div>
            <div class="saga-card__sub"><span>${escapeHtml(buildSagaYearLabel(group))}</span><span>${escapeHtml(buildSagaSummary(group))}</span></div>
            <div class="saga-card__titles">${escapeHtml(buildSagaTitlesPreview(group))}</div>
          </div>
        </article>`;
    }

    function renderSagaChoiceCard(item) {
      const progressState = getContentResumeState(item);
      const extraMeta = [
        item.categoria || '',
        displayYear(item) ? String(displayYear(item)) : '',
        displayDuration(item.duracion) || ''
      ].filter(Boolean).join(' • ');

      return `
        <article class="card card-w saga-choice-card" onclick="openDetailsFromSaga('${escapeHtml(item.id)}')">
          <div class="card-img">
            ${mediaCardImage(item.portadaUrl, 'FILM', item.titulo)}
            ${mediaBadge(item.tipo, progressState.percent)}
            <div class="card-overlay"><div class="play-btn">Abrir ficha</div></div>
            <div class="card-shine"></div>
            ${progressState.percent > 0 ? `<div class="prog-strip"><div class="prog-fill" style="width:${progressState.percent}%"></div></div>` : ''}
          </div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(item.titulo)}</div>
            <div class="card-sub"><span>${escapeHtml(extraMeta || 'Pelicula')}</span></div>
            <div class="card-extra">${escapeHtml(item.sinopsis || 'Abre la ficha para ver detalles y reproducir cuando quieras.')}</div>
          </div>
        </article>`;
    }

    function renderSagaRow(title, groups, subtitle = '') {
      return renderSection(
        title,
        'Saga',
        `<div class="saga-grid">${groups.map((group) => renderSagaCard(group)).join('')}</div>`,
        subtitle
      );
    }

    function renderEpisodeProgressMeta(serieId, episode) {
      const progress = getEpisodeProgressState(serieId, episode.id, episode.duracion);
      if (!progress.hasProgress) {
        return displayDuration(episode.duracion) || 'Sin empezar';
      }

      if (progress.durationSeconds) {
        return `${progress.percent}% visto | ${fmtDurationSeconds(progress.viewedSeconds)} / ${fmtDurationSeconds(progress.durationSeconds)}`;
      }

      return `${progress.percent}% visto`;
    }

    function renderEpisodeCard(entry) {
      const { serie, episode } = entry;
      const progress = getEpisodeProgressState(serie.id, episode.id, episode.duracion);
      return `
        <article class="card episode-grid-card" onclick="playEpisode('${serie.id}','${episode.id}')">
          <div class="card-img">
            ${mediaCardImage(episode.portadaUrl || serie.portadaUrl, 'EP', `${serie.titulo} ${episode.titulo}`)}
            ${mediaBadge('episodio', progress.percent)}
            <div class="card-shine"></div>
            ${progress.hasProgress ? `<div class="prog-strip"><div class="prog-fill" style="width:${progress.percent}%"></div></div>` : ''}
          </div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(serie.titulo)}</div>
            <div class="card-sub"><span>T${episode.temporada}E${episode.numeroEpisodio}</span><span>${escapeHtml(episode.titulo)}</span></div>
            <div class="episode-extra">${escapeHtml(renderEpisodeProgressMeta(serie.id, episode))}</div>
          </div>
        </article>`;
    }

    function renderSeriesUpdateCard(entry) {
      if (entry.kind === 'series') {
        const item = entry.serie;
        const progressState = getContentResumeState(item);
        return `
          <article class="card card-w" onclick="openDetails('${item.id}')">
            <div class="card-img">
              ${mediaCardImage(item.portadaUrl, 'TV', item.titulo)}
              ${mediaBadge(item.tipo, progressState.percent)}
              <div class="card-overlay"><div class="play-btn">Abrir serie</div></div>
              <div class="card-shine"></div>
              ${progressState.percent > 0 ? `<div class="prog-strip"><div class="prog-fill" style="width:${progressState.percent}%"></div></div>` : ''}
            </div>
            <div class="card-body">
              <div class="card-title">${escapeHtml(item.titulo)}</div>
              <div class="card-sub"><span>Serie recien añadida</span><span>${escapeHtml(String(displayYear(item) || ''))}</span></div>
            </div>
          </article>`;
      }

      return renderEpisodeCard(entry);
    }

    function renderShowcaseCard(entry) {
      if (entry.kind === 'saga') {
        return renderSagaCard(entry.saga);
      }

      if (entry.kind === 'content') {
        const item = entry.content;
        const progressState = getContentResumeState(item);
        return `
          <article class="card card-w showcase-card" onclick="openDetails('${item.id}')">
            <div class="card-img">
              ${mediaCardImage(item.portadaUrl, item.tipo === 'serie' ? 'TV' : 'FILM', item.titulo)}
              ${mediaBadge(item.tipo, progressState.percent)}
              <div class="card-overlay"><div class="play-btn">${item.tipo === 'serie' ? 'Abrir serie' : 'Ver pelicula'}</div></div>
              <div class="card-shine"></div>
            </div>
            <div class="card-body">
              <div class="card-title">${escapeHtml(item.titulo)}</div>
              <div class="card-sub"><span>${escapeHtml(item.tipo === 'serie' ? 'Serie' : 'Pelicula')}</span><span>${escapeHtml(String(displayYear(item) || ''))}</span></div>
            </div>
          </article>`;
      }

      if (entry.kind === 'series') {
        return renderSeriesUpdateCard(entry);
      }

      return renderEpisodeCard(entry);
    }

    function renderFilterBar(type = '') {
      const filters = getFilterOptions(type);
      return `
        <div class="inline-filter-row">
          ${filters.map((category) => {
            const label = category || 'Todas';
            const active = category === activeCategory ? 'on' : '';
            return `<button class="chip ${active}" type="button" onclick="setCategory('${escapeHtml(category)}')">${escapeHtml(label)}</button>`;
          }).join('')}
        </div>`;
    }

    function stopShowcaseRotators() {
      Object.values(showcaseTimers).forEach((timer) => clearInterval(timer));
      showcaseTimers = {};
      showcaseState = {};
    }

    function setShowcaseIndex(id, nextIndex) {
      const root = document.querySelector(`[data-showcase-id="${id}"]`);
      if (!root) return;
      const slides = [...root.querySelectorAll('.showcase-slide')];
      const dots = [...root.querySelectorAll('.showcase-dot')];
      if (!slides.length) return;

      const normalized = (nextIndex + slides.length) % slides.length;
      showcaseState[id] = normalized;

      slides.forEach((slide, index) => slide.classList.toggle('is-active', index === normalized));
      dots.forEach((dot, index) => dot.classList.toggle('is-active', index === normalized));
    }

    function setupShowcaseRotators() {
      stopShowcaseRotators();
      document.querySelectorAll('[data-showcase-id]').forEach((root) => {
        const id = root.dataset.showcaseId;
        const slides = root.querySelectorAll('.showcase-slide');
        if (!slides.length) return;

        showcaseState[id] = 0;
        setShowcaseIndex(id, 0);

        root.querySelectorAll('.showcase-dot').forEach((dot) => {
          dot.addEventListener('click', () => {
            setShowcaseIndex(id, Number(dot.dataset.index || 0));
          });
        });

        if (slides.length > 1) {
          showcaseTimers[id] = setInterval(() => {
            setShowcaseIndex(id, (showcaseState[id] || 0) + 1);
          }, 7600);
        }
      });
    }

    function stopSagaRotators() {
      Object.values(sagaTimers).forEach((timer) => clearInterval(timer));
      sagaTimers = {};
      sagaState = {};
    }

    function setSagaPosterIndex(instanceId, nextIndex) {
      const root = document.querySelector(`[data-saga-instance="${instanceId}"]`);
      if (!root) return;
      const slides = [...root.querySelectorAll('[data-saga-slide]')];
      if (!slides.length) return;

      const normalized = (nextIndex + slides.length) % slides.length;
      sagaState[instanceId] = normalized;
      slides.forEach((slide, index) => slide.classList.toggle('is-active', index === normalized));
    }

    function setupSagaRotators() {
      stopSagaRotators();
      document.querySelectorAll('[data-saga-id]').forEach((root, index) => {
        const instanceId = `${root.dataset.sagaId || 'saga'}::${index}`;
        root.dataset.sagaInstance = instanceId;
        const slides = root.querySelectorAll('[data-saga-slide]');
        if (slides.length <= 1) return;

        sagaState[instanceId] = 0;
        setSagaPosterIndex(instanceId, 0);
        sagaTimers[instanceId] = setInterval(() => {
          setSagaPosterIndex(instanceId, (sagaState[instanceId] || 0) + 1);
        }, 3600);
      });
    }

    function renderHero() {
      if (activeType) {
        stopHeroRotation();
        stopHeroBackdropRotation();
        document.body.classList.add('home-filtered');
        heroBanner.style.display = 'none';
        return;
      }

      document.body.classList.remove('home-filtered');
      heroBanner.style.display = '';
      const heroItems = getHeroItems();
      const featured = heroItems[heroRotationIndex % heroItems.length];

      if (!featured) {
        stopHeroRotation();
        stopHeroBackdropRotation();
        swapHeroBackground(heroBg, '<div class="hero-bg-ph">FILM</div>');
        heroContent.innerHTML = !contentReady
          ? '<h1 class="hero-title">Cargando contenido</h1><p class="hero-desc">Estamos preparando peliculas y series para ti.</p>'
          : '<h1 class="hero-title">Sin contenido</h1>';
        return;
      }

      syncHeroRotation(heroItems);
      const backdropSources = getHeroBackdropSources(featured);
      syncHeroBackdropRotation(featured, backdropSources);
      renderHeroBackground(featured, backdropSources);

      const resumeState = getContentResumeState(featured);
      const primaryLabel = getPrimaryActionLabel(featured);
      const trailerButton = ['pelicula', 'serie'].includes(featured.tipo)
        ? `<button class="btn btn-outline btn-lg hero-action-btn hero-action-btn--trailer" type="button" aria-label="Trailer" onclick="openTrailer('${featured.id}')"><span class="hero-action-icon hero-action-icon--trailer">T</span><span class="hero-action-label">Trailer</span></button>`
        : '';
      const heroDots = heroItems.length > 1
        ? `<div class="hero-dots" aria-label="Destacados">${heroItems.map((item, index) => `<button class="hero-dot ${index === (heroRotationIndex % heroItems.length) ? 'on' : ''}" type="button" aria-label="Destacado ${index + 1}" onclick="setHeroIndex(${index})"></button>`).join('')}</div>`
        : '';
      const heroMeta = [
        displayYear(featured) ? `<span class="hero-meta-item">${escapeHtml(String(displayYear(featured)))}</span>` : '',
        featured.categoria ? `<span class="hero-meta-item">${escapeHtml(featured.categoria)}</span>` : '',
        displayDuration(featured.duracion) ? `<span class="hero-meta-item">${escapeHtml(displayDuration(featured.duracion))}</span>` : '',
        buildRatingPill(featured, { compact: true })
      ].filter(Boolean).join('');
      heroContent.innerHTML = `
        <div class="hero-eyebrow">${featured.tipo === 'serie' ? 'Serie destacada' : 'Pelicula destacada'}</div>
        <h1 class="hero-title">${escapeHtml(featured.titulo)}</h1>
        <p class="hero-desc">${escapeHtml(featured.sinopsis || 'Sinopsis no disponible.')}</p>
        <div class="hero-meta">${heroMeta}</div>
        <div class="hero-actions">
          <button class="btn btn-amber btn-lg hero-action-btn" type="button" aria-label="${escapeHtml(primaryLabel)}" onclick="playPrimaryAction('${featured.id}')"><span class="hero-action-icon">&#9654;</span><span class="hero-action-label">${escapeHtml(primaryLabel)}</span></button>
          <button class="btn btn-ghost btn-lg hero-action-btn hero-action-btn--info" type="button" aria-label="Mas informacion" onclick="openDetails('${featured.id}')"><span class="hero-action-icon hero-action-icon--info">i</span><span class="hero-action-label">Mas informacion</span></button>
          ${trailerButton}
        </div>
        ${resumeState.percent > 0 ? `<div class="hero-progress"><div class="hero-prog-bar"><div class="hero-prog-fill" style="width:${resumeState.percent}%"></div></div><div class="hero-prog-label">${resumeState.percent}% avanzado</div></div>` : ''}
        ${heroDots}
      `;
      animateHeroContentSwap();
    }

    function getHeroItems() {
      const base = baseItemsForHome();
      const featured = base.filter((item) => item.destacado);
      const items = featured.length ? featured : base;
      const key = items.map((item) => item.id).join('|');
      if (heroRotationItemsKey !== key) {
        heroRotationItemsKey = key;
        heroRotationItems = shuffleItems(items);
      }
      return heroRotationItems;
    }

    function syncHeroRotation(items) {
      const rotationEnabled = !activeType && !activeCategory && items.length > 1;
      const key = `${rotationEnabled ? 'on' : 'off'}::${items.map((item) => item.id).join('|')}`;

      if (heroRotationKey !== key) {
        heroRotationKey = key;
        heroRotationIndex = 0;
        stopHeroRotation();
      }

      if (!rotationEnabled) {
        stopHeroRotation();
        return;
      }

      if (heroRotationTimer) return;
      heroRotationTimer = setInterval(() => {
        heroRotationIndex = (heroRotationIndex + 1) % items.length;
        renderHero();
      }, 15000);
    }

    function stopHeroRotation() {
      if (!heroRotationTimer) return;
      clearInterval(heroRotationTimer);
      heroRotationTimer = null;
    }

    function stopHeroBackdropRotation() {
      if (heroBackdropTimer) {
        clearInterval(heroBackdropTimer);
        heroBackdropTimer = null;
      }
      heroBackdropKey = '';
      heroBackdropIndex = 0;
    }

    function stopModalBackdropRotation() {
      if (modalBackdropTimer) {
        clearInterval(modalBackdropTimer);
        modalBackdropTimer = null;
      }
      modalBackdropKey = '';
      modalBackdropIndex = 0;
    }

    function shuffleItems(items = []) {
      const pool = [...items];
      for (let i = pool.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool;
    }

    function getHeroBackdropSources(item) {
      if (!item) return [];
      const raw = String(item.backdropUrl || '').trim();
      const directMatches = raw.match(/https?:\/\/[^\s|,]+/g) || [];
      const parts = directMatches.length ? directMatches : raw.split(/[\n\r|,]+/);
      const urls = [...new Set(parts.map((entry) => String(entry || '').trim()).filter(Boolean))];
      if (urls.length) return urls;
      return item.portadaUrl ? [item.portadaUrl] : [];
    }

    function buildHeroBackdropMarkup(item, backdropUrl) {
      if (backdropUrl) {
        return `<div class="media-image-shell" data-media-fallback="true"><img src="${escapeHtml(backdropUrl)}" alt="" data-title="${escapeHtml(item?.titulo || '')}" data-fallback="FILM" onerror="handleMediaImageError(this)"></div>`;
      }
      return '<div class="hero-bg-ph">FILM</div>';
    }

    function renderHeroBackground(item, sources = getHeroBackdropSources(item)) {
      const selected = sources[heroBackdropIndex % Math.max(1, sources.length)] || '';
      swapHeroBackground(heroBg, buildHeroBackdropMarkup(item, selected));
    }

    function syncHeroBackdropRotation(item, sources = getHeroBackdropSources(item)) {
      const key = item ? `${item.id}::${sources.join('|')}` : '';
      if (heroBackdropKey !== key) {
        if (heroBackdropTimer) {
          clearInterval(heroBackdropTimer);
          heroBackdropTimer = null;
        }
        heroBackdropKey = key;
        heroBackdropIndex = 0;
      }

      if (sources.length <= 1) {
        if (heroBackdropTimer) {
          clearInterval(heroBackdropTimer);
          heroBackdropTimer = null;
        }
        return;
      }

      if (heroBackdropTimer) return;

      heroBackdropTimer = setInterval(() => {
        heroBackdropIndex = (heroBackdropIndex + 1) % sources.length;
        renderHeroBackground(item, sources);
      }, 6800);
    }

    function renderModalBackdropTone(sources = []) {
      const selected = sources[modalBackdropIndex % Math.max(1, sources.length)] || '';
      if (selected) {
        mBackdropTone.style.backgroundImage = `url("${String(selected).replace(/"/g, '\\"')}")`;
        modalEl.classList.add('has-backdrop-tone');
      } else {
        mBackdropTone.style.backgroundImage = '';
        modalEl.classList.remove('has-backdrop-tone');
      }
    }

    function syncModalBackdropRotation(item, sources = getHeroBackdropSources(item)) {
      const key = item ? `${item.id}::${sources.join('|')}` : '';
      if (modalBackdropKey !== key) {
        stopModalBackdropRotation();
        modalBackdropKey = key;
      }

      renderModalBackdropTone(sources);
      if (sources.length <= 1) return;
      if (modalBackdropTimer) return;

      modalBackdropTimer = setInterval(() => {
        modalBackdropIndex = (modalBackdropIndex + 1) % sources.length;
        renderModalBackdropTone(sources);
      }, 5200);
    }

    function setHeroIndex(nextIndex = 0) {
      const items = getHeroItems();
      if (!items.length) return;
      heroRotationIndex = (Number(nextIndex || 0) + items.length) % items.length;
      stopHeroBackdropRotation();
      renderHero();
    }

    function animateHeroContentSwap() {
      heroBanner.classList.remove('hero-animating');
      void heroBanner.offsetWidth;
      heroBanner.classList.add('hero-animating');
      setTimeout(() => {
        heroBanner.classList.remove('hero-animating');
      }, 900);
    }

    function swapHeroBackground(container, markup) {
      const next = document.createElement('div');
      next.className = 'hero-bg-layer';
      next.innerHTML = markup;
      const nextImage = next.querySelector('img');

      const current = container.querySelector('.hero-bg-layer.is-active') || container.querySelector('.hero-bg-layer');
      if (!current) {
        container.innerHTML = '';
        container.appendChild(next);
        const activateFirstLayer = () => {
          requestAnimationFrame(() => next.classList.add('is-active'));
        };
        if (nextImage && !nextImage.complete) {
          let activated = false;
          const safeActivate = () => {
            if (activated) return;
            activated = true;
            activateFirstLayer();
          };
          nextImage.addEventListener('load', safeActivate, { once: true });
          nextImage.addEventListener('error', safeActivate, { once: true });
          setTimeout(safeActivate, 700);
        } else {
          activateFirstLayer();
        }
        return;
      }

      container.appendChild(next);
      let activated = false;
      const activateLayer = () => {
        if (activated) return;
        activated = true;
        current.classList.add('is-leaving');
        requestAnimationFrame(() => next.classList.add('is-active'));
        setTimeout(() => {
          current.remove();
        }, 1500);
      };

      if (nextImage && !nextImage.complete) {
        nextImage.addEventListener('load', activateLayer, { once: true });
        nextImage.addEventListener('error', activateLayer, { once: true });
        setTimeout(activateLayer, 850);
        return;
      }

      activateLayer();
    }

      return;
    }

    function resetHeroParallax() {
      heroBanner.style.setProperty('--hero-shift-x', '0px');
      heroBanner.style.setProperty('--hero-shift-y', '0px');
    }

      const chipRow = document.getElementById('chipRow');

      renderHero();

    function renderHome() {
      const wrap = document.getElementById('homeContent');
      const catalogStillLoading = !contentReady && !FF_STATE.content.length;
      if (catalogStillLoading) {
        wrap.innerHTML = `
          <div class="load-state">
            <div class="spin" aria-hidden="true"></div>
            <h3>Cargando catalogo...</h3>
            <p>Espera un momento mientras preparamos peliculas y series.</p>
          </div>`;
        stopShowcaseRotators();
        stopSagaRotators();
        return;
      }

      const items = filteredContent();
      const rows = [];
      const continueWatchingAll = getContinueWatchingItems().filter((entry) => {
        return entry.kind === 'content'
          ? matchesCurrentFilters(entry.item)
          : matchesCurrentFilters(entry.serie);
      });
      const favoriteItems = FF_STATE.userState.favorites
        .map((favorite) => FF_STATE.content.find((item) => item.id === favorite.contenidoId))
        .filter((item) => matchesCurrentFilters(item));
      const movies = items.filter((item) => item.tipo === 'pelicula');
      const series = items.filter((item) => item.tipo === 'serie');
      const sagaGroups = buildSagaGroups(movies);
      activeSagaGroups = sagaGroups;
      const sagaLookup = getSagaLookup(sagaGroups);
      const standaloneMovies = movies.filter((item) => !sagaLookup.has(item.id));
      const recentMovies = getRecentContentItems(standaloneMovies, 3);
      const recentSeriesUpdates = getRecentSeriesUpdates(series, 3);
      const recentHomeShowcase = getHomeRecentShowcaseEntries(items, 3, sagaGroups);
      const homeContinue = getHomeContinueWatchingItems(continueWatchingAll);
      const movieContinue = getContinueWatchingForType(continueWatchingAll, 'pelicula');
      const seriesContinue = getContinueWatchingForType(continueWatchingAll, 'serie');
      const useMobileShowcase = isMobileViewport();

      if (searchText) {
        if (!activeType && homeContinue.length) {
          rows.push(renderContinueRow(homeContinue, { layout: 'grid' }));
        }
        if (activeType === 'pelicula' && movieContinue.length) {
          rows.push(renderContinueRow(movieContinue, { layout: 'slider', title: 'Continuar viendo peliculas' }));
        }
        if (activeType === 'serie' && seriesContinue.length) {
          rows.push(renderContinueRow(seriesContinue, { layout: 'slider', title: 'Continuar viendo series' }));
        }
        if (!activeType || activeType === 'pelicula') {
          if (sagaGroups.length) rows.push(renderSagaRow('Sagas que coinciden', sagaGroups, 'Cada saga abre un modal propio para elegir pelicula.'));
          if (standaloneMovies.length) rows.push(renderMediaRow('Todas las peliculas', standaloneMovies, 'Filtra por genero arriba de esta seccion.', { showFilters: activeType === 'pelicula', compact: true, filterType: 'pelicula' }));
        }
        if (!activeType || activeType === 'serie') {
          if (recentSeriesUpdates.length) rows.push(renderSeriesUpdateRow('Novedades en series', recentSeriesUpdates));
          else if (series.length) rows.push(renderMediaRow('Series que coinciden', series));
        }
      } else if (activeType === 'pelicula') {
        if (sagaGroups.length) rows.push(renderSagaRow('Sagas y colecciones', sagaGroups, 'Las franquicias se agrupan en una sola capsula para que no aparezcan repetidas.'));
        if (recentMovies.length) {
          rows.push(
            useMobileShowcase
              ? renderShowcaseRow('Recien añadidas', 'movie-recent', recentMovies.map(buildShowcaseEntryFromContent))
              : renderMediaRow('Recien añadidas', recentMovies)
          );
        }
        if (movieContinue.length) rows.push(renderContinueRow(movieContinue, { layout: 'slider', title: 'Continuar viendo peliculas' }));
        if (standaloneMovies.length) rows.push(renderMediaRow('Todas las peliculas', sortNewest(standaloneMovies, (item) => getTimestampValue(item.fechaRegistro, displayYear(item))), 'Filtra por genero arriba de esta seccion.', { showFilters: true, compact: true, filterType: 'pelicula' }));
      } else if (activeType === 'serie') {
        if (recentSeriesUpdates.length) {
          rows.push(
            useMobileShowcase
              ? renderShowcaseRow('Novedades en series', 'series-recent', recentSeriesUpdates)
              : renderSeriesUpdateRow('Novedades en series', recentSeriesUpdates)
          );
        }
        if (seriesContinue.length) rows.push(renderContinueRow(seriesContinue, { layout: 'slider', title: 'Continuar viendo series' }));
        if (series.length) rows.push(renderMediaRow('Todas las series', sortNewest(series, (item) => getTimestampValue(item.fechaRegistro, displayYear(item))), 'Filtra por genero arriba de esta seccion.', { showFilters: true, compact: true, filterType: 'serie' }));
      } else {
        if (homeContinue.length) rows.push(renderContinueRow(homeContinue, { layout: 'grid' }));
        if (favoriteItems.length) rows.push(renderMediaCarousel('Tus likes', favoriteItems, 'Este apartado se mantiene deslizandose hacia la derecha.'));
        if (sagaGroups.length) rows.push(renderSagaRow('Sagas para maraton', sagaGroups, 'Abre la coleccion y elige la pelicula que quieras sin ver toda la saga repetida en la lista.'));
        if (recentHomeShowcase.length) {
          rows.push(
            useMobileShowcase
              ? renderShowcaseRow('Recien añadidas', 'home-recent', recentHomeShowcase)
              : renderMixedRow('Recien añadidas', recentHomeShowcase)
          );
        }
      }

      wrap.innerHTML = rows.length ? rows.join('') : `
        <div class="empty">
          <h3>No hay resultados</h3>
          <p>Prueba con otro texto o cambia el filtro.</p>
        </div>`;
      setupShowcaseRotators();
      setupSagaRotators();
    }

    function showWelcomeIfPending() {
      const raw = sessionStorage.getItem(WELCOME_PENDING_KEY) || localStorage.getItem(WELCOME_PENDING_KEY) || '';
      if (!raw) return;

      sessionStorage.removeItem(WELCOME_PENDING_KEY);
      localStorage.removeItem(WELCOME_PENDING_KEY);

      let payload = null;
      try {
        payload = JSON.parse(raw);
      } catch {
        payload = null;
      }

      const ts = Number(payload?.ts || 0);
      if (ts && Date.now() - ts > 180000) return;

      const welcomeBd = document.getElementById('welcomeBd');
      const welcomeName = document.getElementById('welcomeName');
      const welcomeUserChip = document.getElementById('welcomeUserChip');
      const displayName = payload?.nombre || sessionUser?.nombreMostrado || sessionUser?.usuario || 'Familia';

      welcomeName.textContent = displayName;
      welcomeUserChip.textContent = displayName;
      requestAnimationFrame(() => {
        welcomeBd.classList.add('show');
      });

      setTimeout(() => {
        welcomeBd.classList.remove('show');
      }, 2200);
    }

    function openSagaModal(sagaKey) {
      const group = activeSagaGroups.find((entry) => entry.key === sagaKey);
      if (!group) return;

      document.getElementById('sagaModalType').textContent = group.explicit ? 'Saga curada' : 'Saga detectada';
      document.getElementById('sagaModalTitle').textContent = group.label;
      document.getElementById('sagaModalMeta').innerHTML = [
        `<span>${escapeHtml(`${group.items.length} peliculas`)}</span>`,
        `<span>${escapeHtml(buildSagaYearLabel(group))}</span>`,
        `<span>${escapeHtml(group.explicit ? 'Agrupacion manual' : 'Agrupacion automatica') }</span>`
      ].join('');
      document.getElementById('sagaModalSynopsis').textContent = group.items.length
        ? `Selecciona cualquiera de estas peliculas de ${group.label}. Al tocar una se abre su ficha para verla con calma, no se reproduce automaticamente.`
        : 'No hay peliculas disponibles en esta saga.';
      document.getElementById('sagaModalGrid').innerHTML = group.items.map(renderSagaChoiceCard).join('');
      setSagaBackdrop(group);
      sagaModalEl.scrollTop = 0;
      const sagaBody = sagaModalEl.querySelector('.saga-modal-body');
      if (sagaBody) sagaBody.scrollTop = 0;
      lockModalBackground();
      document.getElementById('sagaModalBd').classList.add('open');
    }

    function closeSagaModal() {
      document.getElementById('sagaModalBd').classList.remove('open');
      sagaModalEl.classList.remove('has-backdrop-tone');
      sagaBackdropTone.style.backgroundImage = '';
      unlockModalBackground();
    }

    function openDetailsFromSaga(contentId) {
      closeSagaModal();
      requestAnimationFrame(() => {
        openDetails(contentId);
      });
    }

    function openDetails(contentId) {
      const item = FF_STATE.content.find((content) => content.id === contentId);
      if (!item) return;
      const modal = document.getElementById('modalBd');
      const trailerBtn = document.getElementById('mTrailerBtn');
      const episodes = getSeriesEpisodes(item.id);
      const primaryLabel = getPrimaryActionLabel(item);
      const modalBackdropSources = getHeroBackdropSources(item);

      document.getElementById('mType').textContent = item.tipo === 'serie' ? 'Serie' : 'Pelicula';
      document.getElementById('mThumb').innerHTML = mediaCardImage(item.portadaUrl, item.tipo === 'serie' ? 'TV' : 'FILM', item.titulo);
      syncModalBackdropRotation(item, modalBackdropSources);
      document.getElementById('mTitle').textContent = item.titulo;
      document.getElementById('mMeta').innerHTML = [
        displayYear(item),
        item.categoria,
        displayDuration(item.duracion),
        item.clasificacion
      ]
        .filter(Boolean)
        .map((value) => `<span class="modal-meta-item">${escapeHtml(String(value))}</span>`)
        .concat(buildRatingPill(item, { showCount: true, showSource: true }))
        .join('');
      document.getElementById('mSynopsis').textContent = item.sinopsis || 'Sinopsis no disponible.';
      document.getElementById('mTags').innerHTML = (item.tags || []).map((tag) => `<span class="tag">#${escapeHtml(tag)}</span>`).join('');
      document.getElementById('mPlayBtn').textContent = primaryLabel;
      document.getElementById('mPlayBtn').onclick = () => playPrimaryAction(item.id);

      if (['pelicula', 'serie'].includes(item.tipo)) {
        trailerBtn.style.display = 'inline-flex';
        trailerBtn.onclick = () => openTrailer(item.id);
      } else {
        trailerBtn.style.display = 'none';
        trailerBtn.onclick = null;
      }

      const favBtn = document.getElementById('mFavBtn');
      updateFavButton(favBtn, item);
      favBtn.onclick = () => toggleFavoriteFromModal(item, favBtn);

      document.getElementById('mEpisodesWrap').innerHTML = item.tipo === 'serie'
        ? renderEpisodesInModal(item, episodes)
        : '';

      modal.scrollTop = 0;
      modalEl.scrollTop = 0;
      const modalBody = modalEl.querySelector('.modal-body');
      const episodesScroller = modalEl.querySelector('.modal-episodes');
      if (modalBody) modalBody.scrollTop = 0;
      if (episodesScroller) episodesScroller.scrollTop = 0;
      lockModalBackground();
      modal.classList.add('open');
    }

    function renderEpisodesInModal(serie, episodes) {
      const seasons = buildSeasonsMap(episodes);
      if (!episodes.length) {
        return '<div class="modal-episodes"><div class="season-box">Esta serie aun no tiene episodios cargados.</div></div>';
      }

      const blocks = [];
      for (const [season, list] of seasons.entries()) {
        blocks.push(`
          <div class="season-box">
            <div class="season-title">Temporada ${season}</div>
            ${list.map((episode) => `
              <div class="episode-item">
                <div>
                  <div><strong>E${episode.numeroEpisodio}.</strong> ${escapeHtml(episode.titulo)}</div>
                  <div class="ep-meta">${escapeHtml(renderEpisodeProgressMeta(serie.id, episode))}</div>
                  ${getEpisodeProgressState(serie.id, episode.id, episode.duracion).hasProgress ? `<div class="modal-episode-progress"><div class="modal-episode-progress-fill" style="width:${getEpisodeProgressState(serie.id, episode.id, episode.duracion).percent}%"></div></div>` : ''}
                </div>
                <button class="btn btn-ghost" type="button" onclick="playEpisode('${serie.id}','${episode.id}')">${getEpisodeProgressState(serie.id, episode.id, episode.duracion).hasProgress ? 'Continuar' : 'Ver'}</button>
              </div>`).join('')}
          </div>`);
      }
      return `<div class="modal-episodes">${blocks.join('')}</div>`;
    }

    async function toggleFavoriteFromModal(item, btn) {
      const user = getCurrentUser();
      try {
        await toggleFavoriteRemote({
          usuarioId: user.id,
          contenidoId: item.id,
          episodioId: '',
          tipo: item.tipo
        });
        await loadUserState();
        updateFavButton(btn, item);
        pulseFavButton(btn);
        renderHome();
      } catch (error) {
        showToast(error.message || 'No se pudo actualizar favorito', 'error');
      }
    }

    function updateFavButton(btn, item) {
      const on = isFavorite(item.tipo, item.id, '');
      btn.classList.toggle('on', on);
      btn.setAttribute('aria-pressed', String(on));
      btn.setAttribute('title', on ? 'Quitar de favoritos' : 'Agregar a favoritos');
    }

    function pulseFavButton(btn) {
      btn.classList.remove('pulse');
      void btn.offsetWidth;
      btn.classList.add('pulse');
    }

    function closeModal() {
      document.getElementById('modalBd').classList.remove('open');
      stopModalBackdropRotation();
      modalEl.classList.remove('has-backdrop-tone');
      mBackdropTone.style.backgroundImage = '';
      unlockModalBackground();
    }

    function lockModalBackground() {
      if (overlayLockDepth === 0) {
        modalScrollY = window.scrollY || window.pageYOffset || 0;
        document.body.style.top = `-${modalScrollY}px`;
        document.body.classList.add('modal-open');
      }
      overlayLockDepth += 1;
    }

    function unlockModalBackground() {
      if (overlayLockDepth <= 0) return;
      overlayLockDepth -= 1;
      if (overlayLockDepth > 0) return;
      document.body.classList.remove('modal-open');
      document.body.style.top = '';
      window.scrollTo(0, modalScrollY);
      modalScrollY = 0;
    }

    function playContent(id) {
      window.location.href = `player.html?id=${encodeURIComponent(id)}&kind=pelicula`;
    }

    function playPrimaryAction(contentId) {
      const item = FF_STATE.content.find((content) => content.id === contentId);
      if (!item) return;
      if (item.tipo === 'serie') {
        playSeries(item.id);
        return;
      }
      playContent(item.id);
    }

    function playSeries(id) {
      const episodes = getSeriesEpisodes(id).sort((a, b) => a.temporada - b.temporada || a.numeroEpisodio - b.numeroEpisodio);
      if (!episodes.length) return showToast('Esta serie aun no tiene episodios.', 'error');
      const record = (FF_STATE.userState.progress || [])
        .filter((item) => item.tipo === 'episodio' && item.contenidoId === id && String(item.completado).toLowerCase() !== 'si')
        .sort((a, b) => new Date(b.ultimaVisualizacion || 0) - new Date(a.ultimaVisualizacion || 0))[0];
      const target = (record ? episodes.find((episode) => episode.id === record.episodioId) : null) || episodes[0];
      playEpisode(id, target.id);
    }

    function playEpisode(serieId, episodioId) {
      window.location.href = `player.html?id=${encodeURIComponent(episodioId)}&serie=${encodeURIComponent(serieId)}&kind=episodio`;
    }

    function getContentResumeState(item) {
      return getContentProgressState(item);
    }

    function getPrimaryActionLabel(item) {
      return getContentResumeState(item).hasProgress ? 'Continuar' : 'Reproducir';
    }

    async function openTrailer(contentId) {
      const item = FF_STATE.content.find((content) => content.id === contentId);
      if (!item) return;
      const trailerBd = document.getElementById('trailerBd');
      const trailerTitle = document.getElementById('trailerTitle');
      const trailerBody = document.getElementById('trailerBody');

      trailerTitle.textContent = item.titulo;
      trailerBody.innerHTML = '<div class="trailer-status"><div class="spin"></div><span>Buscando trailer...</span></div>';
      lockModalBackground();
      trailerBd.classList.add('open');

      try {
        const trailer = await getTrailerData({
          title: item.titulo,
          contentType: item.tipo,
          year: displayYear(item) || 0
        });
        trailerBody.innerHTML = `
          <div class="trailer-frame-wrap">
            <iframe
              class="trailer-frame"
              src="${escapeHtml(trailer.embedUrl)}"
              title="Trailer de ${escapeHtml(item.titulo)}"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen
            ></iframe>
          </div>
          <div class="trailer-note">${escapeHtml(trailer.name || 'Trailer disponible')}</div>
        `;
      } catch (error) {
        trailerBody.innerHTML = `<div class="trailer-status trailer-status--error"><span>${escapeHtml(error.message || 'No se pudo cargar el trailer.')}</span></div>`;
      }
    }

    function closeTrailer() {
      document.getElementById('trailerBd').classList.remove('open');
      document.getElementById('trailerBody').innerHTML = '<div class="trailer-status"><div class="spin"></div><span>Buscando trailer...</span></div>';
      unlockModalBackground();
    }

    window.addEventListener('beforeunload', stopHeroRotation);
    window.addEventListener('beforeunload', stopShowcaseRotators);
    window.addEventListener('resize', debounce(() => {
      const nextMobileViewport = isMobileViewport();
      if (nextMobileViewport === mobileViewport) return;
      mobileViewport = nextMobileViewport;
      renderHome();
    }, 140));

    init();
  </script>
</body>
</html>
