    }

    function renderFilterBar(type = '') {
      const filters = getFilterOptions(type);
      return `
        <div class="inline-filter-row">
          ${filters.map((category) => {
            const label = category || 'Todas';
            const active = normalizeFilterValue(category) === normalizeFilterValue(activeCategory) ? 'on' : '';
            const encoded = encodeURIComponent(category);
            return `<button class="chip ${active}" type="button" onclick="setCategory(decodeURIComponent('${encoded}'))">${escapeHtml(label)}</button>`;
          }).join('')}
        </div>`;
    }

    function stopShowcaseRotators() {
      if (showcaseTimer) clearInterval(showcaseTimer);
      showcaseTimer = null;
      showcaseRotationIds = [];
      showcaseState = {};
      syncAllShowcasePreviewPlayback(true);
    }

    function setShowcaseIndex(id, nextIndex) {
      const root = document.querySelector(`[data-showcase-id="${id}"]`);
      if (!root) return;
      const slides = [...root.querySelectorAll('[data-showcase-slide], .showcase-slide:not([data-showcase-detail])')];
      const details = [...root.querySelectorAll('[data-showcase-detail]')];
      const dots = [...root.querySelectorAll('.showcase-dot')];
      const thumbs = [...root.querySelectorAll('[data-showcase-thumb]')];
      if (!slides.length) return;

      const normalized = (nextIndex + slides.length) % slides.length;
      showcaseState[id] = normalized;

      slides.forEach((slide, index) => {
        const isActive = index === normalized;
        slide.classList.toggle('is-active', isActive);
        slide.setAttribute('aria-hidden', isActive ? 'false' : 'true');
      });
      details.forEach((detail, index) => {
        const isActive = index === normalized;
        detail.classList.toggle('is-active', isActive);
        detail.setAttribute('aria-hidden', isActive ? 'false' : 'true');
      });
      dots.forEach((dot, index) => dot.classList.toggle('is-active', index === normalized));
      thumbs.forEach((thumb, index) => {
        const isActive = index === normalized;
        thumb.classList.toggle('is-active', isActive);
        thumb.setAttribute('aria-pressed', String(isActive));
      });
      syncShowcasePreviewPlayback(root, normalized);
    }

    function setupShowcaseRotators() {
      stopShowcaseRotators();
      document.querySelectorAll('[data-showcase-id]').forEach((root) => {
        const id = root.dataset.showcaseId;
        const slides = root.querySelectorAll('[data-showcase-slide], .showcase-slide:not([data-showcase-detail])');
        if (!slides.length) return;

        showcaseState[id] = 0;
        setShowcaseIndex(id, 0);

        root.querySelectorAll('.showcase-dot').forEach((dot) => {
          dot.addEventListener('click', () => {
            setShowcaseIndex(id, Number(dot.dataset.index || 0));
          });
        });

        root.querySelectorAll('[data-showcase-thumb]').forEach((thumb) => {
          const activateThumb = () => {
            setShowcaseIndex(id, Number(thumb.dataset.index || 0));
          };
          thumb.addEventListener('click', activateThumb);
          if (desktopShowcaseViewport) {
            thumb.addEventListener('pointerenter', activateThumb);
          }
        });
      });
      showcaseRotationIds = [];
    }

    function stopSagaRotators() {
      if (sagaTimer) clearInterval(sagaTimer);
      sagaTimer = null;
      sagaRotationIds = [];
      sagaState = {};
    }

    function setSagaPosterIndex(instanceId, nextIndex) {
      const root = document.querySelector(`[data-saga-instance="${instanceId}"]`);
      if (!root) return;
      const slides = [...root.querySelectorAll('[data-saga-slide]')];
      if (!slides.length) return;

      const normalized = (nextIndex + slides.length) % slides.length;
      sagaState[instanceId] = normalized;
      slides.forEach((slide, index) => slide.classList.toggle('is-active', index === normalized));
    }

    function setupSagaRotators() {
      stopSagaRotators();
      const rotatableIds = [];
      document.querySelectorAll('[data-saga-id]').forEach((root, index) => {
        const instanceId = `${root.dataset.sagaId || 'saga'}::${index}`;
        root.dataset.sagaInstance = instanceId;
        const slides = root.querySelectorAll('[data-saga-slide]');
        if (slides.length <= 1) return;

        sagaState[instanceId] = 0;
        setSagaPosterIndex(instanceId, 0);
        rotatableIds.push(instanceId);
      });

      sagaRotationIds = rotatableIds;
      if (!canAutoRotateHomeRows() || !sagaRotationIds.length) return;

      sagaTimer = setInterval(() => {
        sagaRotationIds.forEach((instanceId) => {
          setSagaPosterIndex(instanceId, (sagaState[instanceId] || 0) + 1);
        });
      }, 6200);
    }

    function canAutoRotateHomeRows() {
      return !mobileViewport
        && typeof document !== 'undefined'
        && !document.hidden
        && !(typeof window !== 'undefined' && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
    }

    function handleDocumentVisibilityChange() {
      if (document.hidden) {
        stopHeroRotation();
        stopHeroBackdropRotation();
        stopShowcaseRotators();
        stopSagaRotators();
        syncAllShowcasePreviewPlayback(true);
        return;
      }

      renderHero();
      queueHomeDeferredWork();
    }

    function getHeroTitleLogoUrl(item = {}) {
      const candidates = [
        item.logoUrl,
        item.titleLogoUrl,
        item.tituloLogoUrl,
        item.heroLogoUrl,
        item.logo
      ];

      return candidates.find((value) => /^https?:\/\//i.test(String(value || '').trim())) || '';
    }

    function renderHeroTitle(item = {}) {
      const logoUrl = getHeroTitleLogoUrl(item);
      if (logoUrl) {
        return `
          <h1 class="hero-title hero-title--logo">
            <img class="hero-title-logo" src="${escapeHtml(logoUrl)}" alt="${escapeHtml(item.titulo || 'Logo del titulo')}">
          </h1>
        `;
      }

      const extraClass = item.tipo === 'serie' ? ' hero-title--series' : '';
      return `<h1 class="hero-title hero-title--styled${extraClass}">${escapeHtml(item.titulo || 'Contenido')}</h1>`;
    }

    function renderSpotlightTitleVisual(item = {}, title = '') {
      const safeTitle = title || item?.titulo || 'Contenido';
      const logoUrl = getHeroTitleLogoUrl(item);
      if (logoUrl) {
        return `
          <div class="continue-spotlight__title-slot">
            <img class="continue-spotlight__title-logo" src="${escapeHtml(logoUrl)}" alt="${escapeHtml(safeTitle)}">
          </div>
        `;
      }

      return `
        <div class="continue-spotlight__title-slot">
          <h2 class="continue-spotlight__title">${escapeHtml(safeTitle)}</h2>
        </div>
      `;
    }

    function renderModalTitleVisual(item = {}) {
      const safeTitle = item?.titulo || 'Contenido';
      const logoUrl = getHeroTitleLogoUrl(item);
      if (logoUrl) {
        return `
          <div class="modal-title-logo-wrap">
            <img class="modal-title-logo" src="${escapeHtml(logoUrl)}" alt="${escapeHtml(safeTitle)}">
          </div>
        `;
      }

      return `<h2 class="modal-title modal-title--text">${escapeHtml(safeTitle)}</h2>`;
    }

    function parsePreviewOffsetValue(value = '') {
      if (value === null || value === undefined || value === '') return NaN;
      const numeric = Number(value);
      if (Number.isFinite(numeric) && numeric >= 0) return numeric;
      return parseDurationToSeconds(String(value || '').trim());
    }

    function isLikelyDirectPreviewUrl(url = '') {
      const text = String(url || '').trim();
      if (!text) return false;
      if (isDriveUrl(text) || /youtube\.com|youtu\.be/i.test(text)) return false;
      return /^(https?:)?\/\//i.test(text)
        || text.startsWith('/')
        || text.startsWith('./')
        || text.startsWith('../')
        || /\.(mp4|webm|ogg|m4v|mov)(?:[?#].*)?$/i.test(text);
    }

    function computeDefaultPreviewStart(durationValue = '') {
      const totalSeconds = Number(parseDurationToSeconds(durationValue || ''));
      if (!Number.isFinite(totalSeconds) || totalSeconds <= 0) return 18;
      const suggested = Math.round(totalSeconds * 0.22);
      return Math.max(12, Math.min(suggested, Math.max(0, totalSeconds - 12)));
    }

    function getPreviewMediaFromItem(item = {}) {
      const explicitUrl = [
        item.previewVideoUrl,
        item.previewUrl,
        item.previewClipUrl,
        item.clipPreviewUrl,
        item.previewMediaUrl,
        item.previewSrc
      ]
        .map((value) => String(value || '').trim())
        .find(Boolean) || '';
      const startSeconds = [
        item.previewStartSeconds,
        item.previewStart,
        item.previewOffset,
        item.previewAt,
        item.previewTime
      ]
        .map((value) => parsePreviewOffsetValue(value))
        .find((value) => Number.isFinite(value) && value >= 0);

      return {
        url: isLikelyDirectPreviewUrl(explicitUrl) ? explicitUrl : '',
        startSeconds: Number.isFinite(startSeconds)
          ? startSeconds
          : computeDefaultPreviewStart(item.duracion || '')
      };
    }

    function getSeriesPreviewEpisode(serie = {}) {
      const episodes = getSeriesEpisodes(serie.id);
      if (!episodes.length) return null;
      return sortNewest(
        episodes,
        (episode) => getTimestampValue(episode.fechaRegistro, episode.airDate, episode.temporada, episode.numeroEpisodio)
      )[0] || episodes[0];
    }

    function getFeatureShowcasePreviewMedia(entry, summaryContent = null) {
      if (!entry) return { url: '', startSeconds: 18 };

      if (entry.kind === 'episode') {
        const episodePreview = getPreviewMediaFromItem(entry.episode || {});
        if (episodePreview.url) return episodePreview;
        return getPreviewMediaFromItem(entry.serie || {});
      }

      if (entry.kind === 'series') {
        const previewEpisode = getSeriesPreviewEpisode(entry.serie || {});
        if (previewEpisode) {
          const episodePreview = getPreviewMediaFromItem(previewEpisode);
          if (episodePreview.url) return episodePreview;
        }
        return getPreviewMediaFromItem(entry.serie || {});
      }

      return getPreviewMediaFromItem(entry.content || entry.item || summaryContent || {});
    }

    function getFeatureShowcaseStageImage(summary = {}) {
      return getHeroBackdropSources(summary.content)[0]
        || summary.ambientArt
        || summary.image
        || '';
    }

    function renderDesktopShowcaseTitleVisual(item = {}, title = '') {
      const safeTitle = title || item?.titulo || 'Contenido';
      const logoUrl = getHeroTitleLogoUrl(item);
      if (logoUrl) {
        return `
          <div class="desktop-showcase__title-slot">
            <img class="desktop-showcase__title-logo" src="${escapeHtml(logoUrl)}" alt="${escapeHtml(safeTitle)}">
          </div>
        `;
      }

      return `
        <div class="desktop-showcase__title-slot">
          <h2 class="desktop-showcase__title">${escapeHtml(safeTitle)}</h2>
        </div>
      `;
    }

    function renderDesktopShowcaseSlide(summary, index) {
      if (!summary?.content) return '';
      const previewMedia = summary.previewMedia || { url: '', startSeconds: 18 };
      const stageImage = getFeatureShowcaseStageImage(summary);
      const metaParts = [
        ...(summary.meta || []).filter(Boolean)
      ];
      const metaHtml = metaParts.length
        ? metaParts.map((value) => `<span>${escapeHtml(value)}</span>`).join('<span>•</span>')
        : '';

      return `
        <div class="desktop-showcase__slide showcase-slide ${index === 0 ? 'is-active' : ''}" data-showcase-slide aria-hidden="${index === 0 ? 'false' : 'true'}">
          <div class="desktop-showcase__visual" data-content-id="${escapeHtml(summary.content.id)}">
            <div class="desktop-showcase__art">
              ${mediaCardImage(stageImage, summary.content.tipo === 'serie' ? 'TV' : 'PLAY', summary.title)}
            </div>
            ${previewMedia.url ? `
              <video
                class="desktop-showcase__video"
                data-showcase-video
                data-start-seconds="${escapeHtml(String(previewMedia.startSeconds || 0))}"
                muted
                playsinline
                loop
                preload="none"
                poster="${escapeHtml(stageImage)}"
                onerror="handleShowcasePreviewError(this)"
                aria-hidden="true"
                tabindex="-1"
              >
                <source src="${escapeHtml(previewMedia.url)}">
              </video>
            ` : ''}
            <div class="desktop-showcase__copy">
              <div class="desktop-showcase__eyebrow">${escapeHtml(summary.typeLabel || 'Destacado')}</div>
              ${renderDesktopShowcaseTitleVisual(summary.content, summary.title)}
              ${metaHtml ? `<div class="desktop-showcase__meta">${metaHtml}</div>` : ''}
              <p class="desktop-showcase__synopsis">${escapeHtml(summary.synopsis || 'Sinopsis no disponible.')}</p>
              <div class="desktop-showcase__actions">
                <button class="btn btn-amber" type="button" onclick="${summary.onclick}">${escapeHtml(summary.buttonLabel || 'Abrir')}</button>
                ${summary.detailAction ? `<button class="btn btn-ghost" type="button" onclick="${summary.detailAction}">Mas informacion</button>` : ''}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderDesktopShowcaseThumb(summary, index) {
      if (!summary?.content) return '';
      const thumbImage = getFeatureShowcaseStageImage(summary) || summary.image || summary.ambientArt;
      const thumbMeta = [summary.meta?.[0] || '', summary.meta?.[1] || ''].filter(Boolean).join(' • ');
      const previewLabel = summary.previewMedia?.url ? 'Clip' : '';

      return `
        <button
          class="desktop-showcase__thumb ${index === 0 ? 'is-active' : ''}"
          type="button"
          data-showcase-thumb
          data-index="${index}"
          aria-label="Mostrar ${escapeHtml(summary.title)}"
          aria-pressed="${index === 0 ? 'true' : 'false'}"
        >
          <span class="desktop-showcase__thumb-media">
            ${mediaCardImage(thumbImage, summary.content.tipo === 'serie' ? 'TV' : 'FILM', summary.title)}
          </span>
          <span class="desktop-showcase__thumb-copy">
            ${previewLabel ? `<span class="desktop-showcase__thumb-badge">${escapeHtml(previewLabel)}</span>` : ''}
            <span class="desktop-showcase__thumb-title">${escapeHtml(summary.title)}</span>
            <span class="desktop-showcase__thumb-meta">${escapeHtml(thumbMeta || summary.typeLabel || 'Destacado')}</span>
          </span>
        </button>
      `;
    }

    function renderDesktopFeatureShowcaseSection(title, id, summaries, subtitle = '', options = {}) {

      return renderSection(
        title,
        options.icon || 'Nuevo',
        `
          <div class="desktop-showcase" data-showcase-id="${escapeHtml(id)}">
            <div class="desktop-showcase__rail">
              <div class="desktop-showcase__spotlight">
                ${summaries.map((summary, index) => renderDesktopShowcaseSlide(summary, index)).join('')}
              </div>
              ${summaries.length > 1 ? `
                <div class="desktop-showcase__thumbs">
                  ${summaries.map((summary, index) => renderDesktopShowcaseThumb(summary, index)).join('')}
                </div>
              ` : ''}
            </div>
          </div>
        `,
        subtitle,
        {
          art: options.art || summaries[0]?.ambientArt || getItemAmbientArt(summaries[0]?.content),
          contentId: summaries[0]?.content?.id || '',
          className: options.className || 'section--feature-showcase'
        }
      );
    }

    function handleShowcasePreviewError(videoEl) {
      if (!videoEl) return;
      videoEl.classList.add('is-hidden');
    }

    function canPlayShowcasePreviewVideos() {
      return desktopShowcaseViewport
        && typeof document !== 'undefined'
        && !document.hidden
        && !(typeof window !== 'undefined' && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
    }

    function primeShowcasePreviewVideo(videoEl) {
      if (!(videoEl instanceof HTMLVideoElement) || videoEl.dataset.previewReady === '1') return;
      videoEl.dataset.previewReady = '1';
      videoEl.muted = true;
      videoEl.playsInline = true;
      videoEl.loop = true;
      videoEl.preload = 'none';

      videoEl.addEventListener('error', () => {
        videoEl.classList.add('is-hidden');
      });
      videoEl.addEventListener('loadedmetadata', () => {
        const startSeconds = Number(videoEl.dataset.startSeconds || 0);
        if (!Number.isFinite(startSeconds) || startSeconds <= 0) return;
        try {
          videoEl.currentTime = Math.min(startSeconds, Math.max(0, (videoEl.duration || startSeconds) - 0.25));
        } catch (error) {
          // Ignore media seek issues and keep the browser default.
        }
      });
    }

    function clearShowcasePreviewDelay(videoEl) {
      if (!videoEl?._previewDelayTimer) return;
      clearTimeout(videoEl._previewDelayTimer);
      videoEl._previewDelayTimer = null;
    }

    function syncShowcasePreviewPlayback(root, activeIndex = 0) {
      if (!(root instanceof HTMLElement)) return;
      const canPlay = canPlayShowcasePreviewVideos();
      const slides = [...root.querySelectorAll('[data-showcase-slide], .showcase-slide:not([data-showcase-detail])')];

      slides.forEach((slide, index) => {
        slide.querySelectorAll('[data-showcase-video]').forEach((videoEl) => {
          primeShowcasePreviewVideo(videoEl);
          clearShowcasePreviewDelay(videoEl);
          if (!canPlay || index !== activeIndex || videoEl.classList.contains('is-hidden')) {
            videoEl.pause();
            const startSeconds = Number(videoEl.dataset.startSeconds || 0);
            if (Number.isFinite(startSeconds) && startSeconds >= 0 && Number.isFinite(videoEl.duration)) {
              try {
                videoEl.currentTime = Math.min(startSeconds, Math.max(0, videoEl.duration - 0.25));
              } catch (error) {
                // Ignore media seek issues while resetting the preview.
              }
            }
            return;
          }

          const startSeconds = Number(videoEl.dataset.startSeconds || 0);
          const playVideo = () => {
            if (Number.isFinite(startSeconds) && startSeconds >= 0 && Number.isFinite(videoEl.duration) && Math.abs(videoEl.currentTime - startSeconds) > 1.5) {
              try {
                videoEl.currentTime = Math.min(startSeconds, Math.max(0, videoEl.duration - 0.25));
              } catch (error) {
                // Ignore seek errors and try to play from the current position.
              }
            }
            const playPromise = videoEl.play();
            if (playPromise && typeof playPromise.catch === 'function') {
              playPromise.catch(() => {});
            }
          };

          videoEl._previewDelayTimer = setTimeout(() => {
            if (videoEl.classList.contains('is-hidden')) return;
            if (videoEl.readyState >= 1) {
              playVideo();
              return;
            }
            videoEl.addEventListener('loadedmetadata', playVideo, { once: true });
            videoEl.load();
          }, SHOWCASE_PREVIEW_DELAY_MS);
        });
      });
    }

    function syncAllShowcasePreviewPlayback(forcePause = false) {
      document.querySelectorAll('[data-showcase-id]').forEach((root) => {
        const id = root.dataset.showcaseId;
        const activeIndex = forcePause ? -1 : Number(showcaseState[id] || 0);
        syncShowcasePreviewPlayback(root, activeIndex);
      });
    }

    function renderHero() {
      if (activeType) {
        stopHeroRotation();
        stopHeroBackdropRotation();
        resetHeroParallax();
        heroRenderKey = '';
        document.body.classList.add('home-filtered');
        heroBanner.style.display = 'none';
        return;
      }

      document.body.classList.remove('home-filtered');
      heroBanner.style.display = '';
      const heroItems = getHeroItems();
      const featured = heroItems[heroRotationIndex % heroItems.length];

      if (!featured) {
        if (!contentReady) {
          heroRenderKey = '';
          renderHeroSkeleton();
          return;
        }
        stopHeroRotation();
        stopHeroBackdropRotation();
        heroRenderKey = 'empty';
        swapHeroBackground(heroBg, '<div class="hero-bg-ph">FILM</div>');
        heroContent.innerHTML = '<h1 class="hero-title">Sin contenido</h1>';
        setDefaultAmbientBackground('');
        return;
      }

      syncHeroRotation(heroItems);
      const backdropSources = getHeroBackdropSources(featured);
      syncHeroBackdropRotation(featured, backdropSources);
      setDefaultAmbientBackground(backdropSources[0] || featured.portadaUrl || '');
      const nextHeroKey = [
        featured.id,
        featured.titulo || '',
        featured.logoUrl || '',
        featured.sinopsis || '',
        backdropSources[0] || '',
        heroRotationIndex % heroItems.length
      ].join('::');

      if (heroRenderKey === nextHeroKey && heroContent.childElementCount) {
        return;
      }

      heroRenderKey = nextHeroKey;
      renderHeroBackground(featured, backdropSources);

      const heroDots = heroItems.length > 1
        ? `<div class="hero-dots" aria-label="Destacados">${heroItems.map((item, index) => `<button class="hero-dot ${index === (heroRotationIndex % heroItems.length) ? 'on' : ''}" type="button" aria-label="Destacado ${index + 1}" onclick="setHeroIndex(${index})"></button>`).join('')}</div>`
        : '';
      heroContent.innerHTML = `
        <div class="hero-panel" data-content-id="${escapeHtml(featured.id)}">
          <div class="hero-copy">
            <div class="hero-title-slot">${renderHeroTitle(featured)}</div>
            <p class="hero-desc">${escapeHtml(featured.sinopsis || 'Sinopsis no disponible.')}</p>
            <div class="hero-mini-actions">
              <button class="btn btn-ghost hero-info-link" type="button" aria-label="Informacion" onclick="openDetails('${featured.id}')">Informacion</button>
            </div>
            ${heroDots}
          </div>
        </div>
      `;
      animateHeroContentSwap();
    }

    function getHeroItems() {
      const base = baseItemsForHome();
      const featured = base.filter((item) => item.destacado);
      const items = featured.length ? featured : base;
      const key = items.map((item) => item.id).join('|');
      if (heroRotationItemsKey !== key) {
        heroRotationItemsKey = key;
        heroRotationItems = shuffleItems(items);
      }
      return heroRotationItems;
    }

    function syncHeroRotation(items) {
      const rotationEnabled = !activeType && !activeCategory && items.length > 1;
      const key = `${rotationEnabled ? 'on' : 'off'}::${items.map((item) => item.id).join('|')}`;

      if (heroRotationKey !== key) {
        heroRotationKey = key;
        heroRotationIndex = 0;
        stopHeroRotation();
      }

      if (!rotationEnabled) {
        stopHeroRotation();
        return;
      }

      if (heroRotationTimer) {
        clearTimeout(heroRotationTimer);
      }

      heroRotationTimer = setTimeout(() => {
        heroRotationTimer = null;
        heroRotationIndex = (heroRotationIndex + 1) % items.length;
        renderHero();
      }, getHeroRotationDuration(items));
    }

    function stopHeroRotation() {
      if (!heroRotationTimer) return;
      clearTimeout(heroRotationTimer);
      heroRotationTimer = null;
    }

    function getHeroRotationDuration(items = []) {
      if (!items.length) return 24000;
      const featured = items[heroRotationIndex % items.length] || items[0] || null;
      const backdropCount = Math.max(1, getHeroBackdropSources(featured).length);
      return Math.min(18000, Math.max(13000, (backdropCount * HERO_BACKDROP_ROTATION_MS) + 600));
    }

    function stopHeroBackdropRotation() {
      if (heroBackdropTimer) {
        clearInterval(heroBackdropTimer);
        heroBackdropTimer = null;
      }
      heroBackdropKey = '';
      heroBackdropIndex = 0;
    }

    function stopModalBackdropRotation() {
      if (modalBackdropTimer) {
        clearInterval(modalBackdropTimer);
        modalBackdropTimer = null;
      }
      modalBackdropKey = '';
      modalBackdropIndex = 0;
    }

    function shuffleItems(items = []) {
      const pool = [...items];
      for (let i = pool.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool;
    }

    function getHeroBackdropSources(item) {
      if (!item) return [];
      const raw = String(item.backdropUrl || '').trim();
      const directMatches = raw.match(/https?:\/\/[^\s|,]+/g) || [];
      const parts = directMatches.length ? directMatches : raw.split(/[\n\r|,]+/);
      const urls = [...new Set(parts.map((entry) => String(entry || '').trim()).filter(Boolean))];
      if (urls.length) return urls;
      return item.portadaUrl ? [item.portadaUrl] : [];
    }

    function buildHeroBackdropMarkup(item, backdropUrl) {
      if (backdropUrl) {
        return `<div class="media-image-shell" data-media-fallback="true"><img src="${escapeHtml(backdropUrl)}" alt="" loading="eager" decoding="async" fetchpriority="high" data-title="${escapeHtml(item?.titulo || '')}" data-fallback="FILM" onerror="handleMediaImageError(this)"></div>`;
      }
      return '<div class="hero-bg-ph">FILM</div>';
    }

    function renderHeroBackground(item, sources = getHeroBackdropSources(item)) {
      const selected = sources[heroBackdropIndex % Math.max(1, sources.length)] || '';
      swapHeroBackground(heroBg, buildHeroBackdropMarkup(item, selected));
    }

    function syncHeroBackdropRotation(item, sources = getHeroBackdropSources(item)) {
      const key = item ? `${item.id}::${sources.join('|')}` : '';
      if (heroBackdropKey !== key) {
        if (heroBackdropTimer) {
          clearInterval(heroBackdropTimer);
          heroBackdropTimer = null;
        }
        heroBackdropKey = key;
        heroBackdropIndex = 0;
      }

      if (sources.length <= 1) {
        if (heroBackdropTimer) {
          clearInterval(heroBackdropTimer);
          heroBackdropTimer = null;
        }
        return;
      }

      if (heroBackdropTimer) return;

      heroBackdropTimer = setInterval(() => {
        heroBackdropIndex = (heroBackdropIndex + 1) % sources.length;
        renderHeroBackground(item, sources);
      }, HERO_BACKDROP_ROTATION_MS);
    }

    function renderModalBackdropTone(sources = []) {
      const selected = sources[modalBackdropIndex % Math.max(1, sources.length)] || '';
      if (selected) {
        swapBackdropToneBackground(mBackdropTone, selected);
        modalEl.classList.add('has-backdrop-tone');
      } else {
        mBackdropTone.innerHTML = '';
        modalEl.classList.remove('has-backdrop-tone');
      }
    }

    function syncModalBackdropRotation(item, sources = getHeroBackdropSources(item)) {
      const key = item ? `${item.id}::${sources.join('|')}` : '';
      if (modalBackdropKey !== key) {
        stopModalBackdropRotation();
        modalBackdropKey = key;
      }

      renderModalBackdropTone(sources);
      if (sources.length <= 1) return;
      if (modalBackdropTimer) return;

      modalBackdropTimer = setInterval(() => {
        modalBackdropIndex = (modalBackdropIndex + 1) % sources.length;
        renderModalBackdropTone(sources);
      }, MODAL_BACKDROP_ROTATION_MS);
    }

    function setHeroIndex(nextIndex = 0) {
      const items = getHeroItems();
      if (!items.length) return;
      heroRotationIndex = (Number(nextIndex || 0) + items.length) % items.length;
      heroRenderKey = '';
      stopHeroBackdropRotation();
      renderHero();
    }

    function animateHeroContentSwap() {
      clearTimeout(heroContentSwapTimer);
      heroBanner.classList.remove('hero-animating');
      heroContent.classList.remove('hero-content--enter');
      void heroContent.offsetWidth;
      heroBanner.classList.add('hero-animating');
      heroContent.classList.add('hero-content--enter');
      heroContentSwapTimer = setTimeout(() => {
        heroBanner.classList.remove('hero-animating');
        heroContent.classList.remove('hero-content--enter');
      }, 760);
    }

    function swapHeroBackground(container, markup) {
      const next = document.createElement('div');
      next.className = 'hero-bg-layer';
      next.innerHTML = markup;
      const nextImage = next.querySelector('img');

      const current = container.querySelector('.hero-bg-layer.is-active') || container.querySelector('.hero-bg-layer');
      if (!current) {
        container.innerHTML = '';
        container.appendChild(next);
        const activateFirstLayer = () => {
          requestAnimationFrame(() => next.classList.add('is-active'));
        };
        if (nextImage && !nextImage.complete) {
          let activated = false;
          const safeActivate = () => {
            if (activated) return;
            activated = true;
            activateFirstLayer();
          };
          nextImage.addEventListener('load', safeActivate, { once: true });
          nextImage.addEventListener('error', safeActivate, { once: true });
          setTimeout(safeActivate, 220);
        } else {
          activateFirstLayer();
        }
        return;
      }

      container.appendChild(next);
      let activated = false;
      const activateLayer = () => {
        if (activated) return;
        activated = true;
        current.classList.add('is-leaving');
        requestAnimationFrame(() => next.classList.add('is-active'));
        setTimeout(() => {
          current.remove();
        }, HERO_LAYER_CROSSFADE_MS);
      };

      if (nextImage && !nextImage.complete) {
        nextImage.addEventListener('load', activateLayer, { once: true });
        nextImage.addEventListener('error', activateLayer, { once: true });
        setTimeout(activateLayer, 260);
        return;
      }

      activateLayer();
    }

    function swapBackdropToneBackground(container, url = '') {
      if (!(container instanceof HTMLElement)) return;

      const nextUrl = String(url || '').trim();
      if (!nextUrl) {
        container.innerHTML = '';
        return;
      }

      const current = container.querySelector('.modal-backdrop-tone__layer.is-active')
        || container.querySelector('.modal-backdrop-tone__layer');

      if (current && current.dataset.url === nextUrl) {
        current.classList.add('is-active');
        current.classList.remove('is-leaving');
        return;
      }

      const next = document.createElement('div');
      next.className = 'modal-backdrop-tone__layer';
      next.dataset.url = nextUrl;
      next.style.backgroundImage = `url("${nextUrl.replace(/"/g, '\\"')}")`;

      if (!current) {
        container.innerHTML = '';
        container.appendChild(next);
        requestAnimationFrame(() => next.classList.add('is-active'));
        return;
      }

      container.appendChild(next);
      requestAnimationFrame(() => {
        current.classList.add('is-leaving');
        next.classList.add('is-active');
      });

      setTimeout(() => {
        current.remove();
      }, MODAL_LAYER_CROSSFADE_MS);

      [...container.querySelectorAll('.modal-backdrop-tone__layer')]
        .slice(0, -2)
        .forEach((layer) => layer.remove());
    }

    function onHeroPointerMove(event) {
      if (mobileViewport || !heroBanner) return;
      if (typeof window !== 'undefined' && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const rect = heroBanner.getBoundingClientRect();
      if (!rect.width || !rect.height) return;
      const offsetX = ((event.clientX - rect.left) / rect.width) - 0.5;
      const offsetY = ((event.clientY - rect.top) / rect.height) - 0.5;
      heroBanner.style.setProperty('--hero-shift-x', `${(offsetX * 24).toFixed(2)}px`);
      heroBanner.style.setProperty('--hero-shift-y', `${(offsetY * 18).toFixed(2)}px`);
    }

    function resetHeroParallax() {
      heroBanner.style.setProperty('--hero-shift-x', '0px');
      heroBanner.style.setProperty('--hero-shift-y', '0px');
    }

    function renderChips() {
      const chipRow = document.getElementById('chipRow');
      const options = getQuickChipOptions();
      const totalCount = FF_STATE.content
        .filter((item) => item.estado === 'activo' && (!activeType || item.tipo === activeType))
        .filter((item) => !searchText || matchesSearchForContent(item))
        .length;
      if (!options.length && !activeCategory) {
        chipRow.innerHTML = '';
        chipRow.style.display = 'none';
        chipRow.className = 'chip-row';
        return;
      }

      chipRow.className = 'chip-row chip-row--quick';
      chipRow.style.display = 'flex';
      chipRow.innerHTML = [
        `<button class="chip chip--quick ${activeCategory ? '' : 'on'}" type="button" onclick="setCategory('')">Todas<small>${totalCount}</small></button>`,
        ...options.map((option) => {
          const active = normalizeFilterValue(option.label) === normalizeFilterValue(activeCategory) ? 'on' : '';
          const encoded = encodeURIComponent(option.label);
          return `<button class="chip chip--quick ${active}" type="button" onclick="setCategory(decodeURIComponent('${encoded}'))">${escapeHtml(option.label)}<small>${option.count}</small></button>`;
        })
      ].join('');
    }

    function resolveContinueEntryContent(entry) {
      if (!entry) return null;
      return entry.kind === 'content' ? entry.item : entry.serie;
    }

    function wireHomeInteractions() {
      if (homeInteractionsBound) return;
      homeInteractionsBound = true;

      heroBanner.addEventListener('pointermove', onHeroPointerMove);
      heroBanner.addEventListener('pointerleave', resetHeroParallax);
      document.addEventListener('pointerdown', (event) => {
        if (!navSearchOpen) return;
        if (navSearch.contains(event.target)) return;
        closeNavSearchIfIdle();
      });
    }

    function scheduleLowPriority(callback, timeout = 220) {
      if (typeof window !== 'undefined' && typeof window.requestIdleCallback === 'function') {
        window.requestIdleCallback(() => callback(), { timeout });
        return;
      }
      setTimeout(callback, 60);
    }

    function cancelHomeDeferredWork() {
      homeDeferredWorkToken += 1;
    }

    function queueHomeDeferredWork() {
      const token = ++homeDeferredWorkToken;
      scheduleLowPriority(() => {
        if (token !== homeDeferredWorkToken) return;
        requestAnimationFrame(() => {
          if (token !== homeDeferredWorkToken) return;
          setupShowcaseRotators();
          setupSagaRotators();
          syncAmbientSections();
        });
      });
    }

    function cancelInitialDesktopHomeRender() {
      initialDesktopHomeRenderToken += 1;
    }

    function disableInitialDesktopHomeDefer() {
      if (!deferInitialDesktopHome) return;
      deferInitialDesktopHome = false;
      cancelInitialDesktopHomeRender();
    }

    function queueInitialDesktopHomeRender() {
      if (!deferInitialDesktopHome) return;
      const token = ++initialDesktopHomeRenderToken;
      scheduleLowPriority(() => {
        if (token !== initialDesktopHomeRenderToken) return;
        deferInitialDesktopHome = false;
        renderChips();
        renderHome();
      }, 320);
    }

    function cancelPendingHomeRowsRender() {
      homeRowsRenderToken += 1;
    }

    function renderHomeRowsProgressively(wrap, rowRenderers = [], options = {}) {
      const token = ++homeRowsRenderToken;
      const initialCount = Math.max(1, Number(options.initialCount || 1));
      const batchSize = Math.max(1, Number(options.batchSize || 1));

      if (!rowRenderers.length) {
        wrap.innerHTML = `
          <div class="empty">
            <h3>No hay resultados</h3>
            <p>Prueba con otro texto o cambia el filtro.</p>
          </div>`;
        queueHomeDeferredWork();
        return;
      }

      const renderSlice = (start, count) => rowRenderers
        .slice(start, start + count)
        .map((renderRow) => renderRow())
        .join('');

      wrap.innerHTML = renderSlice(0, initialCount);
      let offset = initialCount;

      if (offset >= rowRenderers.length) {
        queueHomeDeferredWork();
        return;
      }

      const appendNextBatch = () => {
        if (token !== homeRowsRenderToken) return;
        if (offset >= rowRenderers.length) {
          queueHomeDeferredWork();
          return;
        }

        wrap.insertAdjacentHTML('beforeend', renderSlice(offset, batchSize));
        offset += batchSize;
        scheduleLowPriority(() => {
          requestAnimationFrame(appendNextBatch);
        }, 160);
      };

      scheduleLowPriority(() => {
        requestAnimationFrame(appendNextBatch);
      }, 120);
    }

    function getItemAmbientArt(item) {
      return getHeroBackdropSources(item)[0] || item?.portadaUrl || '';
    }

    function getEntryAmbientArt(entry) {
      if (!entry) return '';
      if (entry.kind === 'episode') {
        return entry.episode?.portadaUrl || getItemAmbientArt(entry.serie);
      }
      if (entry.kind === 'content') {
        return getItemAmbientArt(entry.item);
      }
      if (entry.kind === 'saga') {
        return entry.saga?.ambientArt || entry.saga?.leadItem?.portadaUrl || '';
      }
      return getItemAmbientArt(entry.content || entry.serie);
    }

    function swapAmbientBackground(url = '') {
      const nextUrl = String(url || defaultAmbientUrl || '').trim();
      if (!homeAmbient) {
        activeAmbientUrl = nextUrl;
        return;
      }
      if (nextUrl === activeAmbientUrl) return;
      activeAmbientUrl = nextUrl;

      if (!nextUrl) {
        homeAmbient.innerHTML = '';
        return;
      }

      const nextLayer = document.createElement('div');
      nextLayer.className = 'home-ambient__layer';
      nextLayer.style.backgroundImage = `url("${nextUrl.replace(/"/g, '\\"')}")`;

      const current = homeAmbient.querySelector('.home-ambient__layer.is-active') || homeAmbient.querySelector('.home-ambient__layer');
      if (!current) {
        homeAmbient.innerHTML = '';
        homeAmbient.appendChild(nextLayer);
        requestAnimationFrame(() => nextLayer.classList.add('is-active'));
        return;
      }

      homeAmbient.appendChild(nextLayer);
      requestAnimationFrame(() => {
        nextLayer.classList.add('is-active');
        current.classList.remove('is-active');
        current.classList.add('is-leaving');
      });

      setTimeout(() => {
        current.remove();
      }, 960);
      [...homeAmbient.querySelectorAll('.home-ambient__layer')].slice(0, -2).forEach((layer) => layer.remove());
    }

    function setDefaultAmbientBackground(url = '') {
      defaultAmbientUrl = String(url || '').trim();
      if (!document.querySelector('.section[data-section-art]')) {
        swapAmbientBackground(defaultAmbientUrl);
      }
    }

    function syncAmbientSections() {
      if (!homeAmbient) return;
      if (ambientSectionObserver) {
        ambientSectionObserver.disconnect();
        ambientSectionObserver = null;
      }
      ambientSectionRatios = new Map();

      const sections = [...document.querySelectorAll('.section[data-section-art]')];
      if (!sections.length) {
        swapAmbientBackground(defaultAmbientUrl);
        return;
      }

      if (typeof window !== 'undefined' && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        swapAmbientBackground(defaultAmbientUrl);
        return;
      }

      const resolveAmbientUrl = () => {
        let winner = null;
        let winnerRatio = 0;
        sections.forEach((section) => {
          const ratio = Number(ambientSectionRatios.get(section) || 0);
          if (ratio >= winnerRatio) {
            winner = section;
            winnerRatio = ratio;
          }
        });
        return winnerRatio > 0.08
          ? String(winner?.dataset.sectionArt || '').trim()
          : defaultAmbientUrl;
      };

      ambientSectionObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          ambientSectionRatios.set(entry.target, entry.isIntersecting ? entry.intersectionRatio : 0);
        });
        swapAmbientBackground(resolveAmbientUrl());
      }, {
        threshold: [0, 0.16, 0.32, 0.5, 0.68, 0.82],
        rootMargin: '-16% 0px -28% 0px'
      });

      sections.forEach((section) => {
        ambientSectionRatios.set(section, 0);
        ambientSectionObserver.observe(section);
      });

      requestAnimationFrame(() => {
        swapAmbientBackground(resolveAmbientUrl());
      });
    }

    function getQuickChipOptions() {
      const counts = new Map();
      FF_STATE.content
        .filter((item) => item.estado === 'activo' && (!activeType || item.tipo === activeType))
        .filter((item) => !searchText || matchesSearchForContent(item))
        .forEach((item) => {
          getItemFilterValues(item).forEach((value) => {
            const label = String(value || '').trim();
            const key = normalizeFilterValue(label);
            if (!key) return;
            if (!counts.has(key)) counts.set(key, { label, count: 0 });
            counts.get(key).count += 1;
          });
        });

      return [...counts.values()]
        .sort((a, b) => b.count - a.count || a.label.localeCompare(b.label, 'es'))
        .slice(0, mobileViewport ? 6 : 10);
    }

    function renderHeroSkeleton() {

        displayYear(content) ? String(displayYear(content)) : '',
        isMovie
          ? displayDuration(content?.duracion)
          : `T${entry?.episode?.temporada || 1} E${entry?.episode?.numeroEpisodio || 1}`
      ].filter(Boolean);

      if (!isMovie && entry?.episode?.titulo) {
        meta.push(entry.episode.titulo);
      }

      return {
        content,
        title: isMovie ? (content?.titulo || 'Contenido') : (entry?.serie?.titulo || 'Serie'),
        subtitle: isMovie
          ? `${Number(entry?.progress?.porcentaje || 0)}% visto`
          : renderEpisodeProgressMeta(entry?.serie?.id, entry?.episode),
        image: isMovie
          ? content?.portadaUrl
          : (entry?.episode?.portadaUrl || entry?.serie?.portadaUrl),
        meta,
        percent: Number(entry?.progress?.porcentaje || 0),
        synopsis: isMovie
          ? (content?.sinopsis || 'Retoma donde te quedaste.')
          : (entry?.episode?.sinopsis || content?.sinopsis || 'Tu ultimo episodio esta listo para continuar.'),
        onclick: isMovie
          ? `playContent('${content?.id || ''}')`
          : `playEpisode('${entry?.serie?.id || ''}','${entry?.episode?.id || ''}')`,
        detailAction: `openDetails('${content?.id || ''}')`,
        ambientArt: getEntryAmbientArt(entry),
        buttonLabel: isMovie ? 'Continuar pelicula' : 'Continuar episodio',
        typeLabel: isMovie ? 'Continuar viendo' : 'Tu serie sigue aqui'

      if (!entry) return null;

      if (entry.kind === 'content') {
        const item = entry.content || entry.item || null;
        if (!item) return null;
        const progressState = getContentResumeState(item);
        return {
          content: item,
          title: item.titulo || 'Contenido',
          image: item.portadaUrl || '',
          ambientArt: getEntryAmbientArt(entry) || getItemAmbientArt(item),
          meta: [
            item.categoria || (item.tipo === 'serie' ? 'Serie' : 'Pelicula'),
            displayYear(item) ? String(displayYear(item)) : '',
            displayDuration(item.duracion) || ''
          ].filter(Boolean),
          synopsis: item.sinopsis || 'Abre la ficha para ver todos los detalles.',
          percent: progressState.percent,
          subtitle: progressState.percent > 0 ? `${progressState.percent}% visto` : '',
          onclick: item.tipo === 'pelicula' ? `playContent('${item.id}')` : `openDetails('${item.id}')`,
          detailAction: item.tipo === 'pelicula' ? `openDetails('${item.id}')` : '',
          buttonLabel: item.tipo === 'pelicula' ? 'Reproducir' : 'Abrir serie',
          typeLabel: item.tipo === 'pelicula' ? 'Pelicula recien anadida' : 'Serie recien anadida',
          ratingItem: item,
          showProgress: progressState.percent > 0,
          previewMedia: getFeatureShowcasePreviewMedia(entry, item)
        };
      }

      if (entry.kind === 'series') {
        const serie = entry.serie || null;
        if (!serie) return null;
        const progressState = getContentResumeState(serie);
        return {
          content: serie,
          title: serie.titulo || 'Serie',
          image: serie.portadaUrl || '',
          ambientArt: getEntryAmbientArt(entry) || getItemAmbientArt(serie),
          meta: [
            serie.categoria || 'Serie',
            displayYear(serie) ? String(displayYear(serie)) : '',

          ].filter(Boolean),

          percent: progressState.percent,
          subtitle: progressState.percent > 0 ? `${progressState.percent}% visto` : '',
          onclick: `openDetails('${serie.id}')`,
          detailAction: '',
          buttonLabel: 'Abrir serie',
          typeLabel: 'Novedad en series',
          ratingItem: serie,
          showProgress: progressState.percent > 0,
          previewMedia: getFeatureShowcasePreviewMedia(entry, serie)

      if (entry.kind === 'episode') {
        const serie = entry.serie || null;
        const episode = entry.episode || null;
        if (!serie || !episode) return null;
        const progressState = getEpisodeProgressState(serie.id, episode.id, episode.duracion);
        return {
          content: serie,
          title: serie.titulo || episode.titulo || 'Serie',
          image: episode.portadaUrl || serie.portadaUrl || '',
          ambientArt: getEntryAmbientArt(entry) || getItemAmbientArt(serie),
          meta: [
            serie.categoria || 'Serie',
            displayYear(serie) ? String(displayYear(serie)) : '',
            `T${episode.temporada || 1}E${episode.numeroEpisodio || 1}`,
            episode.titulo || ''
          ].filter(Boolean),
          synopsis: episode.sinopsis || serie.sinopsis || 'Hay un episodio listo para ver.',
          percent: progressState.percent,
          subtitle: renderEpisodeProgressMeta(serie.id, episode),
          onclick: `playEpisode('${serie.id}','${episode.id}')`,
          detailAction: `openDetails('${serie.id}')`,
          buttonLabel: 'Ver episodio',
          typeLabel: 'Novedad en series',
          ratingItem: serie,
          showProgress: progressState.percent > 0,
          previewMedia: getFeatureShowcasePreviewMedia(entry, serie)

      return null;
