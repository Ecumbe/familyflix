<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FamilyFlix — Catálogo</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .hero {
      padding: 52px 0 40px;
      position: relative;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(36px, 5vw, 60px);
      font-weight: 700; line-height: 1.08;
      margin-bottom: 10px;
    }
    .hero-title em { color: var(--accent); font-style: normal; }
    .hero-sub { font-size: 15px; color: var(--text-2); margin-bottom: 30px; max-width: 500px; }

    .search-filter-row {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    }
    .search-wrap { flex: 1; min-width: 220px; max-width: 380px; }

    .stats-strip {
      display: flex; gap: 0;
      margin: 0 0 36px;
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .stat-item {
      flex: 1; padding: 16px 20px; text-align: center;
      border-right: 1px solid var(--glass-border);
    }
    .stat-item:last-child { border-right: none; }
    .stat-num {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 700; color: var(--accent);
      display: block; line-height: 1;
    }
    .stat-label { font-size: 11px; color: var(--text-3); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }

    .catalog-body { padding-bottom: 60px; }

    /* Continuar viendo */
    .continue-row {
      display: flex; gap: 16px; overflow-x: auto;
      padding-bottom: 8px; margin-bottom: 8px;
      scrollbar-width: none;
    }
    .continue-row::-webkit-scrollbar { display: none; }
    .continue-card {
      flex-shrink: 0; width: 220px;
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      overflow: hidden; cursor: pointer;
      transition: all var(--transition);
    }
    .continue-card:hover {
      transform: translateY(-4px);
      border-color: rgba(200,162,255,0.4);
    }
    .continue-thumb {
      position: relative; aspect-ratio: 16/9;
      background: var(--bg-3); overflow: hidden;
    }
    .continue-thumb img { width:100%; height:100%; object-fit:cover; }
    .continue-progress-bar {
      position: absolute; bottom:0; left:0; right:0;
      height:3px; background: rgba(255,255,255,0.1);
    }
    .continue-progress-fill {
      height:100%;
      background: linear-gradient(90deg, var(--accent), var(--gold));
    }
    .continue-info { padding: 10px 12px; }
    .continue-title { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .continue-pct { font-size:11px; color:var(--accent); margin-top:3px; }

    /* Modal */
    .modal-thumb {
      position:relative; aspect-ratio:16/9;
      background:var(--bg-3); overflow:hidden;
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    }
    .modal-thumb img { width:100%; height:100%; object-fit:cover; }
    .modal-thumb-placeholder {
      width:100%; height:100%;
      display:flex; align-items:center; justify-content:center;
      font-size:72px;
      background: linear-gradient(135deg, var(--bg-2), var(--bg-3));
    }
    .modal-body { padding: 28px 32px 32px; }
    .modal-cat {
      font-size:11px; letter-spacing:2px; text-transform:uppercase;
      color:var(--accent); font-weight:600; margin-bottom:8px;
    }
    .modal-title {
      font-family:var(--font-display); font-size:32px; font-weight:700;
      margin-bottom:8px; line-height:1.15;
    }
    .modal-meta { display:flex; gap:14px; color:var(--text-3); font-size:13px; margin-bottom:14px; }
    .modal-progress-wrap { margin-bottom:16px; }
    .modal-progress-bar {
      height:4px; background:rgba(255,255,255,0.1);
      border-radius:2px; overflow:hidden; margin-bottom:6px;
    }
    .modal-progress-fill {
      height:100%;
      background: linear-gradient(90deg, var(--accent), var(--gold));
      border-radius:2px;
    }
    .modal-progress-label { font-size:12px; color:var(--accent); }
    .modal-synopsis {
      font-size:14px; line-height:1.8; color:var(--text-2);
      margin-bottom:20px;
    }
    .modal-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
    .modal-actions { display:flex; gap:12px; }
    .modal-close-btn {
      position:absolute; top:16px; right:16px;
      width:36px; height:36px; border-radius:50%;
      background:rgba(0,0,0,0.5); backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.2);
      color:#fff; font-size:18px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:all var(--transition); z-index:10;
    }
    .modal-close-btn:hover { background:rgba(255,95,109,0.4); }
    .modal { position:relative; }

    /* Loading */
    .loading-state {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; padding:80px; gap:16px; color:var(--text-3);
    }
    .spinner {
      width:36px; height:36px; border:3px solid var(--glass-border);
      border-top-color:var(--accent); border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- NAV -->
<nav class="navbar">
  <a href="home.html" class="nav-logo">Family<em>Flix</em></a>
  <div class="nav-spacer"></div>
  <div class="nav-actions">
    <span id="navProfile" style="font-size:13px;color:var(--text-3)"></span>
    <a href="admin.html" class="btn btn-glass" id="adminBtn" style="display:none">＋ Agregar</a>
    <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema"></button>
    <button class="btn btn-glass" onclick="logout()">Salir</button>
  </div>
</nav>

<div class="mt-nav">
  <div class="page-wrap">

    <!-- HERO -->
    <div class="hero">
      <h1 class="hero-title">Tus <em>recuerdos</em><br>en un solo lugar</h1>
      <p class="hero-sub">Revive los momentos más especiales de tu familia, desde cualquier dispositivo.</p>

      <div class="search-filter-row">
        <div class="search-wrap">
          <div style="position:relative">
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none">🔍</span>
            <input class="input" id="searchInput" style="padding-left:42px"
              type="text" placeholder="Buscar videos..." oninput="applyFilters()">
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap" id="chips">
          <button class="chip active" onclick="filterCat('',this)">Todos</button>
        </div>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-strip">
      <div class="stat-item"><span class="stat-num" id="sTotal">—</span><div class="stat-label">Videos</div></div>
      <div class="stat-item"><span class="stat-num" id="sCats">—</span><div class="stat-label">Categorías</div></div>
      <div class="stat-item"><span class="stat-num" id="sProgress">—</span><div class="stat-label">En progreso</div></div>
    </div>

    <!-- CATÁLOGO -->
    <div class="catalog-body">
      <!-- Continuar viendo -->
      <div id="continueSection" style="display:none; margin-bottom:36px">
        <div class="section-heading">▶ Continuar viendo</div>
        <div class="continue-row" id="continueRow"></div>
      </div>

      <!-- Grid principal -->
      <div class="section-heading" id="mainHeading">🎬 Toda la colección</div>
      <div id="gridWrap">
        <div class="loading-state">
          <div class="spinner"></div>
          <span>Cargando tu colección...</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL DETALLE -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">
  <div class="modal glass-strong" id="modalEl">
    <button class="modal-close-btn" onclick="closeModalDirect()">✕</button>
    <div class="modal-thumb" id="mThumb"></div>
    <div class="modal-body">
      <div class="modal-cat" id="mCat"></div>
      <h2 class="modal-title" id="mTitle"></h2>
      <div class="modal-meta" id="mMeta"></div>
      <div class="modal-progress-wrap" id="mProgressWrap" style="display:none">
        <div class="modal-progress-bar"><div class="modal-progress-fill" id="mProgressFill"></div></div>
        <div class="modal-progress-label" id="mProgressLabel"></div>
      </div>
      <p class="modal-synopsis" id="mSynopsis"></p>
      <div class="modal-tags" id="mTags"></div>
      <div class="modal-actions">
        <button class="btn btn-accent btn-lg" style="flex:1" id="mPlayBtn">▶ Reproducir</button>
        <button class="btn btn-glass btn-lg" onclick="closeModalDirect()">✕</button>
      </div>
    </div>
  </div>
</div>

<script src="js/shared.js"></script>
<script>
  checkAuth();
  document.getElementById('navProfile').textContent = sessionStorage.getItem('ff_profile') || '';
  if (sessionStorage.getItem('ff_role') === 'admin') {
    document.getElementById('adminBtn').style.display = 'inline-flex';
  }

  let allVideos = [];
  let currentCat = '';
  let currentSearch = '';

  async function init() {
    allVideos = await fetchVideos();
    const cats = [...new Set(allVideos.map(v => v.category).filter(Boolean))];

    // Chips de categoría
    const chipsEl = document.getElementById('chips');
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = catEmoji(cat) + ' ' + cat;
      btn.onclick = () => filterCat(cat, btn);
      chipsEl.appendChild(btn);
    });

    // Stats
    const prog = getProgress();
    document.getElementById('sTotal').textContent = allVideos.length;
    document.getElementById('sCats').textContent = cats.length;
    document.getElementById('sProgress').textContent = Object.keys(prog).filter(k => prog[k] > 0 && prog[k] < 100).length;

    renderContinue();
    renderGrid(allVideos);
  }

  function renderContinue() {
    const prog = getProgress();
    const inProgress = allVideos.filter(v => prog[v.id] > 5 && prog[v.id] < 100);
    if (!inProgress.length) return;
    document.getElementById('continueSection').style.display = 'block';
    document.getElementById('continueRow').innerHTML = inProgress.map(v => {
      const pct = prog[v.id];
      const thumb = v.thumbnail ? `<img src="${v.thumbnail}" alt="${v.title}" onerror="this.style.display='none'">` : '';
      return `<div class="continue-card" onclick="openModal('${v.id}')">
        <div class="continue-thumb">
          ${thumb}
          <div class="continue-progress-bar"><div class="continue-progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="continue-info">
          <div class="continue-title">${v.title}</div>
          <div class="continue-pct">${pct}% visto</div>
        </div>
      </div>`;
    }).join('');
  }

  function renderGrid(videos) {
    const wrap = document.getElementById('gridWrap');
    if (!videos.length) {
      wrap.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><h3>Sin resultados</h3><p style="color:var(--text-3)">Prueba con otro término o categoría.</p></div>`;
      return;
    }
    const prog = getProgress();
    wrap.innerHTML = `<div class="video-grid stagger">${videos.map(v => videoCardHTML(v, prog)).join('')}</div>`;
  }

  function videoCardHTML(v, prog) {
    const pct = prog[v.id] || 0;
    const thumbContent = v.thumbnail
      ? `<img src="${v.thumbnail}" alt="${v.title}" onerror="this.parentElement.innerHTML='<div class=\\'thumb-placeholder\\'>${catEmoji(v.category)}</div>'">`
      : `<div class="thumb-placeholder">${catEmoji(v.category)}</div>`;
    return `<div class="video-card" onclick="openModal('${v.id}')">
      <div class="card-thumb">
        ${thumbContent}
        <div class="card-overlay"><div class="play-btn-circle">▶</div></div>
        <div class="card-badge">${v.category}</div>
        ${pct > 0 ? `<div class="progress-strip"><div class="progress-strip-fill" style="width:${pct}%"></div></div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${v.title}</div>
        <div class="card-meta">
          <span>${v.year || ''}</span>
          ${v.duration ? `<span>⏱ ${v.duration}</span>` : ''}
        </div>
      </div>
    </div>`;
  }

  function filterCat(cat, btn) {
    currentCat = cat;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }

  function applyFilters() {
    currentSearch = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allVideos;
    if (currentCat) filtered = filtered.filter(v => v.category === currentCat);
    if (currentSearch) filtered = filtered.filter(v =>
      v.title.toLowerCase().includes(currentSearch) ||
      (v.synopsis||'').toLowerCase().includes(currentSearch) ||
      (v.tags||[]).some(t => t.toLowerCase().includes(currentSearch))
    );
    const heading = document.getElementById('mainHeading');
    heading.textContent = currentCat ? `${catEmoji(currentCat)} ${currentCat}` :
      currentSearch ? `🔍 "${currentSearch}"` : '🎬 Toda la colección';
    renderGrid(filtered);
  }

  // Modal
  let modalVideo = null;
  function openModal(id) {
    const v = allVideos.find(x => x.id === id);
    if (!v) return;
    modalVideo = v;
    const prog = getProgress();
    const pct = prog[id] || 0;

    // Thumb
    document.getElementById('mThumb').innerHTML = v.thumbnail
      ? `<img src="${v.thumbnail}" alt="${v.title}" onerror="this.parentElement.innerHTML='<div class=\\'modal-thumb-placeholder\\'>${catEmoji(v.category)}</div>'">`
      : `<div class="modal-thumb-placeholder">${catEmoji(v.category)}</div>`;

    document.getElementById('mCat').textContent = v.category;
    document.getElementById('mTitle').textContent = v.title;
    document.getElementById('mMeta').innerHTML = `
      ${v.year ? `<span>📅 ${v.year}</span>` : ''}
      ${v.duration ? `<span>⏱ ${v.duration}</span>` : ''}`;
    document.getElementById('mSynopsis').textContent = v.synopsis || 'Sin sinopsis disponible.';
    document.getElementById('mTags').innerHTML = (v.tags||[]).map(t=>`<span class="tag">#${t}</span>`).join('');

    if (pct > 0) {
      document.getElementById('mProgressWrap').style.display = 'block';
      document.getElementById('mProgressFill').style.width = pct + '%';
      document.getElementById('mProgressLabel').textContent = fmtPct(pct);
    } else {
      document.getElementById('mProgressWrap').style.display = 'none';
    }

    document.getElementById('mPlayBtn').textContent = pct > 0 ? '▶ Continuar viendo' : '▶ Reproducir';
    document.getElementById('mPlayBtn').onclick = () => { closeModalDirect(); window.location.href = `player.html?id=${v.id}`; };

    document.getElementById('modalBackdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(e) { if (e.target === document.getElementById('modalBackdrop')) closeModalDirect(); }
  function closeModalDirect() {
    document.getElementById('modalBackdrop').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

  init();
</script>
</body>
</html>
