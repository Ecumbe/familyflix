    function getComparableTokens(item) {
      return {
        category: normalizeFilterValue(item?.categoria),
        genres: new Set((item?.generos || []).map((value) => normalizeFilterValue(value)).filter(Boolean)),
        tags: new Set(
          (item?.tags || [])
            .map((value) => normalizeFilterValue(String(value).replace(/^(saga|coleccion|colección|franquicia)\s*:\s*/i, '')))
            .filter(Boolean)
        )
      };
    }

    function getSimilarityScore(seed, candidate, sagaLookup = new Map()) {
      if (!seed || !candidate || seed.id === candidate.id || seed.tipo !== candidate.tipo) return 0;
      if (seed.tipo === 'pelicula') {
        const seedSaga = sagaLookup.get(seed.id);
        const candidateSaga = sagaLookup.get(candidate.id);
        if (seedSaga && candidateSaga && seedSaga.key === candidateSaga.key) return 0;
      }

      const seedTokens = getComparableTokens(seed);
      const candidateTokens = getComparableTokens(candidate);
      let score = 26;

      if (seedTokens.category && seedTokens.category === candidateTokens.category) score += 20;
      seedTokens.genres.forEach((genre) => {
        if (candidateTokens.genres.has(genre)) score += 11;
      });
      seedTokens.tags.forEach((tag) => {
        if (candidateTokens.tags.has(tag)) score += 6;
      });
      if (normalizeFilterValue(seed.clasificacion) && normalizeFilterValue(seed.clasificacion) === normalizeFilterValue(candidate.clasificacion)) score += 3;
      if (normalizeFilterValue(seed.idioma) && normalizeFilterValue(seed.idioma) === normalizeFilterValue(candidate.idioma)) score += 2;

      const seedYear = Number(displayYear(seed) || 0);
      const candidateYear = Number(displayYear(candidate) || 0);
      const yearGap = seedYear && candidateYear ? Math.abs(seedYear - candidateYear) : 99;
      if (yearGap <= 3) score += 4;
      else if (yearGap <= 8) score += 2;

      return score;
    }

    function getRecommendationSeed(continueEntries = [], favoriteItems = [], items = []) {
      if (continueEntries[0]) return resolveContinueEntryContent(continueEntries[0]);
      if (favoriteItems[0]) return favoriteItems[0];
      return items[0] || null;
    }

    function getRecommendationSeedList(continueEntries = [], favoriteItems = [], items = [], limit = 3) {
      const seeds = [];
      const seen = new Set();
      const pushSeed = (item) => {
        if (!item || item.estado !== 'activo' || seen.has(item.id)) return;
        seen.add(item.id);
        seeds.push(item);
      };

      continueEntries.map(resolveContinueEntryContent).forEach(pushSeed);
      favoriteItems.forEach(pushSeed);
      items.forEach(pushSeed);
      return seeds.slice(0, limit);
    }

    function getSimilarRecommendations(seed, candidates = [], limit = 8, sagaLookup = new Map()) {
      if (!seed) return [];
      return candidates
        .filter((candidate) => candidate.estado === 'activo')
        .map((candidate) => ({ item: candidate, score: getSimilarityScore(seed, candidate, sagaLookup) }))
        .filter((entry) => entry.score > 28)
        .sort((a, b) => b.score - a.score || String(a.item.titulo || '').localeCompare(String(b.item.titulo || ''), 'es'))
        .slice(0, limit)
        .map((entry) => entry.item);
    }

    function getPersonalizedRecommendations(seeds = [], candidates = [], limit = 8, sagaLookup = new Map()) {
      if (!seeds.length) return [];
      const seedIds = new Set(seeds.map((seed) => seed.id));
      return candidates
        .filter((candidate) => candidate.estado === 'activo' && !seedIds.has(candidate.id))
        .map((candidate) => {
          let score = 0;
          let matchedSeeds = 0;

          seeds.forEach((seed, index) => {
            const similarity = getSimilarityScore(seed, candidate, sagaLookup);
            if (similarity <= 0) return;
            matchedSeeds += 1;
            score += similarity * (index === 0 ? 1.18 : 1);
          });

          const progressState = getContentResumeState(candidate);
          if (progressState.percent > 0 && progressState.percent < 100) score += 6;
          if (candidate.destacado) score += 2;
          score += matchedSeeds * 5;

          return { item: candidate, score, matchedSeeds };
        })
        .filter((entry) => entry.matchedSeeds > 0 && entry.score > 32)
        .sort((a, b) => b.score - a.score || String(a.item.titulo || '').localeCompare(String(b.item.titulo || ''), 'es'))
        .slice(0, limit)
        .map((entry) => entry.item);
    }

    function buildRecommendationHeading(seeds = [], type = '') {
      const primary = seeds[0] || null;
      if (seeds.length > 1) {
        if (type === 'pelicula') return 'Peliculas para ti';
        if (type === 'serie') return 'Series para ti';
        return 'Recomendado para ti';
      }
      if (!primary) {
        if (type === 'pelicula') return 'Peliculas para ti';
        if (type === 'serie') return 'Series para ti';
        return 'Recomendado para ti';
      }
      if (type === 'pelicula') return `Parecidas a ${primary.titulo}`;
      if (type === 'serie') return `Series parecidas a ${primary.titulo}`;
      return `Porque viste ${primary.titulo}`;
    }

    function buildRecommendationCopy(seeds = [], type = '') {
      const labels = seeds.slice(0, 2).map((seed) => seed.titulo).filter(Boolean);
      if (labels.length > 1) {
        return `Se ajusta con tu avance reciente y tus favoritos, usando ${labels.join(' y ')} como referencia.`;
      }
      if (type === 'pelicula') return 'Una mezcla ligera usando genero, categoria y etiquetas.';
      if (type === 'serie') return 'Prioriza series con categoria, genero y tono cercanos.';
      return 'Sugerencias rapidas usando similitud real del catalogo actual.';
    }

    function setCategory(category) {
      disableInitialDesktopHomeDefer();
      activeCategory = category;
      renderHero();
      renderChips();
      renderHome();
    }

    function renderHome() {
      const wrap = document.getElementById('homeContent');
      cancelPendingHomeRowsRender();
      cancelHomeDeferredWork();
      stopShowcaseRotators();
      stopSagaRotators();
      const catalogStillLoading = !contentReady && !FF_STATE.content.length;
      if (catalogStillLoading) {
        wrap.innerHTML = renderHomeSkeleton();
        syncAmbientSections();
        return;
      }

      const items = filteredContent();
      const rows = [];
      const continueWatchingAll = userStateReady
        ? getContinueWatchingItems().filter((entry) => {
            return entry.kind === 'content'
              ? matchesCurrentFilters(entry.item)
              : matchesCurrentFilters(entry.serie);
          })
        : [];
      const favoriteItems = userStateReady
        ? FF_STATE.userState.favorites
            .map((favorite) => getContentById(favorite.contenidoId))
            .filter((item) => matchesCurrentFilters(item))
        : [];
      const movies = items.filter((item) => item.tipo === 'pelicula');
      const series = items.filter((item) => item.tipo === 'serie');
      const sagaGroups = buildSagaGroups(movies);
      activeSagaGroups = sagaGroups;
      const sagaLookup = getSagaLookup(sagaGroups);
      const showcaseLimit = desktopShowcaseViewport ? 4 : 3;
      const recentMovies = getRecentContentItems(movies, showcaseLimit);
      const recentSeriesUpdates = getRecentSeriesUpdates(series, showcaseLimit);
      const recentMovieEntries = recentMovies.map(buildShowcaseEntryFromContent);
      const recentHomeShowcase = getHomeRecentShowcaseEntries(items, showcaseLimit, sagaGroups);
      const homeContinue = getHomeContinueWatchingItems(continueWatchingAll);
      const movieContinue = getContinueWatchingForType(continueWatchingAll, 'pelicula');
      const seriesContinue = getContinueWatchingForType(continueWatchingAll, 'serie');
      const seriesContinueLatest = getLatestContinueEpisodePerSeries(seriesContinue);
      const useMobileShowcase = mobileViewport;
      const recommendationEntries = activeType === 'pelicula'
        ? movieContinue
        : (activeType === 'serie' ? seriesContinueLatest : homeContinue);
      const recommendationSeeds = !searchText
        ? getRecommendationSeedList(recommendationEntries, favoriteItems, items, 3)
        : [];
      const recommendationSeed = recommendationSeeds[0] || null;
      const recommendationItems = recommendationSeeds.length
        ? getPersonalizedRecommendations(recommendationSeeds, items, mobileViewport ? 6 : 8, sagaLookup)
        : [];
      const recommendationTitle = buildRecommendationHeading(recommendationSeeds, activeType);
      const recommendationCopy = buildRecommendationCopy(recommendationSeeds, activeType);

      if (searchText) {
        if (!activeType && homeContinue.length) {
          rows.push(() => renderContinueRow(homeContinue, { layout: 'grid' }));
        }
        if (activeType === 'pelicula' && movieContinue.length) {
          rows.push(() => renderContinueRow(movieContinue, { layout: 'slider', title: 'Continuar viendo peliculas' }));
        }
        if (activeType === 'serie' && seriesContinueLatest.length) {
          rows.push(() => renderContinueRow(seriesContinueLatest, { layout: 'slider', title: 'Continuar viendo series' }));
        }
        if (!activeType || activeType === 'pelicula') {
          if (sagaGroups.length) rows.push(() => renderSagaRow('Sagas que coinciden', sagaGroups, 'Cada saga abre un modal propio para elegir pelicula.'));
          if (movies.length) rows.push(() => renderMediaRow('Todas las peliculas', movies, 'Filtra por genero arriba de esta seccion.', { showFilters: activeType === 'pelicula', compact: true, filterType: 'pelicula' }));
        }
        if (!activeType || activeType === 'serie') {
          if (recentSeriesUpdates.length) rows.push(() => renderSeriesUpdateRow('Novedades en series', recentSeriesUpdates));
          else if (series.length) rows.push(() => renderMediaRow('Series que coinciden', series));
        }
      } else if (activeType === 'pelicula') {
        if (recentMovieEntries.length) {
          rows.push(() => renderFeatureShowcaseSection(
            'Recien anadidas',
            'movies-latest',
            recentMovieEntries,
            'Las ultimas peliculas van rotando arriba y tu ultimo avance queda a mano.',
            {
              asideEntry: movieContinue[0] || null,
              asideEyebrow: 'Continuar viendo'
            }
          ));
        } else if (movieContinue.length) {
          rows.push(() => renderContinueSpotlight(movieContinue[0], {
            title: 'Sigue tu pelicula',
            subtitle: 'Retoma rapido tu ultima pelicula guardada.'
          }));
        }
        if (sagaGroups.length) rows.push(() => renderSagaRow('Sagas y colecciones', sagaGroups, 'Cada saga se agrupa aparte para maraton, pero sus peliculas siguen visibles tambien en Todas las peliculas.'));
        if (movies.length) rows.push(() => renderMediaRow('Todas las peliculas', sortNewest(movies, (item) => getTimestampValue(item.fechaRegistro, displayYear(item))), 'Filtra por genero arriba de esta seccion.', { showFilters: true, compact: true, filterType: 'pelicula' }));
      } else if (activeType === 'serie') {
        if (recentSeriesUpdates.length) {
          rows.push(() => renderFeatureShowcaseSection(
            'Novedades en series',
            'series-latest',
            recentSeriesUpdates,
            'Las ultimas series y capitulos van rotando arriba como un destacado.',
            {
              icon: 'TV'
            }
          ));
        }
        if (seriesContinueLatest.length) {
          rows.push(() => renderEpisodeRow('Tu serie te espera', seriesContinueLatest, 'Solo se muestra el ultimo episodio pendiente de cada serie para que no se repitan.'));
        }
        if (recommendationItems.length) {
          rows.push(() => renderMediaCarousel(recommendationTitle, recommendationItems, recommendationCopy));
        }
        if (series.length) rows.push(() => renderMediaRow('Todas las series', sortNewest(series, (item) => getTimestampValue(item.fechaRegistro, displayYear(item))), 'Filtra por genero arriba de esta seccion.', { showFilters: true, compact: true, filterType: 'serie' }));
      } else {
        if (homeContinue.length) {
          rows.push(() => renderContinueSpotlight(homeContinue[0], {
            title: 'Seguir viendo',
            subtitle: 'Lo mas importante de tu sesion queda arriba para entrar directo.'
          }));
        }
        if (recommendationItems.length) {
          rows.push(() => renderMediaCarousel(recommendationTitle, recommendationItems, recommendationCopy));
        }
        if (favoriteItems.length) rows.push(() => renderMediaCarousel('Tus likes', favoriteItems, 'Se mantiene horizontal, mas fluido y con snap suave en movil.'));
        if (sagaGroups.length) rows.push(() => renderSagaRow('Sagas para maraton', sagaGroups, 'La saga es un acceso adicional para maraton. Sus peliculas siguen estando tambien en Todas las peliculas.'));
        if (recentHomeShowcase.length) {
          rows.push(() => (
            useMobileShowcase
              ? renderShowcaseRow('Recien anadidas', 'home-recent', recentHomeShowcase)
              : renderMixedRow('Recien anadidas', recentHomeShowcase)
          ));
        }
      }

      renderHomeRowsProgressively(wrap, rows, {
        initialCount: activeType ? (mobileViewport ? 1 : 2) : 1,
        batchSize: 1
      });

      return;
    }

    function showWelcomeIfPending() {
      const raw = sessionStorage.getItem(WELCOME_PENDING_KEY) || localStorage.getItem(WELCOME_PENDING_KEY) || '';
      if (!raw) return;

      sessionStorage.removeItem(WELCOME_PENDING_KEY);
      localStorage.removeItem(WELCOME_PENDING_KEY);

      let payload = null;
      try {
        payload = JSON.parse(raw);
      } catch {
        payload = null;
      }

      const ts = Number(payload?.ts || 0);
      if (ts && Date.now() - ts > 180000) return;

      const welcomeBd = document.getElementById('welcomeBd');
      const welcomeName = document.getElementById('welcomeName');
      const welcomeUserChip = document.getElementById('welcomeUserChip');
      const displayName = payload?.nombre || sessionUser?.nombreMostrado || sessionUser?.usuario || 'Familia';

      welcomeName.textContent = displayName;
      welcomeUserChip.textContent = displayName;
      requestAnimationFrame(() => {
        welcomeBd.classList.add('show');
      });

      setTimeout(() => {
        welcomeBd.classList.remove('show');
      }, 2200);
    }

    function renderContinueSpotlight(entry, options = {}) {
      const summary = buildContinueEntrySummary(entry);
      if (!summary.content) return '';

      return renderSection(
        options.title || 'Seguir viendo',
        'Seguir',
        renderSpotlightSurface(summary),
        options.subtitle || 'Cada usuario conserva su propio avance y vuelve justo a lo importante.',
        {
          art: summary.ambientArt || getItemAmbientArt(summary.content),
          contentId: summary.content.id,
          className: 'section--spotlight'
        }
      );
    }

    function renderContinueRow(items, options = {}) {
      const layout = options.layout || 'grid';
      const title = options.title || 'Continuar viendo';
      const bodyClass = layout === 'slider' ? 'scroll-row scroll-row--continue' : 'catalog-grid catalog-grid--continue';
      const firstContent = resolveContinueEntryContent(items[0]);
      return renderSection(
        title,
        'Seguir',
        `
          <div class="${bodyClass}">
            ${items.map((entry) => {
              const summary = buildContinueEntrySummary(entry);
              if (!summary.content) return '';
              return `
                <article class="card card-sm" data-content-id="${escapeHtml(summary.content.id)}" onclick="${summary.onclick}">
                  <div class="card-img">
                    ${mediaCardImage(summary.image, 'PLAY', summary.title)}
                    <div class="prog-strip"><div class="prog-fill" style="width:${summary.percent}%"></div></div>
                    <div class="card-shine"></div>
                  </div>
                  <div class="card-body">
                    <div class="card-title">${escapeHtml(summary.title)}</div>
                    <div class="card-sub"><span>${escapeHtml(summary.subtitle)}</span></div>
                  </div>
                </article>`;
            }).join('')}
          </div>
        `,
        options.subtitle || 'Cada usuario conserva su propio avance.',
        {
          art: options.art || getItemAmbientArt(firstContent),
          contentId: firstContent?.id || ''
        }
      );
    }

    function renderMediaRow(title, items, subtitle = '', options = {}) {
      const gridClass = options.compact ? 'catalog-grid catalog-grid--compact' : 'catalog-grid';
      return renderSection(
        title,
        'Fila',
        `
          ${options.showFilters ? renderFilterBar(options.filterType || '') : ''}
          <div class="${gridClass}">
            ${items.map((item) => {
              const progressState = getContentResumeState(item);
              return `
                <article class="card card-w ${options.compact ? 'card--compact' : ''}" data-content-id="${escapeHtml(item.id)}" onclick="openDetails('${item.id}')">
                  <div class="card-img">
                    ${mediaCardImage(item.portadaUrl, item.tipo === 'serie' ? 'TV' : 'FILM', item.titulo)}
                    ${mediaBadge(item.tipo, progressState.percent)}
                    <div class="card-overlay"><div class="play-btn">${item.tipo === 'serie' ? 'Abrir serie' : 'Ver pelicula'}</div></div>
                    <div class="card-shine"></div>
                    ${progressState.percent > 0 ? `<div class="prog-strip"><div class="prog-fill" style="width:${progressState.percent}%"></div></div>` : ''}
                  </div>
                  <div class="card-body">
                    <div class="card-title">${escapeHtml(item.titulo)}</div>
                    <div class="card-sub"><span>${escapeHtml(item.categoria || '')}</span><span>${escapeHtml(String(displayYear(item) || ''))}</span></div>
                  </div>
                </article>`;
            }).join('')}
          </div>
        `,
        subtitle,
        {
          art: options.art || getItemAmbientArt(items[0]),
          contentId: items[0]?.id || ''
        }
      );
    }

    function renderShowcaseRow(title, id, entries, subtitle = '') {
      return renderSection(
        title,
        'Nuevo',
        `
          <div class="showcase-shell" data-showcase-id="${escapeHtml(id)}">
            ${entries.length > 1 ? `
              <div class="showcase-dots">
                ${entries.map((entry, index) => `
                  <button class="showcase-dot ${index === 0 ? 'is-active' : ''}" type="button" data-index="${index}" aria-label="Mostrar opcion ${index + 1}"></button>
                `).join('')}
              </div>
            ` : ''}
            <div class="showcase-stage">
              ${entries.map((entry, index) => `
                <div class="showcase-slide ${index === 0 ? 'is-active' : ''}">
                  <div class="showcase-panel">
                    ${renderShowcaseCard(entry)}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `,
        subtitle,
        {
          art: getEntryAmbientArt(entries[0]),
          contentId: (entries[0]?.content || entries[0]?.serie || entries[0]?.saga?.leadItem)?.id || ''
        }
      );
    }

    function renderMixedRow(title, entries, subtitle = '') {
      return renderSection(
        title,
        'Nuevo',
        `<div class="catalog-grid catalog-grid--episodes">${entries.map(renderShowcaseCard).join('')}</div>`,
        subtitle,
        {
          art: getEntryAmbientArt(entries[0]),
          contentId: (entries[0]?.content || entries[0]?.serie || entries[0]?.saga?.leadItem)?.id || ''
        }
      );
    }

    function renderMediaCarousel(title, items, subtitle = '') {
      return renderSection(
        title,
        'Like',
        `
          <div class="scroll-row">
            ${items.map((item) => {
              const progressState = getContentResumeState(item);
              return `
                <article class="card card-w" data-content-id="${escapeHtml(item.id)}" onclick="openDetails('${item.id}')">
                  <div class="card-img">
                    ${mediaCardImage(item.portadaUrl, item.tipo === 'serie' ? 'TV' : 'FILM', item.titulo)}
                    ${mediaBadge(item.tipo, progressState.percent)}
                    <div class="card-overlay"><div class="play-btn">${item.tipo === 'serie' ? 'Abrir serie' : 'Ver pelicula'}</div></div>
                    <div class="card-shine"></div>
                    ${progressState.percent > 0 ? `<div class="prog-strip"><div class="prog-fill" style="width:${progressState.percent}%"></div></div>` : ''}
                  </div>
                  <div class="card-body">
                    <div class="card-title">${escapeHtml(item.titulo)}</div>
                    <div class="card-sub"><span>${escapeHtml(item.categoria || '')}</span><span>${escapeHtml(String(displayYear(item) || ''))}</span></div>
                  </div>
                </article>`;
            }).join('')}
          </div>
        `,
        subtitle,
        {
          art: getItemAmbientArt(items[0]),
          contentId: items[0]?.id || ''
        }
      );
    }

    function renderEpisodeRow(title, entries, subtitle = '') {
      return renderSection(
        title,
        'EP',
        `<div class="catalog-grid catalog-grid--episodes">${entries.map(renderEpisodeCard).join('')}</div>`,
        subtitle,
        {
          art: getEntryAmbientArt(entries[0]),
          contentId: entries[0]?.serie?.id || ''
        }
      );
    }

    function renderSeriesUpdateRow(title, entries, subtitle = '') {
      return renderSection(
        title,
        'TV',
        `<div class="catalog-grid catalog-grid--episodes">${entries.map(renderSeriesUpdateCard).join('')}</div>`,
        subtitle,
        {
          art: getEntryAmbientArt(entries[0]),
          contentId: (entries[0]?.serie || entries[0]?.content)?.id || ''
        }
      );
    }

    function renderModalProgress(item) {
      const progressState = getContentResumeState(item);
      if (!progressState?.hasProgress || progressState.percent <= 0 || progressState.percent >= 100) return '';

      const label = item?.tipo === 'serie'
        ? 'Tu avance de la serie queda guardado para volver rapido.'
        : 'Tu avance de la pelicula queda guardado para seguir al instante.';

      return `
        <div class="modal-prog">
          <div class="modal-prog-bar"><div class="modal-prog-fill" style="width:${progressState.percent}%"></div></div>
          <div class="modal-prog-lbl">${escapeHtml(`${progressState.percent}% visto. ${label}`)}</div>
        </div>
      `;
    }

    function buildModalRelatedItems(item, limit = 4) {
        if (!item) return [];

      const movieGroups = activeSagaGroups.length
        ? activeSagaGroups
        : buildSagaGroups(FF_STATE.content.filter((candidate) => candidate?.estado === 'activo' && candidate?.tipo === 'pelicula'));
      const sagaLookup = getSagaLookup(movieGroups);
      const candidates = FF_STATE.content.filter((candidate) => {
        return candidate?.estado === 'activo'
          && candidate.id !== item.id
          && candidate.tipo === item.tipo;
      });

      const sameSagaItems = item.tipo === 'pelicula'
        ? (sagaLookup.get(item.id)?.items || []).filter((candidate) => candidate.id !== item.id)
        : [];

      const results = [];
      const seen = new Set();
      const pushItem = (candidate) => {
        if (!candidate || seen.has(candidate.id)) return;
        seen.add(candidate.id);
        results.push(candidate);
      };

      sameSagaItems.forEach(pushItem);
      getSimilarRecommendations(item, candidates, limit, sagaLookup).forEach(pushItem);
      candidates
        .sort((a, b) => getTimestampValue(b.fechaRegistro, displayYear(b)) - getTimestampValue(a.fechaRegistro, displayYear(a)))
        .forEach(pushItem);

      return results.slice(0, limit);
    }

    function renderModalRelatedCard(item) {
      const progressState = getContentResumeState(item);
      const previewImage = getHeroBackdropSources(item)[0] || item.portadaUrl || '';

      return `
        <article class="card modal-related-card" data-content-id="${escapeHtml(item.id)}" onclick="openDetails('${item.id}')">
          <div class="card-img">
            ${mediaCardImage(previewImage, item.tipo === 'serie' ? 'TV' : 'FILM', item.titulo)}
            <div class="card-overlay"><div class="play-btn">Abrir</div></div>
            <div class="card-shine"></div>
            ${progressState.percent > 0 ? `<div class="prog-strip"><div class="prog-fill" style="width:${progressState.percent}%"></div></div>` : ''}
          </div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(item.titulo)}</div>
            <div class="card-sub"><span>${escapeHtml(item.categoria || (item.tipo === 'serie' ? 'Serie' : 'Pelicula'))}</span><span>${escapeHtml(String(displayYear(item) || ''))}</span></div>
          </div>
        </article>
      `;
    }

    function renderModalRelated(items = []) {
      if (!items.length) return '';

      return `
        <div class="modal-related">
          <div class="modal-related__head">
            <div class="modal-related__title">Mas como esto</div>
            <div class="modal-related__copy">Sugerencias cercanas por genero, categoria y tono para que se sienta mas curado.</div>
          </div>
          <div class="modal-related__row">
            ${items.map(renderModalRelatedCard).join('')}
          </div>
        </div>
      `;
    }

    function setSagaBackdrop(group) {
      const sources = [...new Set(
        [
          group?.backdropUrl || '',
          ...(group?.items || []).flatMap((item) => getHeroBackdropSources(item))
        ].filter(Boolean)
      )];
      const selected = sources[0] || group?.leadItem?.portadaUrl || '';
      if (selected) {
        swapBackdropToneBackground(sagaBackdropTone, selected);
        sagaModalEl.classList.add('has-backdrop-tone');
      } else {
        sagaBackdropTone.innerHTML = '';
        sagaModalEl.classList.remove('has-backdrop-tone');
      }
    }

    function openSagaModal(sagaKey) {
      const group = activeSagaGroups.find((entry) => entry.key === sagaKey);
      if (!group) return;

      document.getElementById('sagaModalType').textContent = group.explicit ? 'Saga curada' : 'Saga detectada';
      document.getElementById('sagaModalTitle').textContent = group.label;
      document.getElementById('sagaModalMeta').innerHTML = [
        `<span>${escapeHtml(`${group.items.length} peliculas`)}</span>`,
        `<span>${escapeHtml(buildSagaYearLabel(group))}</span>`,
        `<span>${escapeHtml(group.explicit ? 'Agrupacion manual' : 'Agrupacion automatica') }</span>`
      ].join('');
      document.getElementById('sagaModalSynopsis').textContent = group.items.length
        ? `Selecciona cualquiera de estas peliculas de ${group.label}. Al tocar una se abre su ficha para verla con calma, no se reproduce automaticamente.`
        : 'No hay peliculas disponibles en esta saga.';
      document.getElementById('sagaModalGrid').innerHTML = group.items.map(renderSagaChoiceCard).join('');
      setSagaBackdrop(group);
      sagaModalEl.scrollTop = 0;
      const sagaBody = sagaModalEl.querySelector('.saga-modal-body');
      if (sagaBody) sagaBody.scrollTop = 0;
      lockModalBackground();
      document.getElementById('sagaModalBd').classList.add('open');
    }

    function closeSagaModal() {
      document.getElementById('sagaModalBd').classList.remove('open');
      sagaModalEl.classList.remove('has-backdrop-tone');
      sagaBackdropTone.innerHTML = '';
      unlockModalBackground();
    }

    function openDetailsFromSaga(contentId) {
      closeSagaModal();
      requestAnimationFrame(() => {
        openDetails(contentId);
      });
    }

    function openDetails(contentId) {
      const item = FF_STATE.content.find((content) => content.id === contentId);
      if (!item) return;
      const modal = document.getElementById('modalBd');
      const trailerBtn = document.getElementById('mTrailerBtn');
      const episodes = getSeriesEpisodes(item.id);
      const primaryLabel = getPrimaryActionLabel(item);
      const modalBackdropSources = getHeroBackdropSources(item);

      document.getElementById('mThumb').innerHTML = mediaCardImage(item.portadaUrl, item.tipo === 'serie' ? 'TV' : 'FILM', item.titulo);
      syncModalBackdropRotation(item, modalBackdropSources);
      document.getElementById('mTitle').innerHTML = renderModalTitleVisual(item);
      const metaItems = [
        { value: item.tipo === 'serie' ? 'Serie' : 'Pelicula', className: 'modal-meta-item--type' },
        { value: displayYear(item) },
        { value: item.categoria },
        { value: displayDuration(item.duracion) },
        { value: item.clasificacion }
      ].filter((entry) => entry.value);
      document.getElementById('mMeta').innerHTML = metaItems
        .map((entry) => `<span class="modal-meta-item${entry.className ? ` ${entry.className}` : ''}">${escapeHtml(String(entry.value))}</span>`)
        .concat(buildRatingPill(item, { showCount: true, showSource: true }))
        .join('');
      document.getElementById('mProgress').innerHTML = renderModalProgress(item);
      document.getElementById('mSynopsis').textContent = item.sinopsis || 'Sinopsis no disponible.';
      document.getElementById('mTags').innerHTML = (item.tags || []).map((tag) => `<span class="tag">#${escapeHtml(tag)}</span>`).join('');
      document.getElementById('mRelatedWrap').innerHTML = item.tipo === 'pelicula'
        ? renderModalRelated(buildModalRelatedItems(item, 4))
        : '';
      document.getElementById('mPlayBtn').textContent = primaryLabel;
      document.getElementById('mPlayBtn').onclick = () => playPrimaryAction(item.id);

      if (['pelicula', 'serie'].includes(item.tipo)) {
        trailerBtn.style.display = 'inline-flex';
        trailerBtn.onclick = () => openTrailer(item.id);
      } else {
        trailerBtn.style.display = 'none';
        trailerBtn.onclick = null;
      }

      const favBtn = document.getElementById('mFavBtn');
      updateFavButton(favBtn, item);
      favBtn.onclick = () => toggleFavoriteFromModal(item, favBtn);

      document.getElementById('mEpisodesWrap').innerHTML = item.tipo === 'serie'
        ? renderEpisodesInModal(item, episodes)
        : '';

      modal.scrollTop = 0;
      modalEl.scrollTop = 0;
      const modalBody = modalEl.querySelector('.modal-body');
      const episodesScroller = modalEl.querySelector('.modal-episodes');
      if (modalBody) modalBody.scrollTop = 0;
      if (episodesScroller) episodesScroller.scrollTop = 0;
      lockModalBackground();
      modal.classList.add('open');
    }

    function renderEpisodesInModal(serie, episodes) {
      const seasons = buildSeasonsMap(episodes);
      if (!episodes.length) {
        return '<div class="modal-episodes"><div class="season-box">Esta serie aun no tiene episodios cargados.</div></div>';
      }

      const blocks = [];
      for (const [season, list] of seasons.entries()) {
        blocks.push(`
          <div class="season-box">
            <div class="season-title">Temporada ${season}</div>
            ${list.map((episode) => {
              const progress = getEpisodeProgressState(serie.id, episode.id, episode.duracion);
              const progressLabel = renderEpisodeProgressMeta(serie.id, episode);
              return `
                <div class="episode-item">
                  <div class="episode-item__main">
                    <div class="episode-item__top">
                      <div>
                        <div class="episode-item__title"><strong>E${episode.numeroEpisodio}.</strong> ${escapeHtml(episode.titulo)}</div>
                        <div class="ep-meta">${escapeHtml(progressLabel)}</div>
                      </div>
                      <button class="btn btn-ghost episode-item__action" type="button" onclick="playEpisode('${serie.id}','${episode.id}')">${progress.hasProgress ? 'Continuar' : 'Ver'}</button>
                    </div>
                    ${progress.hasProgress ? `<div class="modal-episode-progress"><div class="modal-episode-progress-fill" style="width:${progress.percent}%"></div></div>` : ''}
                    ${episode.sinopsis ? `<div class="episode-item__synopsis">${escapeHtml(episode.sinopsis)}</div>` : ''}
                  </div>
                </div>`;
            }).join('')}
          </div>`);
      }
      return `<div class="modal-episodes">${blocks.join('')}</div>`;
    }

    async function toggleFavoriteFromModal(item, btn) {
      const user = getCurrentUser();
      try {
        await toggleFavoriteRemote({
          usuarioId: user.id,
          contenidoId: item.id,
          episodioId: '',
          tipo: item.tipo
        });
        await loadUserState();
        updateFavButton(btn, item);
        pulseFavButton(btn);
        renderHome();
      } catch (error) {
        showToast(error.message || 'No se pudo actualizar favorito', 'error');
      }
    }

    function updateFavButton(btn, item) {
      const on = isFavorite(item.tipo, item.id, '');
      btn.classList.toggle('on', on);
      btn.setAttribute('aria-pressed', String(on));
      btn.setAttribute('title', on ? 'Quitar de favoritos' : 'Agregar a favoritos');
    }

    function pulseFavButton(btn) {
      btn.classList.remove('pulse');
      void btn.offsetWidth;
      btn.classList.add('pulse');
    }

    function closeModal() {
      document.getElementById('modalBd').classList.remove('open');
      stopModalBackdropRotation();
      modalEl.classList.remove('has-backdrop-tone');
      mBackdropTone.innerHTML = '';
      unlockModalBackground();
    }

    function lockModalBackground() {
      if (overlayLockDepth === 0) {
        modalScrollY = window.scrollY || window.pageYOffset || 0;
        document.body.style.top = `-${modalScrollY}px`;
        document.body.classList.add('modal-open');
      }
      overlayLockDepth += 1;
    }

    function unlockModalBackground() {
      if (overlayLockDepth <= 0) return;
      overlayLockDepth -= 1;
      if (overlayLockDepth > 0) return;
      document.body.classList.remove('modal-open');
      document.body.style.top = '';
      window.scrollTo(0, modalScrollY);
      modalScrollY = 0;
    }

    function playContent(id) {
      window.location.href = `player.html?id=${encodeURIComponent(id)}&kind=pelicula`;
    }

    function playPrimaryAction(contentId) {
      const item = FF_STATE.content.find((content) => content.id === contentId);
      if (!item) return;
      if (item.tipo === 'serie') {
        playSeries(item.id);
        return;
      }
      playContent(item.id);
    }

    function playSeries(id) {
      const episodes = getSeriesEpisodes(id);
      if (!episodes.length) return showToast('Esta serie aun no tiene episodios.', 'error');
      const record = (FF_STATE.userState.progress || [])
        .filter((item) => item.tipo === 'episodio' && item.contenidoId === id && String(item.completado).toLowerCase() !== 'si')
        .sort((a, b) => new Date(b.ultimaVisualizacion || 0) - new Date(a.ultimaVisualizacion || 0))[0];
      const target = (record ? episodes.find((episode) => episode.id === record.episodioId) : null) || episodes[0];
      playEpisode(id, target.id);
    }

    function playEpisode(serieId, episodioId) {
      window.location.href = `player.html?id=${encodeURIComponent(episodioId)}&serie=${encodeURIComponent(serieId)}&kind=episodio`;
    }

    function getContentResumeState(item) {
      return getContentProgressState(item);
    }

    function getPrimaryActionLabel(item) {
      return getContentResumeState(item).hasProgress ? 'Continuar' : 'Reproducir';
    }

    async function openTrailer(contentId) {
      const item = FF_STATE.content.find((content) => content.id === contentId);
      if (!item) return;
      const trailerBd = document.getElementById('trailerBd');
      const trailerTitle = document.getElementById('trailerTitle');
      const trailerBody = document.getElementById('trailerBody');

      trailerTitle.textContent = item.titulo;
      trailerBody.innerHTML = '<div class="trailer-status"><div class="spin"></div><span>Buscando trailer...</span></div>';
      lockModalBackground();
      trailerBd.classList.add('open');

      try {
        const trailer = await getTrailerData({
          title: item.titulo,
          contentType: item.tipo,
          year: displayYear(item) || 0
        });
        trailerBody.innerHTML = `
          <div class="trailer-frame-wrap">
            <iframe
              class="trailer-frame"
              src="${escapeHtml(trailer.embedUrl)}"
              title="Trailer de ${escapeHtml(item.titulo)}"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen
            ></iframe>
          </div>
          <div class="trailer-note">${escapeHtml(trailer.name || 'Trailer disponible')}</div>
        `;
      } catch (error) {
        trailerBody.innerHTML = `<div class="trailer-status trailer-status--error"><span>${escapeHtml(error.message || 'No se pudo cargar el trailer.')}</span></div>`;
      }
    }

    function closeTrailer() {
      document.getElementById('trailerBd').classList.remove('open');
      document.getElementById('trailerBody').innerHTML = '<div class="trailer-status"><div class="spin"></div><span>Buscando trailer...</span></div>';
      unlockModalBackground();
    }

    window.addEventListener('beforeunload', stopHeroRotation);
    window.addEventListener('beforeunload', stopShowcaseRotators);
    window.addEventListener('beforeunload', stopSagaRotators);
    document.addEventListener('visibilitychange', handleDocumentVisibilityChange);
    window.addEventListener('resize', debounce(() => {
      disableInitialDesktopHomeDefer();
      const nextMobileViewport = isMobileViewport();
      const nextDesktopShowcaseViewport = isDesktopShowcaseViewport();
      if (nextMobileViewport === mobileViewport && nextDesktopShowcaseViewport === desktopShowcaseViewport) return;
      mobileViewport = nextMobileViewport;
      desktopShowcaseViewport = nextDesktopShowcaseViewport;
      resetHeroParallax();
      renderChips();
      renderHome();
    }, 140));

    init();
  </script>
</body>
