<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FamilyFlix — Reproductor</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #000; }
    [data-theme="light"] body { background: var(--bg-1); }

    .player-nav {
      position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 100;
      background: rgba(0,0,0,0.7); backdrop-filter: var(--blur-strong);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; padding: 0 20px; gap: 16px;
    }
    .nav-logo { font-family:var(--font-display); font-size:22px; font-weight:700; color:#fff; text-decoration:none; }
    .nav-logo em { color:var(--accent); font-style:normal; }

    .player-zone { padding-top:60px; min-height:100vh; display:flex; flex-direction:column; }

    /* ── VIDEO NATIVO ── */
    .video-stage { position:relative; background:#000; width:100%; }

    .native-video {
      width: 100%;
      aspect-ratio: 16/9;
      display: block;
      background: #000;
      outline: none;
    }
    /* Fullscreen real en móvil */
    .native-video:fullscreen { width:100vw; height:100vh; }
    .native-video:-webkit-full-screen { width:100vw; height:100vh; }

    /* Overlay de carga */
    .video-loader {
      position:absolute; inset:0; background:#000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:16px; color:rgba(255,255,255,0.5); font-size:14px;
      transition:opacity 0.5s ease; z-index:2; pointer-events:none;
    }
    .video-loader.hidden { opacity:0; pointer-events:none; }
    .spinner { width:36px; height:36px; border:3px solid rgba(255,255,255,0.1); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Barra de progreso real encima del video */
    .real-progress-bar {
      position:absolute; bottom:0; left:0; right:0;
      height:4px; background:rgba(255,255,255,0.15); z-index:3;
      pointer-events:none;
    }
    .real-progress-fill {
      height:100%; width:0%;
      background:linear-gradient(90deg, var(--accent), var(--gold));
      transition:width 1s linear;
    }

    /* ── INFO PANEL ── */
    .player-info {
      flex:1; padding:28px 24px 50px;
      max-width:1100px; margin:0 auto; width:100%;
      display:grid; grid-template-columns:1fr 300px;
      gap:28px; align-items:start;
    }
    .info-cat { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--accent); font-weight:600; margin-bottom:8px; }
    .info-title { font-family:var(--font-display); font-size:clamp(24px,4vw,40px); font-weight:700; margin-bottom:10px; color:var(--text-1); }
    .info-meta { display:flex; gap:14px; font-size:13px; color:var(--text-3); margin-bottom:16px; flex-wrap:wrap; }
    .info-synopsis { font-size:14px; line-height:1.8; color:var(--text-2); margin-bottom:16px; }
    .info-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }

    /* ── PROGRESS CARD ── */
    .progress-card {
      background:var(--glass-bg); backdrop-filter:var(--blur);
      border:1px solid var(--glass-border); border-radius:var(--radius-lg);
      padding:24px; position:sticky; top:76px;
    }
    .progress-card h4 { font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-3); margin-bottom:16px; }

    .autosave-badge {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(80,216,144,0.1); border:1px solid rgba(80,216,144,0.2);
      color:var(--success); border-radius:20px;
      padding:4px 10px; font-size:11px; font-weight:600; margin-bottom:16px;
    }
    .autosave-dot { width:6px; height:6px; border-radius:50%; background:var(--success); animation:pulse-dot 2s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Ring */
    .ring-wrap { position:relative; width:100px; height:100px; margin:0 auto 12px; }
    .progress-ring { transform:rotate(-90deg); }
    .ring-track { fill:none; stroke:rgba(255,255,255,0.06); stroke-width:8; }
    .ring-fill { fill:none; stroke-width:8; stroke-linecap:round; stroke-dasharray:251; stroke-dashoffset:251; transition:stroke-dashoffset 0.6s ease; stroke:url(#ringGrad); }
    .ring-label { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:20px; font-weight:700; color:var(--accent); }
    .ring-sublabel { text-align:center; font-size:12px; color:var(--text-3); margin-bottom:16px; }

    /* Tiempo real */
    .time-display {
      background:rgba(200,162,255,0.08); border:1px solid rgba(200,162,255,0.15);
      border-radius:var(--radius-sm); padding:10px 14px;
      text-align:center; margin-bottom:14px;
    }
    .time-current { font-size:22px; font-weight:700; color:var(--accent); font-family:var(--font-display); }
    .time-total { font-size:12px; color:var(--text-3); margin-top:2px; }

    .btn-row { display:flex; gap:8px; flex-direction:column; }
    .last-saved { font-size:11px; color:var(--text-3); text-align:center; margin-top:10px; min-height:16px; }

    /* No video */
    .no-video-msg {
      aspect-ratio:16/9; background:#000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:14px; color:rgba(255,255,255,0.4); text-align:center; padding:20px;
    }
    .no-video-msg .icon { font-size:56px; }
    .no-video-msg h3 { font-size:20px; color:rgba(255,255,255,0.7); }
    .no-video-msg code {
      background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
      border-radius:8px; padding:8px 16px; font-size:12px; color:var(--accent);
      font-family:monospace; max-width:440px;
    }

    @media (max-width:768px) {
      .player-info { grid-template-columns:1fr; }
      .progress-card { position:static; }
    }
  </style>
</head>
<body>
<div class="bg-orbs" style="opacity:0.2">
  <div class="orb orb-1"></div><div class="orb orb-3"></div>
</div>

<div class="player-nav">
  <a href="home.html" class="btn btn-glass" id="backBtn" style="font-size:13px">← Catálogo</a>
  <a href="home.html" class="nav-logo">Family<em>Flix</em></a>
  <div style="flex:1"></div>
  <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema"></button>
</div>

<div class="player-zone">
  <div class="video-stage" id="videoStage">
    <div class="video-loader" id="videoLoader">
      <div class="spinner"></div>
      <span>Cargando video...</span>
    </div>
  </div>

  <div class="player-info" id="playerInfo" style="display:none">
    <div>
      <div class="info-cat" id="infoCat"></div>
      <h1 class="info-title" id="infoTitle"></h1>
      <div class="info-meta" id="infoMeta"></div>
      <p class="info-synopsis" id="infoSynopsis"></p>
      <div class="info-tags" id="infoTags"></div>
    </div>

    <div class="progress-card">
      <h4>📍 Tu progreso</h4>
      <div class="autosave-badge">
        <div class="autosave-dot"></div>
        Guardado automático
      </div>

      <div class="ring-wrap">
        <svg class="progress-ring" width="100" height="100" viewBox="0 0 100 100">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="var(--accent)"/>
              <stop offset="100%" stop-color="var(--gold)"/>
            </linearGradient>
          </defs>
          <circle class="ring-track" cx="50" cy="50" r="40"/>
          <circle class="ring-fill" id="ringFill" cx="50" cy="50" r="40"/>
        </svg>
        <div class="ring-label" id="ringLabel">0%</div>
      </div>
      <div class="ring-sublabel" id="ringSub">Sin progreso</div>

      <div class="time-display">
        <div class="time-current" id="timeCurrent">0:00:00</div>
        <div class="time-total" id="timeTotal">Duración total</div>
      </div>

      <div class="btn-row">
        <button class="btn btn-accent btn-full" onclick="saveNow()">💾 Guardar ahora</button>
        <button class="btn btn-glass btn-full" onclick="markComplete()" style="font-size:13px">✅ Marcar completo</button>
      </div>
      <div class="last-saved" id="lastSaved"></div>
    </div>
  </div>
</div>

<script src="js/shared.js"></script>
<script>
  checkAuth();

  const params  = new URLSearchParams(window.location.search);
  const videoId = params.get('id');
  let videoEl   = null;
  let autoTimer = null;
  let currentVideo = null;

  // ── STORAGE KEY por dispositivo/usuario ──────────────────
  // Guarda tiempo en segundos (más preciso que porcentaje)
  function getStorageKey() { return `ff_time_${videoId}`; }
  function getSavedTime()  { return parseFloat(localStorage.getItem(getStorageKey()) || '0'); }
  function saveTime(secs)  { localStorage.setItem(getStorageKey(), secs); }

  async function init() {
    if (!videoId) { showError('No se especificó un video.'); return; }
    const videos = await fetchVideos();
    const v = videos.find(x => x.id === videoId);
    if (!v) { showError('Video no encontrado.'); return; }
    currentVideo = v;
    document.title = `${v.title} — FamilyFlix`;
    renderPlayer(v);
    renderInfo(v);
  }

  function renderPlayer(v) {
    const stage  = document.getElementById('videoStage');
    const loader = document.getElementById('videoLoader');

    // Prioridad: R2 URL > Drive embed
    const r2Url = v.r2Url || '';

    if (r2Url) {
      // ✅ VIDEO NATIVO con R2 — streaming real, fullscreen móvil
      videoEl = document.createElement('video');
      videoEl.className     = 'native-video';
      videoEl.controls      = true;
      videoEl.controlsList  = 'nodownload';
      videoEl.playsInline   = true;
      videoEl.preload       = 'metadata';
      videoEl.src           = r2Url;

      // Barra de progreso visual
      const progressBar  = document.createElement('div');
      progressBar.className = 'real-progress-bar';
      const progressFill = document.createElement('div');
      progressFill.className = 'real-progress-fill';
      progressFill.id = 'realProgressFill';
      progressBar.appendChild(progressFill);

      // Cuando carga los metadatos: ir al tiempo guardado
      videoEl.addEventListener('loadedmetadata', () => {
        loader.classList.add('hidden');
        const saved = getSavedTime();
        if (saved > 5) {
          videoEl.currentTime = saved;
          showToast(`▶ Continuando desde ${formatTime(saved)}`, 'success');
        }
        updateTimeDisplay();
        updateTotalTime();
      });

      // Actualizar progreso en tiempo real
      videoEl.addEventListener('timeupdate', () => {
        updateTimeDisplay();
        updateRing();
        // Actualizar barra visual
        const pct = videoEl.duration ? (videoEl.currentTime / videoEl.duration) * 100 : 0;
        document.getElementById('realProgressFill').style.width = pct + '%';
      });

      // Guardar al pausar
      videoEl.addEventListener('pause',  () => doSave());
      // Guardar al terminar
      videoEl.addEventListener('ended',  () => { saveTime(0); saveVideoProgress(videoId, 100); updateLastSaved(); showToast('✅ Video completado', 'success'); });
      // Ocultar loader cuando puede reproducir
      videoEl.addEventListener('canplay', () => loader.classList.add('hidden'));

      stage.appendChild(videoEl);
      stage.appendChild(progressBar);

      // Autosave cada 15 segundos
      autoTimer = setInterval(() => doSave(), 15000);

    } else if (v.driveId) {
      // Fallback: iframe de Drive si no hay R2
      const iframe = document.createElement('iframe');
      iframe.className = 'native-video';
      iframe.src = `https://drive.google.com/file/d/${v.driveId}/preview`;
      iframe.setAttribute('allow', 'autoplay; encrypted-media; fullscreen');
      iframe.onload = () => setTimeout(() => loader.classList.add('hidden'), 500);
      stage.appendChild(iframe);
      setTimeout(() => loader.classList.add('hidden'), 9000);
      autoTimer = setInterval(() => doSave(), 15000);
    } else {
      stage.innerHTML = `<div class="no-video-msg">
        <div class="icon">🎬</div>
        <h3>Sin video configurado</h3>
        <p>Agrega la URL de R2 en la columna <code>r2Url</code> de tu Google Sheet.</p>
      </div>`;
      loader.classList.add('hidden');
    }
  }

  function renderInfo(v) {
    document.getElementById('playerInfo').style.display = 'grid';
    document.getElementById('infoCat').textContent   = v.category;
    document.getElementById('infoTitle').textContent = v.title;
    document.getElementById('infoMeta').innerHTML = `
      ${v.year     ? `<span>📅 ${v.year}</span>`    : ''}
      ${v.duration ? `<span>⏱ ${v.duration}</span>` : ''}
      <span>🗂 ${v.category}</span>`;
    document.getElementById('infoSynopsis').textContent = v.synopsis || '';
    document.getElementById('infoTags').innerHTML = (v.tags||[]).map(t=>`<span class="tag">#${t}</span>`).join('');

    // Mostrar progreso guardado
    const saved = getSavedTime();
    if (saved > 0 && v.duration) {
      const totalSecs = parseDuration(v.duration);
      const pct = totalSecs ? Math.round((saved / totalSecs) * 100) : 0;
      updateRingManual(pct);
      document.getElementById('timeCurrent').textContent = formatTime(saved);
      document.getElementById('ringSub').textContent = fmtPct(pct);
    }
  }

  // ── GUARDAR ──────────────────────────────────────────────
  function doSave() {
    if (!videoEl || !videoId) return;
    const secs = videoEl.currentTime;
    const pct  = videoEl.duration ? Math.round((secs / videoEl.duration) * 100) : 0;
    saveTime(secs);
    saveVideoProgress(videoId, pct);
    updateLastSaved();
  }

  function saveNow() { doSave(); showToast('✅ Progreso guardado', 'success'); }

  function markComplete() {
    if (videoEl) videoEl.currentTime = videoEl.duration || 0;
    saveTime(0);
    saveVideoProgress(videoId, 100);
    updateRingManual(100);
    updateLastSaved();
    showToast('✅ Marcado como completo', 'success');
  }

  // ── UI ───────────────────────────────────────────────────
  function updateTimeDisplay() {
    if (!videoEl) return;
    document.getElementById('timeCurrent').textContent = formatTime(videoEl.currentTime);
  }
  function updateTotalTime() {
    if (!videoEl || !videoEl.duration) return;
    document.getElementById('timeTotal').textContent = `de ${formatTime(videoEl.duration)}`;
  }
  function updateRing() {
    if (!videoEl || !videoEl.duration) return;
    const pct = (videoEl.currentTime / videoEl.duration) * 100;
    updateRingManual(pct);
  }
  function updateRingManual(pct) {
    const offset = 251 - (pct / 100) * 251;
    document.getElementById('ringFill').style.strokeDashoffset = offset;
    document.getElementById('ringLabel').textContent = Math.round(pct) + '%';
    document.getElementById('ringSub').textContent   = fmtPct(pct);
  }
  function updateLastSaved() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    const s = now.getSeconds().toString().padStart(2,'0');
    document.getElementById('lastSaved').textContent = `Guardado a las ${h}:${m}:${s}`;
  }

  // ── HELPERS ──────────────────────────────────────────────
  function formatTime(secs) {
    if (!secs || isNaN(secs)) return '0:00:00';
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = Math.floor(secs % 60);
    return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  }
  function parseDuration(str) {
    if (!str) return 0;
    const parts = str.split(':').map(Number);
    if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
    if (parts.length === 2) return parts[0]*60 + parts[1];
    return 0;
  }
  function showError(msg) {
    document.getElementById('videoStage').innerHTML =
      `<div class="no-video-msg"><div class="icon">❌</div><h3>Error</h3><p>${msg}</p></div>`;
    document.getElementById('videoLoader').classList.add('hidden');
  }

  // Guardar al salir
  window.addEventListener('beforeunload', () => doSave());
  document.querySelectorAll('a[href="home.html"]').forEach(a =>
    a.addEventListener('click', () => doSave())
  );

  init();
</script>
</body>
</html>
